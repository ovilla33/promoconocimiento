    {"n":105,"bloque":2,"q":"El artículo 371 establece el Banco de la República. ¿Cuáles son sus funciones básicas?","opts":["Solo emitir moneda y recibir depósitos del Gobierno","El Banco de la República ejerce funciones de banca central con autonomía administrativa, patrimonial y técnica; sus funciones básicas son regular la moneda, los cambios internacionales y el crédito; emitir la moneda legal; administrar las reservas internacionales; ser prestamista de última instancia y actuar como banquero del Gobierno","Solo actuar como banco del Gobierno Nacional y administrar la deuda pública","Regular los bancos privados y autorizar su funcionamiento sin funciones monetarias propias"],"ans":"B"},
    {"n":106,"bloque":2,"q":"El artículo 339 establece el Plan Nacional de Desarrollo. ¿Qué partes lo componen?","opts":["Solo el programa de gobierno del Presidente electo","Las partes general y un plan de inversiones de las entidades públicas del orden nacional; en la parte general se señalarán los propósitos y objetivos nacionales de largo plazo, las metas y prioridades de la acción estatal a mediano plazo y las estrategias y orientaciones generales de la política económica, social y ambiental","El plan de compras públicas y el presupuesto plurianual de inversión","El plan de gasto público y el programa monetario del Banco de la República"],"ans":"B"},
    {"n":107,"bloque":2,"q":"El artículo 374 establece las formas de reformar la Constitución. ¿Cuáles son los tres mecanismos?","opts":["Solo mediante Asamblea Nacional Constituyente convocada por el Gobierno","El Congreso, una Asamblea Constituyente o el pueblo mediante referendo","Solo mediante acto legislativo del Congreso con mayoría calificada","El Gobierno Nacional con aprobación del Congreso y revisión de la Corte Constitucional"],"ans":"B"},
    {"n":108,"bloque":2,"q":"El artículo 375 establece el procedimiento para que el Congreso reforme la Constitución. ¿Cuántos debates requiere?","opts":["Cuatro debates en sesiones ordinarias de un mismo año con mayoría absoluta","Debe tramitarse en dos períodos ordinarios y consecutivos; aprobado en el primero por la mayoría de los asistentes, se publica; en el segundo período la aprobación requiere el voto de la mayoría de los miembros de cada cámara","Dos debates en sesión conjunta de ambas cámaras con mayoría de dos tercios","Ocho debates distribuidos en dos legislaturas con aprobación de mayoría calificada en cada uno"],"ans":"B"},
    {"n":109,"bloque":2,"q":"El artículo 376 establece la convocatoria de Asamblea Constituyente. ¿Cómo se convoca?","opts":["El Presidente puede convocarla directamente mediante decreto legislativo","Mediante ley aprobada por mayoría de los miembros de ambas cámaras, el Congreso puede disponer la convocatoria de una Asamblea Constituyente; la ley determinará la competencia, el período y la composición","El pueblo puede convocarla directamente con firmas del 5% del censo electoral","La Corte Constitucional convoca la Asamblea cuando declare inexequible una reforma del Congreso"],"ans":"B"},
    {"n":110,"bloque":2,"q":"El artículo 377 establece el referendo constitucional obligatorio. ¿Qué materias deben someterse a referendo?","opts":["Toda reforma que amplíe los derechos sociales de los ciudadanos","Deben someterse a referendo las reformas aprobadas por el Congreso, cuando se refieran a los derechos del Capítulo 1 del Título II, a sus garantías, a los procedimientos de participación popular o al Congreso, si así lo solicita el cinco por ciento del censo electoral dentro de los seis meses siguientes a la promulgación del acto legislativo","Todas las reformas constitucionales deben someterse a referendo para su validez","Solo las reformas que restrinjan derechos fundamentales deben ser refrendadas por el pueblo"],"ans":"B"},
    {"n":111,"bloque":2,"q":"El artículo 378 establece el referendo para reformar la Constitución por iniciativa del Gobierno. ¿Qué se requiere para que sea aprobatorio?","opts":["La mayoría simple de los votos emitidos sin exigencia de umbral","Para que el referendo sea aprobatorio se requiere el voto afirmativo de más de la mitad de los sufragantes y que el número de estos exceda de la cuarta parte del total de ciudadanos que integren el censo electoral","Solo la mayoría de los votos válidos sin consideración del censo electoral","El voto favorable de las dos terceras partes de los votantes que participen en el referendo"],"ans":"B"},
    {"n":112,"bloque":2,"q":"El Acto Legislativo 01 de 2005 modificó el artículo 48 sobre seguridad social. ¿Cuál fue el cambio más importante?","opts":["Creó el sistema de pilares para la protección de la vejez","Introdujo el principio de sostenibilidad financiera del sistema pensional y habilitó la creación de BEPS; estableció que a partir de 2010 no habrá regímenes pensionales especiales ni exceptuados salvo los de la fuerza pública y el Presidente de la República","Eliminó el régimen de prima media con prestación definida para nuevos afiliados","Creó obligatoriamente el ahorro individual como único régimen pensional posible"],"ans":"B"},
    {"n":113,"bloque":2,"q":"El Acto Legislativo 01 de 1997 modificó el artículo 35 sobre extradición. ¿Cuál fue el cambio?","opts":["Prohibió definitivamente la extradición de colombianos en todos los casos","La extradición de colombianos por nacimiento puede concederse con la aprobación del Gobierno Nacional; la extradición no procederá por delitos políticos; no se aplica a hechos cometidos con anterioridad a la promulgación del Acto Legislativo","Hizo obligatoria la extradición de colombianos cuando la solicite Estados Unidos","Estableció que la extradición siempre debe ser aprobada por la Corte Suprema de Justicia"],"ans":"B"},
    {"n":114,"bloque":2,"q":"La Corte Constitucional desarrolló la teoría de la sustitución de la Constitución. ¿En qué consiste?","opts":["El Congreso puede modificar cualquier artículo sin límites mediante acto legislativo","El poder de reforma del Congreso tiene límites implícitos; si una reforma altera un elemento definitorio de la identidad de la Constitución de manera tal que lo sustituye por otro opuesto o integralmente diferente, se trata de una sustitución de la Constitución que excede las competencias del poder de reforma y es inconstitucional","Las reformas constitucionales siempre son válidas si son aprobadas con el quórum requerido","La sustitución de la Constitución solo puede hacerla una Asamblea Nacional Constituyente"],"ans":"B"},
    {"n":115,"bloque":2,"q":"La Corte Constitucional ha reconocido el bloque de constitucionalidad. ¿Qué implica este concepto?","opts":["Solo la Constitución escrita de 1991 forma parte del parámetro de control constitucional","Existe un conjunto de normas y principios que sin aparecer formalmente en el articulado de la Constitución son utilizados como parámetros del control de constitucionalidad de las leyes; se integra principalmente por los tratados internacionales de derechos humanos ratificados por Colombia y los convenios de la OIT","Solo los tratados de la OEA pueden formar parte del bloque de constitucionalidad","El bloque de constitucionalidad es un concepto académico sin reconocimiento jurisprudencial"],"ans":"B"},
    {"n":116,"bloque":2,"q":"¿Cuál es la diferencia entre el poder constituyente originario y el poder de reforma según la jurisprudencia colombiana?","opts":["No hay diferencia; ambos poderes pueden hacer lo mismo","El poder constituyente originario es ilimitado y reside en el pueblo; el poder de reforma es derivado, limitado y no puede sustituir la Constitución vigente; el Congreso solo ejerce poder de reforma y no puede alterar la identidad de la Constitución de manera integral o total","El poder de reforma es superior al constituyente originario porque actúa en nombre del pueblo","Ambos poderes están limitados por las mismas restricciones del derecho internacional"],"ans":"B"},
    {"n":117,"bloque":2,"q":"¿Cuál es la diferencia entre los estados de excepción regulados en los artículos 212, 213 y 215?","opts":["Son equivalentes; se aplica cualquiera según la conveniencia del Gobierno","El art. 212 regula el estado de guerra exterior; el art. 213 regula el estado de conmoción interior (grave perturbación del orden público que atente contra la estabilidad institucional o la convivencia ciudadana); el art. 215 regula el estado de emergencia económica, social o ecológica","El art. 212 aplica a guerras internas; el 213 a guerras externas; el 215 a desastres naturales","Los tres artículos regulan el mismo estado de excepción con distintos nombres según la causa"],"ans":"B"},
    {"n":118,"bloque":2,"q":"¿Qué es el control automático de constitucionalidad y cuándo opera?","opts":["Es el control que ejerce la Corte sobre cualquier ley cuando un ciudadano la demanda","Es el control que la Corte ejerce de manera inmediata sin que nadie lo solicite sobre los decretos legislativos dictados durante los estados de excepción, los proyectos de ley que el Presidente haya objetado por inconstitucional y los tratados internacionales antes de su ratificación","Es el control que ejercen los ciudadanos cuando presentan 5.000 demandas sobre la misma norma","Es el control que realiza la Procuraduría General sobre los decretos reglamentarios del Ejecutivo"],"ans":"B"},
    {"n":119,"bloque":2,"q":"La Corte Constitucional ha establecido el precedente constitucional. ¿Cuáles son sus efectos?","opts":["Es un criterio auxiliar de interpretación sin efectos vinculantes para los jueces","El precedente constitucional vincula a todos los jueces del país; las sentencias de la Corte tienen efectos erga omnes cuando declaran inexequibles normas; la ratio decidendi de las sentencias de tutela vincula a todos los jueces; desconocer el precedente sin motivación suficiente constituye una vía de hecho","El precedente solo vincula a la Corte Constitucional en sus propias decisiones futuras","El precedente vincula solo a las altas cortes pero no a los jueces de primera y segunda instancia"],"ans":"B"},
    {"n":120,"bloque":2,"q":"El artículo 44 enumera los derechos fundamentales de los niños. ¿Cuáles son los expresamente enumerados?","opts":["Solo la vida, la salud y la educación","La vida, la integridad física, la salud y la seguridad social, la alimentación equilibrada, su nombre y nacionalidad, tener una familia y no ser separados de ella, el cuidado y amor, la educación y la cultura, la recreación y la libre expresión de su opinión; serán protegidos contra toda forma de abandono, violencia física o moral, secuestro, venta, abuso sexual, explotación laboral o económica y trabajos riesgosos","Los derechos de los niños son los mismos que los de los adultos con algunas adiciones","Solo los derechos relativos a la familia, la educación y la protección frente al trabajo infantil"],"ans":"B"},
    {"n":121,"bloque":2,"q":"¿Qué significa que Colombia sea un Estado Social de Derecho según la interpretación de la Corte Constitucional?","opts":["Significa que el Estado interviene en todos los aspectos de la vida privada de los ciudadanos","Significa que el Estado tiene la obligación de garantizar condiciones mínimas para la dignidad humana; los derechos sociales son exigibles; el Estado no puede ser indiferente a la desigualdad; existe un mandato constitucional de reducir las brechas sociales mediante políticas públicas activas","Significa que el Estado colombiano es idéntico al Estado de bienestar de los países nórdicos","Significa que la ley es el único límite al poder del Estado sin referencia a valores materiales"],"ans":"B"},
    {"n":122,"bloque":2,"q":"El artículo 13 consagra la igualdad en tres dimensiones. ¿Cuáles son?","opts":["Solo la igualdad formal ante la ley sin distinciones adicionales","La igualdad formal (todas las personas nacen libres e iguales ante la ley); la igualdad material (el Estado promoverá condiciones para que la igualdad sea real y efectiva); y la no discriminación (nadie será discriminado por razones de sexo, raza, origen nacional, lengua, religión u opinión política o filosófica)","Solo la igualdad de oportunidades y la prohibición de discriminación por raza","La igualdad de resultados, la igualdad de oportunidades y la igualdad de acceso a servicios públicos"],"ans":"B"},
    {"n":123,"bloque":2,"q":"El artículo 86 establece que la tutela procede como mecanismo transitorio. ¿Cuándo opera esa modalidad?","opts":["Cuando el juez considera que el asunto es urgente aunque existan otros medios","La tutela procede como mecanismo transitorio cuando existen otros medios de defensa judicial si se utiliza para evitar un perjuicio irremediable; en este caso los efectos son temporales hasta que el juez competente decida el fondo del asunto","La tutela siempre es definitiva y nunca opera de manera transitoria","La tutela transitoria procede cuando la autoridad judicial tarda más de 60 días en resolver"],"ans":"B"},
    {"n":124,"bloque":2,"q":"El artículo 91 establece la responsabilidad por órdenes militares. ¿Bajo qué condición el inferior queda exento?","opts":["El inferior nunca puede ser responsable; toda responsabilidad recae sobre quien da la orden","En caso de infracción manifiesta de un precepto constitucional en detrimento de alguna persona, el mando militar no exime de responsabilidad al agente que lo ejecuta; el superior que da la orden también será responsable","El inferior siempre exime su responsabilidad por el cumplimiento de una orden militar legítima","La exención de responsabilidad opera automáticamente cuando la orden está por escrito y firmada por el superior"],"ans":"B"},
    {"n":125,"bloque":2,"q":"El artículo 92 consagra la acción de pérdida de investidura. ¿Quiénes pueden acudir a esta acción?","opts":["Solo los partidos políticos pueden solicitar la pérdida de investidura de sus miembros","Cualquier ciudadano puede pedir a la autoridad judicial competente la pérdida de la investidura del congresista que incurra en las causales previstas en la Constitución y la ley","Solo el Procurador General de la Nación puede solicitar la pérdida de investidura","Solo el Consejo de Estado tiene competencia exclusiva para iniciar el proceso"],"ans":"B"},
    {"n":126,"bloque":2,"q":"El artículo 48 modificado por el Acto Legislativo 01 de 2005 prohíbe ciertos privilegios pensionales. ¿Cuáles?","opts":["Prohíbe las pensiones superiores al salario mínimo","Ninguna pensión podrá ser inferior al salario mínimo legal mensual vigente; no habrá pensiones con más de veinticinco salarios mínimos; a partir de 2010 no habrá regímenes pensionales especiales ni exceptuados salvo fuerza pública y Presidente","Prohíbe pensiones por convenios sindicales superiores al salario mínimo","Prohíbe las mesadas pensionales indexadas al dólar o a monedas extranjeras"],"ans":"B"},
    {"n":127,"bloque":2,"q":"El artículo 17 de la Constitución prohíbe la esclavitud. ¿Cuál es la formulación exacta?","opts":["Se prohíbe solo la esclavitud pero no la servidumbre","Se prohíben la esclavitud, la servidumbre y la trata de seres humanos en todas sus formas","Se prohíbe la esclavitud; la servidumbre puede ser pactada voluntariamente","Se prohíbe solo la trata de personas; la servidumbre y la esclavitud son reguladas por ley"],"ans":"B"},
    {"n":128,"bloque":2,"q":"El artículo 14 establece el derecho al reconocimiento de la personalidad jurídica. ¿A quiénes les corresponde?","opts":["Solo a los ciudadanos colombianos en ejercicio de sus derechos","Toda persona tiene derecho al reconocimiento de su personalidad jurídica","Solo a las personas naturales mayores de 18 años en ejercicio de sus derechos civiles","A las personas naturales y jurídicas que cumplan los requisitos del código civil"],"ans":"B"},
    {"n":129,"bloque":2,"q":"El artículo 27 consagra la libertad de enseñanza. ¿Cuál es su alcance?","opts":["Solo el Estado puede garantizar la libertad de enseñanza en instituciones oficiales","El Estado garantiza las libertades de enseñanza, aprendizaje, investigación y cátedra","La libertad de cátedra aplica solo en las universidades públicas y no en los establecimientos privados","La libertad de enseñanza se garantiza solo a los ciudadanos colombianos titulados"],"ans":"B"},
    {"n":130,"bloque":2,"q":"El artículo 26 consagra la libertad de ejercer profesiones. ¿Qué condiciones puede imponer la ley?","opts":["Ninguna; la libertad de ejercer profesiones es absoluta sin restricciones","La ley puede exigir títulos de idoneidad; las autoridades inspeccionarán y vigilarán el ejercicio de las profesiones; las ocupaciones, artes y oficios que no exijan formación académica son de libre ejercicio, salvo aquellas que impliquen un riesgo social","Solo se puede exigir título universitario de posgrado para ejercer profesiones liberales","La ley puede prohibir el ejercicio de cualquier profesión que considere inconveniente para la sociedad"],"ans":"B"},
    {"n":131,"bloque":2,"q":"El artículo 25 consagra el derecho al trabajo. ¿Cómo lo define y qué protección especial recibe?","opts":["El trabajo es solo una obligación social sin carácter de derecho subjetivo","El trabajo es un derecho y una obligación social y goza, en todas sus modalidades, de la especial protección del Estado; toda persona tiene derecho a un trabajo en condiciones dignas y justas","El derecho al trabajo es solo un derecho económico que puede ser restringido por razones de política pública","El derecho al trabajo solo se garantiza a los colombianos; los extranjeros tienen derechos laborales restringidos"],"ans":"B"},
    {"n":132,"bloque":2,"q":"El artículo 380 deroga la Constitución anterior. ¿Qué Constitución fue derogada?","opts":["La Constitución de 1886 fue derogada y la de 1991 entró en vigencia el 4 de julio de 1991","La Constitución de 1886 queda derogada; rige la Constitución promulgada el 4 de julio de 1991","La Constitución de 1863 fue derogada el 6 de julio de 1991","La Constitución de 1858 fue derogada y la nueva Constitución entró en vigencia el 20 de julio de 1991"],"ans":"A"},
    {"n":133,"bloque":2,"q":"El artículo 60 establece la democratización de la propiedad accionaria. ¿En qué consiste?","opts":["El Estado debe adquirir acciones en todas las empresas privadas para redistribuir la riqueza","El Estado promoverá el acceso a la propiedad; cuando enajene su participación en una empresa, tomará medidas para democratizar la titularidad de sus acciones ofreciéndolas a sus trabajadores, organizaciones solidarias y de trabajadores","El Estado debe transferir el 20% de las acciones de las empresas públicas a los trabajadores","El Estado debe crear fondos de acciones comunitarias administrados por las juntas de acción comunal"],"ans":"B"},
    {"n":134,"bloque":2,"q":"El artículo 93 y la jurisprudencia desarrollaron el concepto del corpus iuris en derechos humanos. ¿Qué implica?","opts":["Los derechos fundamentales solo pueden interpretarse conforme a la Constitución sin referencia al derecho internacional","Los derechos consagrados en la Constitución deben interpretarse de conformidad con los tratados internacionales de derechos humanos ratificados por Colombia, creando un corpus iuris de derechos que debe leerse de manera armónica y sistemática","El corpus iuris implica que los tratados de derechos humanos prevalecen sobre la Constitución en todos los casos","El corpus iuris solo aplica para la interpretación de derechos de minorías étnicas"],"ans":"B"},
    {"n":135,"bloque":2,"q":"El artículo 310 establece el régimen especial del Departamento Archipiélago de San Andrés. ¿Por qué tiene ese régimen especial?","opts":["Por ser el departamento más pequeño del país en extensión territorial","En consideración a su naturaleza insular, ubicación geográfica y características culturales; sus habitantes tienen derecho preferencial en los empleos y en el uso de los recursos naturales; la ley reglamentará el ingreso y permanencia de personas en este departamento","Por tener una economía especial basada en el turismo internacional","Por tener una zona económica exclusiva más extensa que la del resto del país"],"ans":"B"},
    {"n":136,"bloque":2,"q":"El artículo 36 consagra el derecho de asilo. ¿En qué términos?","opts":["El asilo es un derecho absoluto que Colombia debe conceder a todo extranjero que lo solicite","Se reconoce el derecho de asilo en los términos previstos en la ley","Colombia garantiza asilo solo a nacionales de países latinoamericanos conforme a los tratados regionales","El asilo político es competencia exclusiva del Presidente de la República sin control judicial"],"ans":"B"},
    {"n":137,"bloque":2,"q":"¿Qué significa que un derecho sea inalienable según el artículo 5° de la Constitución?","opts":["Que el derecho puede cederse pero no venderse en ninguna circunstancia","Que el derecho es inherente a la condición humana y no puede ser renunciado, transferido ni desconocido por el Estado o por el propio titular, pues constituye un atributo inseparable de la personalidad humana","Que el derecho solo puede ser limitado por el Congreso mediante ley estatutaria","Que el derecho tiene protección reforzada y solo puede ser suspendido durante estados de guerra"],"ans":"B"},
    {"n":138,"bloque":2,"q":"El artículo 79 establece el derecho a un ambiente sano. ¿Qué obligación tiene quien cause daño ambiental según la disposición constitucional?","opts":["Solo el Estado tiene la obligación de proteger el medio ambiente","Toda persona tiene derecho a gozar de un ambiente sano; es deber del Estado proteger la diversidad e integridad del ambiente; la ley regulará el control y la prevención del daño ambiental y quien lo cause deberá repararlo","Los daños ambientales solo son perseguibles penalmente pero no generan responsabilidad civil","El derecho a un ambiente sano es un derecho programático sin mecanismos de protección"],"ans":"B"},
    {"n":139,"bloque":2,"q":"El artículo 59 de la Constitución establece cuándo el Estado puede expropiar en caso de guerra. ¿Qué garantía tienen los afectados?","opts":["Durante la guerra el Estado puede expropiar sin ninguna obligación posterior","En caso de guerra, el Estado puede expropiar con motivo de ella; la propiedad inmueble podrá ser temporalmente ocupada cuando la necesidad lo exija para atender los gastos de guerra y para satisfacer necesidades de defensa; a los propietarios se les indemnizará una vez termine el conflicto","La expropiación en tiempo de guerra no requiere ni declaratoria de estado de excepción ni indemnización posterior","El Estado puede solo ocupar bienes durante la guerra sin efecto expropiatorio y con obligación de devolverlos"],"ans":"B"},
    {"n":140,"bloque":2,"q":"El artículo 56 de la Constitución regula el derecho de huelga. ¿Cuál es su formulación constitucional?","opts":["La huelga está totalmente prohibida en todos los servicios públicos y en las actividades estratégicas","Se garantiza el derecho de huelga, salvo en los servicios públicos esenciales definidos por el legislador; una comisión permanente integrada por Gobierno, representantes de empleadores y de los trabajadores fomentará las buenas relaciones laborales y contribuirá a la solución de los conflictos colectivos de trabajo","La huelga solo está permitida en el sector privado; los empleados públicos no tienen derecho a la huelga","La huelga está garantizada sin restricciones en todos los sectores de la economía nacional"],"ans":"B"},
    {"n":141,"bloque":2,"q":"El artículo 38 garantiza el derecho de libre asociación. ¿Cuál es su alcance?","opts":["Solo el derecho a fundar partidos políticos con personería jurídica","Se garantiza el derecho de libre asociación para el desarrollo de las distintas actividades que las personas realizan en sociedad","El derecho de asociación aplica exclusivamente para fines económicos o gremiales","El derecho de asociación requiere registro previo ante el Ministerio del Interior"],"ans":"B"},

        "D) Recibirá el incentivo del 20% y la garantía de pensión mínima del sistema general de pensiones simultáneamente como reconocimiento a sus 12 años de ahorro en BEPS"
      ],
      "ans": "B"
    }
  ]
});

let currentQuiz = null;
let currentIndex = 0;
let answers = {};
let answered = false;
let streak = 0;
const results = {};

function getScoreClass(r){
  if(r===undefined||r===null) return 'score-none';
  const pct=typeof r==='object'?r.pct:r;
  if(pct<50) return 'score-low';
  if(pct<80) return 'score-mid';
  return 'score-high';
}
function getScoreLabel(r){
  if(r===undefined||r===null) return 'Sin intentar';
  if(typeof r==='object') return r.pct+'%';
  return r+'%';
}
function getScoreDetail(r){
  if(r===undefined||r===null||typeof r!=='object') return '';
  return '<span style="color:var(--green);font-size:.78rem">✓'+r.correct+'</span>'
       +' <span style="color:var(--red);font-size:.78rem">✗'+r.wrong+'</span>';
}

function renderHome(){
  const grid = document.getElementById('quizzes-grid');
  grid.innerHTML = '';
  Object.entries(QUIZZES).forEach(([key, qdata])=>{
    const m = META[key]||{icon:'📝',color:'var(--blue)',desc:''};
    const pct = results[key]!==undefined ? results[key] : null;
    const sc = getScoreClass(pct);
    const n = qdata.questions.length;
    const nb = qdata.bloques.length;
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.innerHTML = `
      <div style="position:absolute;top:.9rem;right:.9rem;text-align:right">
        <span class="qc-score ${sc}">${getScoreLabel(pct)}</span>
        <div style="margin-top:3px">${getScoreDetail(pct)}</div>
      </div>
      <div class="qc-icon" style="background:${m.color}22;color:${m.color}">${m.icon}</div>
      <div class="qc-title">${qdata.name}</div>
      <p style="font-size:.82rem;color:var(--text2);margin:.4rem 0 .8rem;line-height:1.4">${m.desc}</p>
      <div class="qc-meta">
        <span>${n} preguntas</span>
        <span>${nb} bloques</span>
      </div>`;
    card.onclick = ()=> startQuiz(key);
    grid.appendChild(card);
  });
}

function startQuiz(key){
  currentQuiz = key;
  currentIndex = 0;
  answers = {};
  answered = false;
  streak = 0;
  showScreen('quiz');
  document.getElementById('topbar-title').textContent = QUIZZES[key].name;
  renderQuestion();
}

function getBloqueForQ(key, qNum){
  const qs = QUIZZES[key].questions;
  const bloques = QUIZZES[key].bloques;
  if(!bloques.length) return '';
  // Find which bloque range contains this question
  const idx = qs.findIndex(q=>q.n===qNum);
  const perBloque = Math.ceil(qs.length / bloques.length);
  const bi = Math.min(Math.floor(idx/perBloque), bloques.length-1);
  return bloques[bi] || '';
}

function renderQuestion(){
  const qdata = QUIZZES[currentQuiz];
  const q = qdata.questions[currentIndex];
  const total = qdata.questions.length;
  const pct = Math.round((currentIndex/total)*100);

  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent = `${currentIndex+1}/${total}`;
  document.getElementById('bloque-label').textContent = getBloqueForQ(currentQuiz, q.n).replace(/\s*\(\d+[–-]\d+\)\s*$/, '');
  document.getElementById('q-counter').textContent = `Pregunta ${q.n} de ${total}`;
  document.getElementById('q-text').textContent = q.q;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = ()=> selectOption(letters[i], q.ans);
    list.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none';
  fb.className = 'feedback-box';

  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentIndex < total-1 ? 'Siguiente →' : 'Ver resultados';
  btnNext.disabled = true;

  answered = false;
  document.getElementById('streak-info').textContent = streak>1 ? `🔥 Racha: ${streak} correctas` : '';
}

function selectOption(letter, correct){
  if(answered) return;
  answered = true;
  answers[currentIndex] = letter;

  const isCorrect = letter === correct;
  if(isCorrect) streak++; else streak=0;

  const btns = document.querySelectorAll('.option-btn');
  const letters = ['A','B','C','D'];
  btns.forEach((btn,i)=>{
    btn.disabled = true;
    if(letters[i]===letter && isCorrect) btn.classList.add('correct');
    else if(letters[i]===letter && !isCorrect) btn.classList.add('wrong');
    else if(letters[i]===correct && !isCorrect) btn.classList.add('show-correct');
  });

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'block';
  if(isCorrect){
    fb.className = 'feedback-box correct';
    const msgs = ['¡Correcto!','¡Exacto!','¡Muy bien!','¡Perfecto!'];
    fb.innerHTML = `<span class="feedback-icon">✓</span>${msgs[Math.floor(Math.random()*msgs.length)]}`;
  } else {
    fb.className = 'feedback-box wrong';
    fb.innerHTML = `<span class="feedback-icon">✗</span>Incorrecto. La respuesta correcta es <strong>${correct}</strong>.`;
  }

  document.getElementById('btn-next').disabled = false;
  document.getElementById('streak-info').textContent = streak>1 ? `🔥 Racha: ${streak} correctas` : '';
}

function nextQuestion(){
  const total = QUIZZES[currentQuiz].questions.length;
  if(currentIndex < total-1){
    currentIndex++;
    renderQuestion();
    window.scrollTo(0,0);
  } else {
    showResults();
  }
}

function showResults(){
  const qdata = QUIZZES[currentQuiz];
  const qs = qdata.questions;
  let correct=0, wrong=0;
  qs.forEach((q,i)=>{
    if(answers[i]===q.ans) correct++; else wrong++;
  });
  const pct = Math.round((correct/qs.length)*100);
  results[currentQuiz] = {pct, correct, wrong};

  // Score circle color
  const circle = document.getElementById('score-circle');
  let cc = pct>=80?'#2ecc71':pct>=50?'#f39c12':'#e74c3c';
  circle.style.background = cc+'22';
  circle.style.border = '3px solid '+cc;
  document.getElementById('score-pct').style.color = cc;
  document.getElementById('score-pct').textContent = pct+'%';

  const msg = pct>=90?'¡Excelente dominio!':pct>=75?'¡Buen resultado!':pct>=50?'Resultado aprobatorio':'Necesitas repasar';
  document.getElementById('results-title').textContent = msg;
  document.getElementById('results-sub').textContent = `${qdata.name}`;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-total').textContent = qs.length;
  document.getElementById('stat-pct').textContent = pct+'%';

  renderReview('all');
  showScreen('results');
  window.scrollTo(0,0);
}

let currentFilter = 'all';
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.btn-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderReview(f);
}

function renderReview(filter){
  const qs = QUIZZES[currentQuiz].questions;
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  const letters = ['A','B','C','D'];
  let shown = 0;
  qs.forEach((q,i)=>{
    const userAns = answers[i];
    const ok = userAns === q.ans;
    if(filter==='ok' && !ok) return;
    if(filter==='fail' && ok) return;
    shown++;
    const item = document.createElement('div');
    item.className = 'review-item '+(ok?'ok':'fail');
    const userOptIdx = letters.indexOf(userAns);
    const corrOptIdx = letters.indexOf(q.ans);
    item.innerHTML = `
      <div class="review-q"><strong>P${q.n}.</strong> ${q.q}</div>
      <div class="review-ans">
        ${ok
          ? `<span class="review-ok-lbl">✓ ${userAns}. ${q.opts[corrOptIdx]||''}</span>`
          : `<span class="review-your">✗ Tu respuesta: ${userAns}. ${userOptIdx>=0?q.opts[userOptIdx]:''}</span>
             <span class="review-correct">✓ Correcta: ${q.ans}. ${corrOptIdx>=0?q.opts[corrOptIdx]:''}</span>`
        }
      </div>`;
    list.appendChild(item);
  });
  document.getElementById('review-heading').textContent =
    filter==='all'?`Revisión de todas las respuestas (${shown})`:
    filter==='fail'?`Respuestas incorrectas (${shown})`:
    `Respuestas correctas (${shown})`;
}

function retryQuiz(){ startQuiz(currentQuiz); }

function goHome(){
  showScreen('home');
  renderHome();
}

function showScreen(s){
  ['home','quiz','results'].forEach(id=>{
    const el = document.getElementById('screen-'+id);
    el.style.display = (id===s)?'flex':'none';
  });
}

renderHome();
</script>
