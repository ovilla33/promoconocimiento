<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionarios Colpensiones</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#181c25;--surface2:#1e2333;--surface3:#252b3b;
  --border:#2a3045;--border2:#3a4260;
  --text:#e8eaf0;--text2:#9ba3c0;--text3:#5a6380;
  --blue:#4a90e2;--blue2:#2d6bb5;--blue-bg:#1a2540;
  --green:#2ecc71;--green-bg:#0d2b1a;--green2:#1a6b3a;
  --red:#e74c3c;--red-bg:#2b0d0d;--red2:#8b2020;
  --amber:#f39c12;--amber-bg:#2b1d06;
  --purple:#9b59b6;--purple-bg:#1e0f2b;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* ── HOME ── */
#screen-home{display:flex;flex-direction:column;min-height:100vh}
.home-header{padding:3rem 2rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
.home-header h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-0.5px;color:var(--text);margin-bottom:.5rem}
.home-header p{color:var(--text2);font-size:.95rem}
.logo-ring{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-size:1.5rem}

.quizzes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;padding:2rem;flex:1}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.quiz-card:hover{border-color:var(--blue);background:var(--surface2);transform:translateY(-2px);box-shadow:var(--shadow)}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--purple));opacity:0;transition:.18s}
.quiz-card:hover::before{opacity:1}
.qc-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:1rem}
.qc-title{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:.3rem;line-height:1.3}
.qc-meta{font-size:.82rem;color:var(--text2);display:flex;gap:.6rem;flex-wrap:wrap}
.qc-meta span{background:var(--surface3);padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
.qc-score{position:absolute;top:1rem;right:1rem;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px}
.score-none{background:var(--surface3);color:var(--text3);border:1px solid var(--border)}
.score-low{background:var(--red-bg);color:var(--red);border:1px solid var(--red2)}
.score-mid{background:var(--amber-bg);color:var(--amber);border:1px solid #6b4010}
.score-high{background:var(--green-bg);color:var(--green);border:1px solid var(--green2)}

/* ── QUIZ SCREEN ── */
#screen-quiz{display:none;flex-direction:column;min-height:100vh}
.quiz-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
.btn-back{background:none;border:1px solid var(--border);color:var(--text2);padding:.35rem .8rem;border-radius:var(--radius-xs);cursor:pointer;font-size:.85rem;transition:all .15s;white-space:nowrap}
.btn-back:hover{border-color:var(--border2);color:var(--text)}
.quiz-topbar-title{font-weight:600;font-size:.9rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-wrap{flex:1;max-width:200px;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:3px;transition:width .3s}
.progress-label{font-size:.8rem;color:var(--text2);white-space:nowrap}

.quiz-body{flex:1;max-width:780px;width:100%;margin:0 auto;padding:2rem 1.5rem}

.bloque-label{font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:.5rem}
.question-counter{font-size:.82rem;color:var(--text3);margin-bottom:.4rem}
.question-text{font-size:1.05rem;font-weight:500;color:var(--text);line-height:1.65;margin-bottom:1.5rem}

.options-list{display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}
.option-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1.1rem;cursor:pointer;text-align:left;color:var(--text);font-size:.9rem;line-height:1.5;transition:all .15s;display:flex;gap:.75rem;align-items:flex-start}
.option-btn:hover:not(:disabled){border-color:var(--blue);background:var(--blue-bg)}
.option-letter{width:24px;min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px}
.option-btn:hover:not(:disabled) .option-letter{border-color:var(--blue);color:var(--blue)}
.option-btn.correct{border-color:var(--green);background:var(--green-bg)}
.option-btn.correct .option-letter{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.15)}
.option-btn.wrong{border-color:var(--red);background:var(--red-bg)}
.option-btn.wrong .option-letter{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.15)}
.option-btn.show-correct{border-color:var(--green);background:var(--green-bg);opacity:.7}
.option-btn:disabled{cursor:default}

.feedback-box{padding:1rem 1.2rem;border-radius:var(--radius-sm);margin-bottom:1.5rem;display:none;font-size:.9rem;line-height:1.5}
.feedback-box.correct{background:var(--green-bg);border:1px solid var(--green2);color:#7fffb0}
.feedback-box.wrong{background:var(--red-bg);border:1px solid var(--red2);color:#ffaaaa}
.feedback-icon{font-size:1.1rem;margin-right:.5rem}

.quiz-nav{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;border-top:1px solid var(--border)}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:.6rem 1.4rem;border-radius:var(--radius-xs);cursor:pointer;font-size:.9rem;font-weight:500;transition:all .15s}
.btn-primary:hover{background:var(--blue2)}
.btn-primary:disabled{opacity:.4;cursor:default}

/* ── RESULTS SCREEN ── */
#screen-results{display:none;flex-direction:column;min-height:100vh}
.results-header{padding:3rem 2rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}
.score-circle .pct{font-size:2rem;font-weight:700;line-height:1}
.score-circle .lbl{font-size:.75rem;color:var(--text2);margin-top:.2rem}
.results-title{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.results-sub{color:var(--text2);font-size:.9rem}

.stats-row{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;padding:1.5rem 2rem;border-bottom:1px solid var(--border)}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1.5rem;text-align:center;min-width:100px}
.stat-val{font-size:1.5rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.stat-lbl{font-size:.75rem;color:var(--text2);margin-top:.2rem}

.review-section{max-width:780px;width:100%;margin:0 auto;padding:2rem 1.5rem}
.review-section h3{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.2rem;margin-bottom:.75rem}
.review-item.ok{border-left:3px solid var(--green)}
.review-item.fail{border-left:3px solid var(--red)}
.review-q{font-size:.88rem;color:var(--text);margin-bottom:.5rem;line-height:1.5}
.review-ans{font-size:.82rem;display:flex;gap:1rem;flex-wrap:wrap}
.review-your{color:var(--red)}
.review-correct{color:var(--green)}
.review-ok-lbl{color:var(--green);font-size:.82rem}

.results-actions{display:flex;gap:.75rem;justify-content:center;padding:2rem;flex-wrap:wrap}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.6rem 1.4rem;border-radius:var(--radius-xs);cursor:pointer;font-size:.9rem;font-weight:500;transition:all .15s}
.btn-secondary:hover{border-color:var(--border2);background:var(--surface2)}
.btn-filter{background:none;border:1px solid var(--border);color:var(--text2);padding:.3rem .8rem;border-radius:20px;cursor:pointer;font-size:.8rem;transition:all .15s}
.btn-filter.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.filter-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home">
  <div class="home-header">
    <div class="logo-ring">🎓</div>
    <h1>Centro de Evaluación</h1>
    <p>Colpensiones — Cuestionarios de conocimiento institucional</p>
  </div>
  <div class="quizzes-grid" id="quizzes-grid"></div>
</div>

<!-- QUIZ -->
<div id="screen-quiz">
  <div class="quiz-topbar">
    <button class="btn-back" onclick="goHome()">← Inicio</button>
    <span class="quiz-topbar-title" id="topbar-title"></span>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label"></span>
  </div>
  <div class="quiz-body">
    <div class="bloque-label" id="bloque-label"></div>
    <div class="question-counter" id="q-counter"></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-list" id="options-list"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <div class="quiz-nav">
      <span id="streak-info" style="font-size:.82rem;color:var(--text2)"></span>
      <button class="btn-primary" id="btn-next" onclick="nextQuestion()">Siguiente →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="screen-results">
  <div class="results-header">
    <div class="score-circle" id="score-circle">
      <span class="pct" id="score-pct"></span>
      <span class="lbl">correcto</span>
    </div>
    <div class="results-title" id="results-title"></div>
    <div class="results-sub" id="results-sub"></div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="stat-correct" style="color:var(--green)"></div><div class="stat-lbl">Correctas</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-wrong" style="color:var(--red)"></div><div class="stat-lbl">Incorrectas</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-total"></div><div class="stat-lbl">Total</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-pct" style="color:var(--amber)"></div><div class="stat-lbl">Porcentaje</div></div>
  </div>
  <div class="review-section">
    <div class="filter-row">
      <button class="btn-filter active" onclick="setFilter('all',this)">Todas</button>
      <button class="btn-filter" onclick="setFilter('fail',this)">Solo incorrectas</button>
      <button class="btn-filter" onclick="setFilter('ok',this)">Solo correctas</button>
    </div>
    <h3 id="review-heading">Revisión de respuestas</h3>
    <div id="review-list"></div>
  </div>
  <div class="results-actions">
    <button class="btn-primary" onclick="retryQuiz()">↺ Repetir cuestionario</button>
    <button class="btn-secondary" onclick="goHome()">← Volver al inicio</button>
  </div>
</div>

<script>
const QUIZZES = {"disciplinario": {"name": "Derecho Disciplinario — Ley 1952 de 2019", "bloques": ["BLOQUE 1 — GENERALIDADES DE LA LEY 1952 DE 2019  (Preguntas 1–20)", "BLOQUE 2 — ETAPA DE JUZGAMIENTO  (Preguntas 21–40)"], "questions": [{"n": 1, "q": "¿Cuál es el objeto principal de la Ley 1952 de 2019?", "opts": ["A. Crear el Código Penal Colombiano para servidores públicos.", "B. Regular el ejercicio de la potestad disciplinaria del Estado y garantizar el cumplimiento de los deberes funcionales de los servidores públicos y de los particulares que ejercen funciones públicas.", "C. Establecer el régimen salarial de los funcionarios públicos.", "D. Reglamentar exclusivamente el proceso disciplinario de la Procuraduría General de la Nación."], "ans": "B"}, {"n": 2, "q": "Conforme a la Ley 1952 de 2019, ¿quiénes son destinatarios de la ley disciplinaria?", "opts": ["A. Únicamente los empleados de carrera administrativa del orden nacional.", "B. Los servidores públicos, los particulares que ejercen funciones públicas y los gerentes o directores de las empresas industriales y comerciales del Estado.", "C. Solo los funcionarios elegidos por voto popular.", "D. Los trabajadores del sector privado que presten servicios al Estado mediante contrato."], "ans": "B"}, {"n": 3, "q": "¿Cuál de los siguientes principios rectores NO está expresamente consagrado en la Ley 1952 de 2019?", "opts": ["A. Legalidad.", "B. Culpabilidad.", "C. Proporcionalidad.", "D. Oportunidad procesal como regla general."], "ans": "D"}, {"n": 4, "q": "Según la Ley 1952 de 2019, las faltas disciplinarias se clasifican en:", "opts": ["A. Leves, moderadas y graves.", "B. Gravísimas, graves y leves.", "C. Dolosas, culposas y preterintencionales.", "D. Objetivas y subjetivas."], "ans": "B"}, {"n": 5, "q": "¿Cuál es la regla general sobre culpabilidad establecida en la Ley 1952 de 2019?", "opts": ["A. La responsabilidad disciplinaria es objetiva.", "B. Solo se puede sancionar a título de dolo.", "C. Solo se responde por las conductas realizadas con dolo o culpa; queda proscrita toda forma de responsabilidad objetiva.", "D. La culpa levísima genera la misma consecuencia que el dolo."], "ans": "C"}, {"n": 6, "q": "Conforme a la Ley 1952 de 2019, ¿cuál es la diferencia entre culpa gravísima y culpa grave?", "opts": ["A. La culpa gravísima implica ignorancia supina, desatención elemental o violación manifiesta de reglas de obligatorio cumplimiento; la culpa grave es la falta de cuidado que un hombre de mediana diligencia habría evitado.", "B. La culpa gravísima se produce solo por acción; la culpa grave, por omisión.", "C. Son conceptos equivalentes en el derecho disciplinario colombiano.", "D. La culpa gravísima solo aplica para faltas gravísimas; la culpa grave, únicamente para faltas leves."], "ans": "A"}, {"n": 7, "q": "¿Cuál es el término general de prescripción de la acción disciplinaria para las faltas gravísimas y graves según la Ley 1952 de 2019?", "opts": ["A. 3 años contados desde la comisión de la falta.", "B. 5 años contados desde la ocurrencia del hecho.", "C. 5 años contados desde la comisión de la falta o, si es de carácter permanente o continuado, desde la realización del último acto.", "D. 10 años en todos los casos."], "ans": "C"}, {"n": 8, "q": "Las sanciones principales previstas en la Ley 1952 de 2019 son:", "opts": ["A. Destitución, suspensión, multa y amonestación escrita.", "B. Destitución e inhabilidad general, suspensión e inhabilidad especial, multa y amonestación escrita.", "C. Solo destitución y multa.", "D. Inhabilitación general, multa y llamado de atención."], "ans": "B"}, {"n": 9, "q": "¿A qué falta disciplinaria corresponde, como regla general, la sanción de destitución e inhabilidad general según la Ley 1952 de 2019?", "opts": ["A. A las faltas leves cometidas con dolo.", "B. A las faltas graves cometidas con culpa gravísima.", "C. A las faltas gravísimas dolosas o realizadas con culpa gravísima.", "D. A cualquier falta cuando el servidor lleve más de 10 años vinculado."], "ans": "C"}, {"n": 10, "q": "Conforme a la Ley 1952 de 2019, ¿cuál es el término máximo de la inhabilidad general?", "opts": ["A. 5 años.", "B. 10 años.", "C. 20 años.", "D. Permanente."], "ans": "C"}, {"n": 11, "q": "¿Qué se entiende por falta disciplinaria según la Ley 1952 de 2019?", "opts": ["A. El incumplimiento de los deberes, la extralimitación en el ejercicio de derechos y funciones, la prohibición y la violación del régimen de inhabilidades, incompatibilidades, impedimentos y conflictos de intereses.", "B. Cualquier conducta del servidor público que cause daño al Estado.", "C. Únicamente la comisión de delitos en el ejercicio de las funciones.", "D. La omisión de rendir informes a los órganos de control."], "ans": "A"}, {"n": 12, "q": "¿Qué principio del derecho disciplinario garantiza que nadie puede ser investigado dos veces por el mismo hecho?", "opts": ["A. Principio de favorabilidad.", "B. Principio non bis in idem.", "C. Principio de legalidad.", "D. Principio de proporcionalidad."], "ans": "B"}, {"n": 13, "q": "Según la Ley 1952 de 2019, la competencia disciplinaria preferente corresponde a:", "opts": ["A. Las personerías municipales.", "B. La Procuraduría General de la Nación.", "C. La Contraloría General de la República.", "D. El Consejo Superior de la Judicatura."], "ans": "B"}, {"n": 14, "q": "¿Cuál es la consecuencia jurídica del vencimiento del término de prescripción de la acción disciplinaria?", "opts": ["A. La actuación continúa pero con efectos meramente declarativos.", "B. La acción disciplinaria se extingue y debe proferirse decisión inhibitoria, archivo o cesación de procedimiento.", "C. Se suspende el proceso hasta nuevo requerimiento.", "D. El disciplinado asume responsabilidad objetiva automáticamente."], "ans": "B"}, {"n": 15, "q": "¿Cuál de las siguientes causales es una causal de exclusión de la responsabilidad disciplinaria conforme a la Ley 1952 de 2019?", "opts": ["A. La embriaguez voluntaria.", "B. El caso fortuito o fuerza mayor.", "C. La ignorancia del derecho cuando el servidor lleva menos de un año vinculado.", "D. La presión mediática sobre el funcionario."], "ans": "B"}, {"n": 16, "q": "Conforme a la Ley 1952 de 2019, ¿cuál es la regla sobre la aplicación de la ley disciplinaria en el tiempo?", "opts": ["A. Siempre se aplica la ley vigente al momento de la sanción.", "B. Se aplica la ley vigente al momento de la comisión de la falta; si la posterior es más favorable al disciplinado, se aplicará esta última.", "C. Se aplica exclusivamente la ley vigente al momento de la comisión de la falta, sin excepción.", "D. La retroactividad está prohibida en todos los casos."], "ans": "B"}, {"n": 17, "q": "Las faltas disciplinarias leves cometidas con culpa se sancionan con:", "opts": ["A. Destitución.", "B. Suspensión e inhabilidad especial.", "C. Amonestación escrita.", "D. Multa de hasta 90 días de salario."], "ans": "C"}, {"n": 18, "q": "¿Qué criterios se deben tener en cuenta para la graduación de la sanción disciplinaria según la Ley 1952 de 2019?", "opts": ["A. Únicamente la gravedad de la falta y el daño causado.", "B. La modalidad de la conducta, la naturaleza esencial del servicio, el grado de perturbación, la jerarquía del servidor, los antecedentes, las circunstancias de tiempo, modo y lugar, entre otros.", "C. Solo el nivel salarial y la antigüedad del servidor.", "D. Exclusivamente el número de faltas cometidas con anterioridad."], "ans": "B"}, {"n": 19, "q": "Según la Ley 1952 de 2019, ¿qué son las faltas gravísimas?", "opts": ["A. Las conductas que el operador disciplinario considere más dañinas para el servicio.", "B. Las conductas expresamente descritas como tales en la ley disciplinaria o en otras leyes, taxativamente.", "C. Todas las faltas cometidas con dolo, independientemente de su descripción legal.", "D. Las faltas que ocasionen daño patrimonial al Estado superior a 500 SMLMV."], "ans": "B"}, {"n": 20, "q": "¿Cuál es la regla general sobre el ejercicio de la acción disciplinaria frente a conductas que también constituyen delito?", "opts": ["A. La acción disciplinaria no procede cuando la conducta ya fue investigada penalmente.", "B. La acción disciplinaria es independiente de la penal y la absolución o preclusión penal no inhibe el ejercicio de la acción disciplinaria.", "C. La condena penal hace innecesaria la sanción disciplinaria.", "D. El proceso disciplinario debe suspenderse hasta que culmine el proceso penal."], "ans": "B"}, {"n": 21, "q": "¿Con qué acto procesal se inicia formalmente la etapa de juzgamiento en el proceso disciplinario ordinario conforme a la Ley 1952 de 2019?", "opts": ["A. Con el auto de apertura de investigación.", "B. Con el auto que decide sobre la procedencia del pliego de cargos y lo traslada al funcionario de juzgamiento.", "C. Con la calificación del mérito sumarial proferida por el instructor.", "D. Con la presentación del pliego de cargos por parte del investigador y su traslado al funcionario de juzgamiento."], "ans": "D"}, {"n": 22, "q": "¿Cuánto tiempo tiene el disciplinado para presentar descargos una vez notificado del pliego de cargos en el proceso ordinario según la Ley 1952 de 2019?", "opts": ["A. 5 días hábiles.", "B. 10 días hábiles.", "C. 15 días hábiles.", "D. 30 días hábiles."], "ans": "C"}, {"n": 23, "q": "Durante la etapa de juzgamiento, ¿qué puede solicitar el disciplinado al presentar sus descargos?", "opts": ["A. Únicamente nulidades procesales.", "B. La práctica de pruebas, las nulidades que se hayan originado en la etapa de investigación y que no hayan sido saneadas, así como cualquier otro medio de defensa.", "C. Solo la recusación del funcionario de juzgamiento.", "D. Exclusivamente la prescripción de la acción disciplinaria."], "ans": "B"}, {"n": 24, "q": "Conforme a la Ley 1952 de 2019, ¿cuál es el término para la práctica de pruebas en la etapa de juzgamiento en el proceso ordinario?", "opts": ["A. 30 días hábiles prorrogables por 30 días más.", "B. 90 días hábiles prorrogables hasta por otros 90 días.", "C. 60 días hábiles improrrogables.", "D. 15 días hábiles prorrogables por 10 días más."], "ans": "A"}, {"n": 25, "q": "¿Qué sucede si el disciplinado no presenta descargos dentro del término legal en el proceso ordinario?", "opts": ["A. Se declara desierta la defensa y se profiere fallo sin más trámite.", "B. El proceso continúa su trámite y se entiende que el disciplinado guarda silencio, sin que ello implique aceptación de los cargos.", "C. Se aplica la confesión ficta de los cargos.", "D. Se suspende el proceso hasta que el disciplinado comparezca."], "ans": "B"}, {"n": 26, "q": "¿Cuál es la decisión de fondo que puede proferir el funcionario de juzgamiento al finalizar la etapa de juzgamiento según la Ley 1952 de 2019?", "opts": ["A. Únicamente fallo sancionatorio o absolutorio.", "B. Fallo sancionatorio, absolutorio o de cesación de procedimiento.", "C. Solo archivo o sanción.", "D. Pliego de cargos definitivo o archivo definitivo."], "ans": "B"}, {"n": 27, "q": "¿Contra qué decisiones procede el recurso de apelación en la etapa de juzgamiento del proceso ordinario conforme a la Ley 1952 de 2019?", "opts": ["A. Contra todos los autos interlocutorios proferidos en juzgamiento.", "B. Contra el fallo de primera instancia, el auto que decrete nulidades y el que deniegue pruebas.", "C. Solo contra el fallo sancionatorio.", "D. Contra el fallo de primera y segunda instancia."], "ans": "B"}, {"n": 28, "q": "En el proceso disciplinario verbal de la Ley 1952 de 2019, ¿cuándo se adelanta la audiencia de juzgamiento?", "opts": ["A. Dentro de los 30 días hábiles siguientes al vencimiento del término de descargos.", "B. Dentro de los 15 días hábiles siguientes a la formulación de cargos.", "C. Inmediatamente después de que el disciplinado presenta sus descargos oralmente.", "D. En una audiencia pública convocada por el Procurador General."], "ans": "B"}, {"n": 29, "q": "¿Cuál es el término con que cuenta el funcionario de juzgamiento para proferir fallo de primera instancia en el proceso ordinario según la Ley 1952 de 2019?", "opts": ["A. 30 días hábiles contados desde el vencimiento del término para alegar de conclusión.", "B. 60 días hábiles desde el cierre de la etapa probatoria.", "C. 90 días calendario desde la calificación del mérito.", "D. 15 días hábiles desde el traslado para alegatos."], "ans": "A"}, {"n": 30, "q": "Conforme a la Ley 1952 de 2019, ¿en qué casos procede el proceso verbal disciplinario?", "opts": ["A. En todos los procesos disciplinarios independientemente de la gravedad de la falta.", "B. Cuando el sujeto disciplinable sea sorprendido en flagrancia, o cuando exista confesión, o cuando la falta sea leve.", "C. Solo cuando el disciplinado renuncia a la etapa de investigación.", "D. Únicamente para faltas gravísimas cometidas por funcionarios de libre nombramiento y remoción."], "ans": "B"}, {"n": 31, "q": "¿Qué es el traslado para alegatos de conclusión en la etapa de juzgamiento y cuál es su término en el proceso ordinario?", "opts": ["A. Es la oportunidad para que las partes soliciten nuevas pruebas; tiene un término de 10 días hábiles.", "B. Es la oportunidad que tienen el disciplinado y el Ministerio Público para presentar sus argumentos finales antes del fallo; tiene un término de 10 días hábiles comunes.", "C. Es la etapa en que el operador disciplinario revisa las pruebas; no tiene término definido.", "D. Es el traslado de la investigación al superior jerárquico; tiene 5 días hábiles."], "ans": "B"}, {"n": 32, "q": "Según la Ley 1952 de 2019, ¿puede el funcionario de juzgamiento decretar pruebas de oficio durante la etapa de juzgamiento?", "opts": ["A. No, solo puede valorar las pruebas aportadas por las partes.", "B. Sí, en cualquier etapa del proceso puede decretar de oficio las pruebas que estime conducentes y pertinentes para el esclarecimiento de la verdad.", "C. Solo si el disciplinado lo autoriza expresamente.", "D. Únicamente si el Ministerio Público lo solicita."], "ans": "B"}, {"n": 33, "q": "¿Cuál es el efecto del recurso de apelación contra el fallo sancionatorio de primera instancia en el proceso ordinario de la Ley 1952 de 2019?", "opts": ["A. Efecto suspensivo, impidiendo la ejecución del fallo hasta tanto se resuelva la segunda instancia.", "B. Efecto devolutivo, permitiendo la ejecución del fallo mientras se resuelve la apelación.", "C. Efecto diferido.", "D. No tiene efecto definido; depende del criterio del funcionario de segunda instancia."], "ans": "A"}, {"n": 34, "q": "Conforme a la Ley 1952 de 2019, ¿qué contiene el pliego de cargos como requisito esencial para iniciar la etapa de juzgamiento?", "opts": ["A. Únicamente la descripción de la falta y la sanción a imponer.", "B. La descripción y determinación de la conducta, su calificación jurídica provisional, la modalidad de la falta, la identificación del disciplinado, el análisis de culpabilidad y la indicación de las pruebas que la sustentan.", "C. Solo la norma violada y el nombre del funcionario.", "D. La relación de antecedentes disciplinarios del servidor y la propuesta de sanción."], "ans": "B"}, {"n": 35, "q": "En el proceso verbal de la Ley 1952 de 2019, ¿cuántas audiencias conforman la etapa de juzgamiento?", "opts": ["A. Una sola audiencia en la que se formulan cargos, se escuchan descargos, se practican pruebas y se falla.", "B. Dos audiencias: una de formulación de cargos y práctica de pruebas, y otra de fallo.", "C. Tres audiencias: formulación de cargos, práctica de pruebas y fallo.", "D. Cuatro audiencias distribuidas a lo largo del proceso."], "ans": "B"}, {"n": 36, "q": "¿Cuál es la regla sobre la reformatio in pejus en el proceso disciplinario conforme a la Ley 1952 de 2019?", "opts": ["A. El superior puede agravar la sanción de oficio aunque solo el disciplinado haya apelado.", "B. Cuando el disciplinado es apelante único, el superior no puede agravar la sanción impuesta.", "C. La reformatio in pejus no aplica en derecho disciplinario.", "D. El superior siempre puede modificar la sanción en cualquier sentido."], "ans": "B"}, {"n": 37, "q": "¿Qué recurso procede contra el fallo de segunda instancia en el proceso disciplinario ordinario de la Ley 1952 de 2019?", "opts": ["A. Recurso de casación ante la Corte Suprema de Justicia.", "B. El fallo de segunda instancia no admite recursos ordinarios; procede la acción de nulidad y restablecimiento del derecho ante la Jurisdicción Contencioso Administrativa.", "C. Recurso de súplica ante el Procurador General.", "D. Recurso de revisión ante el Consejo de Estado de manera directa."], "ans": "B"}, {"n": 38, "q": "Conforme a la Ley 1952 de 2019, ¿qué nulidades pueden alegarse durante la etapa de juzgamiento?", "opts": ["A. Solo las surgidas con posterioridad al pliego de cargos.", "B. Las ocurridas a partir de la investigación disciplinaria que no hayan sido saneadas, y las originadas en la etapa de juzgamiento.", "C. Únicamente la nulidad por falta de competencia.", "D. Las nulidades no son procedentes en la etapa de juzgamiento."], "ans": "B"}, {"n": 39, "q": "¿En qué consiste la figura del 'acuerdo de terminación del proceso' contemplada en la Ley 1952 de 2019 dentro del proceso verbal?", "opts": ["A. Es un mecanismo por el cual el disciplinado acepta los cargos a cambio de una reducción de la sanción hasta en la mitad.", "B. Es una conciliación entre el disciplinado y el Estado para extinguir la acción disciplinaria.", "C. Es el acuerdo entre la entidad y el disciplinado para archivar el proceso sin sanción.", "D. Es la facultad del operador de terminar el proceso si el daño fue reparado integralmente."], "ans": "A"}, {"n": 40, "q": "¿Cuál es el término con que cuenta el funcionario de segunda instancia para resolver el recurso de apelación contra un fallo ordinario según la Ley 1952 de 2019?", "opts": ["A. 15 días hábiles.", "B. 30 días hábiles.", "C. 45 días hábiles.", "D. 60 días hábiles."], "ans": "D"}]}, "riesgos": {"name": "Gestión de Riesgos y Ciberseguridad", "bloques": ["BLOQUE 1 — FUNDAMENTOS DEL PCN: OBJETO, ALCANCE Y DEFINICIONES  (1–13)", "BLOQUE 2 — POLÍTICAS DEL PCN  (14–24)", "BLOQUE 3 — ESTRUCTURA, COMITÉS Y EQUIPOS DEL PCN  (25–37)", "BLOQUE 4 — ADMINISTRACIÓN DE INCIDENTES Y CRISIS  (38–52)", "BLOQUE 5 — SISTEMA DE ADMINISTRACIÓN DEL RIESGO DE FRAUDE Y CORRUPCIÓN (SARFC)  (53–67)", "BLOQUE 6 — RESPONSABILIDADES, ACTUALIZACIÓN Y MARCO NORMATIVO  (68–80)"], "questions": [{"n": 1, "q": "¿Cuál es el objetivo general del Plan de Continuidad del Negocio (PCN) de Colpensiones?", "opts": ["A. Prevenir exclusivamente los ataques cibernéticos a la plataforma tecnológica.", "B. Administrar la continuidad del negocio y recuperar las operaciones críticas en el menor tiempo posible, gestionando eventos inesperados y protegiendo personas y activos.", "C. Reemplazar el Sistema de Gestión de Calidad ante situaciones de emergencia.", "D. Definir el régimen sancionatorio para los funcionarios que incumplan protocolos de seguridad."], "ans": "B"}, {"n": 2, "q": "¿A qué procesos aplica el alcance del PCN de Colpensiones?", "opts": ["A. A todos los procesos administrativos y de apoyo de la entidad.", "B. Exclusivamente a los procesos del área de tecnología.", "C. A los procesos esenciales del negocio que soportan el RPM y los BEPS, identificados en el BIA.", "D. Solo a los procesos de atención al ciudadano en las oficinas regionales."], "ans": "C"}, {"n": 3, "q": "¿Qué norma internacional de gestión de continuidad del negocio ha adoptado Colpensiones como referencia?", "opts": ["A. ISO 31000.", "B. ISO 27001.", "C. ISO 22301.", "D. ISO 9001."], "ans": "C"}, {"n": 4, "q": "¿Qué es el Análisis de Impacto al Negocio (BIA) según el manual del PCN?", "opts": ["A. El procedimiento de auditoría interna que evalúa los controles tecnológicos.", "B. El proceso de analizar todas las funciones del negocio y el efecto que un desastre puede tener sobre ellas, determinando el impacto operacional y financiero.", "C. El inventario de activos críticos de información de la entidad.", "D. El plan de capacitación para los equipos de continuidad del negocio."], "ans": "B"}, {"n": 5, "q": "¿Cómo se define el RPO (Recovery Point Objective) en el manual del PCN?", "opts": ["A. El tiempo máximo aceptable que una función puede estar sin operar antes de impactar al negocio.", "B. La máxima cantidad de datos a la que está dispuesta a perder la entidad luego de un incidente, medida como el punto en el tiempo en que los datos deben ser restaurados.", "C. El tiempo estimado para trasladar la operación a la sede alterna.", "D. El tiempo mínimo requerido para activar el Centro de Datos Alterno."], "ans": "B"}, {"n": 6, "q": "¿Cómo se define el RTO (Recovery Time Objective) en el manual del PCN?", "opts": ["A. El tiempo mínimo de respaldo de información antes de un incidente.", "B. La cantidad máxima de datos que puede perder la entidad.", "C. El tiempo máximo aceptable que una función de negocios puede estar sin ofrecer sus servicios antes de que impacte severamente al negocio.", "D. El tiempo que tarda el equipo DRP en activar el centro de datos alterno."], "ans": "C"}, {"n": 7, "q": "¿Qué se entiende por 'Crisis' según las definiciones del PCN?", "opts": ["A. Un evento rutinario que interrumpe temporalmente la operación de la entidad.", "B. Un evento inesperado que, si no se maneja apropiadamente, puede impactar dramáticamente la confiabilidad, reputación y capacidad operativa de la entidad.", "C. Cualquier falla técnica de los sistemas de información críticos.", "D. Un incidente de seguridad de la información de origen externo."], "ans": "B"}, {"n": 8, "q": "¿Qué diferencia existe entre un 'Incidente' y un 'Desastre' según las definiciones del manual?", "opts": ["A. Son sinónimos en el contexto del PCN de Colpensiones.", "B. Un incidente es un evento no deseado que puede generar pérdidas por interrupción de procesos; un desastre es un evento repentino devastador que causa un gran fallo o pérdida.", "C. Un incidente afecta solo la tecnología; un desastre afecta solo la infraestructura física.", "D. Un incidente es manejado por la primera línea; un desastre es atendido exclusivamente por la Contraloría."], "ans": "B"}, {"n": 9, "q": "¿Qué son los 'Procesos Esenciales' según el manual del PCN?", "opts": ["A. Los procesos que cuentan con mayor número de funcionarios asignados.", "B. Las funciones del negocio que deben restaurarse prioritariamente ante una interrupción para garantizar la viabilidad de la empresa y cumplir regulaciones.", "C. Los procesos que tienen el mayor presupuesto asignado en la entidad.", "D. Los procesos auditados por la Superintendencia Financiera en el último año."], "ans": "B"}, {"n": 10, "q": "¿Qué es la 'Sede Alterna de Operación' en el contexto del PCN?", "opts": ["A. Una oficina provisional habilitada por el Gobierno Nacional en emergencias nacionales.", "B. Una localidad diferente y separada de las instalaciones afectadas que puede usarse para conducir funciones del negocio bajo un escenario de continuidad.", "C. El espacio virtual habilitado para teletrabajo permanente de los funcionarios.", "D. La sede principal de Colpensiones en caso de que alguna regional quede inutilizada."], "ans": "B"}, {"n": 11, "q": "¿Qué es el Plan de Recuperación ante Desastres (DRP) según el manual?", "opts": ["A. El plan de evacuación y seguridad física del edificio principal.", "B. El conjunto de procedimientos y estrategias para asegurar la reanudación oportuna y ordenada de los servicios informáticos críticos en caso de contingencia.", "C. El protocolo de comunicación con los medios de prensa durante una crisis.", "D. El inventario de controles preventivos de los sistemas de información."], "ans": "B"}, {"n": 12, "q": "Uno de los supuestos del PCN establece que en un evento de crisis no se verá impactada toda la ciudad de Bogotá. ¿Qué estrategia de recuperación permite ese supuesto?", "opts": ["A. La activación inmediata del Centro de Datos Alterno.", "B. La activación de la estrategia de trabajo remoto o trabajo en casa para los procesos esenciales.", "C. La contratación de personal externo para reemplazar a los funcionarios afectados.", "D. La suspensión temporal de todos los servicios de atención al ciudadano."], "ans": "B"}, {"n": 13, "q": "¿Con qué periodicidad mínima debe evaluarse y actualizarse el Plan de Continuidad del Negocio según sus principios generales?", "opts": ["A. Cada dos años.", "B. Cada tres años.", "C. Al menos una vez al año o cuando haya cambios significativos en normativa, procesos, personal o negocio.", "D. Solo cuando se materialice un incidente crítico."], "ans": "C"}, {"n": 14, "q": "¿Quién aprueba el Plan de Continuidad del Negocio según las políticas generales del manual?", "opts": ["A. El Presidente de Colpensiones directamente.", "B. El Comité Integral de Riesgos y Seguridad de la Información.", "C. La Junta Directiva en sesión ordinaria.", "D. La Superintendencia Financiera de Colombia."], "ans": "B"}, {"n": 15, "q": "¿Quién es responsable de establecer y difundir la metodología, estándares y procedimientos para la elaboración de planes de contingencia?", "opts": ["A. La Gerencia de Talento Humano.", "B. La Oficina de Control Interno.", "C. La Gerencia de Riesgos y Seguridad de la Información.", "D. La Gerencia de Planeación Institucional."], "ans": "C"}, {"n": 16, "q": "¿Qué debe ocurrir con todo nuevo producto, servicio o aplicativo que se desarrolle o contrate en Colpensiones, según las políticas generales del PCN?", "opts": ["A. Debe ser certificado por la Superintendencia Financiera antes de entrar en operación.", "B. Debe establecerse un plan de contingencia y continuidad desde el punto de vista operativo y tecnológico.", "C. Debe probarse durante un año antes de ser incorporado al Plan de Continuidad.", "D. Debe aprobarse solo si cuenta con redundancia tecnológica certificada."], "ans": "B"}, {"n": 17, "q": "¿Quién es el responsable de la actualización de los instrumentos del Plan de Continuidad (Matriz BIA y plan de contingencia)?", "opts": ["A. La Gerencia de Riesgos y Seguridad de la Información exclusivamente.", "B. El Comité de Crisis.", "C. Cada líder de proceso, quien notifica a la Gerencia de Riesgos y Seguridad de la Información sobre cambios.", "D. La Oficina de Control Interno a través de auditorías anuales."], "ans": "C"}, {"n": 18, "q": "Según la política de respaldo de información, ¿con qué deben estar acordes las copias de seguridad o réplicas de datos?", "opts": ["A. Con el RTO identificado en la entidad.", "B. Con el RPO identificado en la entidad, incluyendo como mínimo las TRD de los procesos esenciales.", "C. Con la política general de seguridad de la información vigente.", "D. Con los estándares internacionales de la ISO 27001."], "ans": "B"}, {"n": 19, "q": "¿Cuántas etapas contempla la metodología de pruebas del Plan de Continuidad?", "opts": ["A. Dos etapas: Planeación y Ejecución.", "B. Cuatro etapas: Planeación, Ejecución, Validación y Cierre.", "C. Tres etapas: Planeación, Ejecución y Validación.", "D. Cinco etapas: Diagnóstico, Planeación, Ejecución, Validación y Cierre."], "ans": "C"}, {"n": 20, "q": "¿Qué incluye la etapa de Planeación en la metodología de pruebas del PCN?", "opts": ["A. Solo la definición del escenario y los participantes.", "B. Objetivo, alcance, fecha, tipo de prueba, escenario, participantes, guiones, logística, riesgos y planes de tratamiento, y criterios de éxito.", "C. Únicamente la autorización de la Gerencia y la comunicación a las partes interesadas.", "D. La definición del presupuesto y los recursos tecnológicos requeridos."], "ans": "B"}, {"n": 21, "q": "¿Con qué frecuencia mínima deben recibir capacitación los miembros de los equipos funcionales del PCN?", "opts": ["A. Cada dos años.", "B. Cada seis meses.", "C. Por lo menos una vez al año; y al ingresar a un nuevo cargo, en máximo dos meses.", "D. Solo cuando se presenten cambios en el Plan o eventos de contingencia."], "ans": "C"}, {"n": 22, "q": "¿Cuáles son los tres niveles de capacitación del PCN definidos en el manual?", "opts": ["A. Estratégico, Táctico y Operativo.", "B. Nivel Directivo (VP, Jefes, Gerentes), Nivel Apoyo (líderes de equipos de continuidad) y Nivel Operativo (Gestores Integrales).", "C. Primer nivel (Junta Directiva), Segundo nivel (alta gerencia) y Tercer nivel (funcionarios base).", "D. Nivel de Auditoría, Nivel de Riesgos y Nivel de Procesos."], "ans": "B"}, {"n": 23, "q": "Según la Política de Ausencia de Personal Crítico, ¿qué está absolutamente prohibido?", "opts": ["A. Que un funcionario asista a pruebas del plan sin autorización del líder.", "B. Que los integrantes del Comité de Crisis de una misma área (principal y suplentes) se ausenten al mismo tiempo.", "C. Que el líder del PCN asista a reuniones externas durante una contingencia.", "D. Que los proveedores críticos participen en los ejercicios de prueba del plan."], "ans": "B"}, {"n": 24, "q": "¿Cuándo debe ser revisada la Política de Continuidad del Negocio según el manual?", "opts": ["A. Cada cinco años.", "B. Solo cuando lo exija la Superintendencia Financiera.", "C. Anualmente o cuando se presenten cambios significativos en Colpensiones para asegurar su vigencia.", "D. Cada vez que se realice una prueba del plan."], "ans": "C"}, {"n": 25, "q": "¿Quiénes son el Líder Principal y el Líder Suplente del Plan de Continuidad del Negocio?", "opts": ["A. El Presidente y el Vicepresidente de Planeación.", "B. El Vicepresidente de Seguridad y Riesgos Empresariales (principal) y el Gerente de Riesgos y Seguridad de la Información (suplente).", "C. El Gerente de TI (principal) y el Gerente Administrativo (suplente).", "D. El Jefe de Control Interno (principal) y el Gerente de Planeación (suplente)."], "ans": "B"}, {"n": 26, "q": "¿Cuál es el quórum mínimo para que opere el Comité de Crisis?", "opts": ["A. El líder del comité y la mitad más uno de los integrantes.", "B. Todos los integrantes principales del comité.", "C. El líder (o suplente) más tres integrantes (principales o suplentes).", "D. El líder y al menos dos Vicepresidentes."], "ans": "C"}, {"n": 27, "q": "¿Con qué periodicidad sesiona ordinariamente el Comité de Crisis?", "opts": ["A. Mensualmente.", "B. Trimestralmente.", "C. No tiene periodicidad definida; se reúne de manera extraordinaria según requerimiento o necesidad.", "D. Semestralmente."], "ans": "C"}, {"n": 28, "q": "¿Cuántos frentes agrupan los equipos de continuidad del negocio de Colpensiones?", "opts": ["A. Dos frentes: tecnológico y operativo.", "B. Cuatro frentes: recuperación, comunicación, legal y tecnológico.", "C. Tres frentes: recuperación de recursos, recuperación de procesos y manejo de crisis.", "D. Cinco frentes según la naturaleza del incidente."], "ans": "C"}, {"n": 29, "q": "¿Cuál es el objetivo del Equipo de Respuesta a Emergencia y Salvaguarda?", "opts": ["A. Gestionar la recuperación de los aplicativos y sistemas en el Centro de Datos Alterno.", "B. Administrar y coordinar en sitio la respuesta a situaciones que atenten contra la vida y seguridad de los funcionarios.", "C. Proponer estrategias de comunicación para mantener informados a los grupos de interés.", "D. Coordinar la recuperación de los puntos de atención al ciudadano."], "ans": "B"}, {"n": 30, "q": "¿A qué Gerencia pertenece el Equipo de Recuperación ante Desastres DRP y cuál es su objetivo?", "opts": ["A. Gerencia de Riesgos; su objetivo es gestionar los riesgos de ciberseguridad.", "B. Gerencia de Tecnologías de la Información; su objetivo es suministrar servicios tecnológicos críticos en el Centro de Datos Alterno y recuperar la operación en el principal.", "C. Gerencia Administrativa; su objetivo es restablecer la infraestructura física.", "D. Vicepresidencia de Seguridad; su objetivo es contener ataques cibernéticos."], "ans": "B"}, {"n": 31, "q": "¿Qué equipo lidera el Vicepresidente de Seguridad y Riesgos Empresariales para la atención de incidentes de seguridad?", "opts": ["A. El Comité Integral de Riesgos.", "B. El Equipo de Respuesta a Incidentes – ERI.", "C. El Centro de Operaciones de Seguridad – SOC.", "D. El Equipo de Comunicaciones en Crisis."], "ans": "B"}, {"n": 32, "q": "¿Cuál es el objetivo del Equipo de Comunicaciones en Crisis?", "opts": ["A. Gestionar la recuperación de los aplicativos misionales afectados.", "B. Proponer estrategias de comunicación adecuadas para mantener informados a los grupos de interés y monitorear medios y redes sociales.", "C. Coordinar la evacuación del personal ante una emergencia.", "D. Proveer la interpretación legal de los problemas causados por la crisis."], "ans": "B"}, {"n": 33, "q": "¿Cuál es el objetivo del Equipo de Apoyo Legal durante una crisis?", "opts": ["A. Presentar demandas ante los entes reguladores por los daños causados.", "B. Proveer oportunamente la interpretación legal de los problemas causados por la crisis y alertar sobre efectos legales de las acciones ejecutadas, asegurando que las obligaciones legales sean sopesadas en las decisiones.", "C. Gestionar los seguros empresariales en caso de pérdidas materiales.", "D. Coordinar con la UGPP las obligaciones parafiscales durante la contingencia."], "ans": "B"}, {"n": 34, "q": "¿Cuántas fases comprenden las funciones de los miembros de los equipos del plan, desde la preparación hasta el retorno a la normalidad?", "opts": ["A. Tres fases.", "B. Cuatro fases.", "C. Cinco fases.", "D. Seis fases."], "ans": "C"}, {"n": 35, "q": "¿Quién lidera el Equipo de Recuperación de Oficinas y cuál es su objetivo?", "opts": ["A. El Gerente de Riesgos; coordina la recuperación de los sistemas de información.", "B. El Gerente de Servicio y Atención al Ciudadano; coordina la recuperación de los puntos de atención en asocio con los Directores Regionales.", "C. El Jefe de Control Interno; verifica el cumplimiento del plan en cada regional.", "D. El Gerente Administrativo; restablece la infraestructura física de las oficinas."], "ans": "B"}, {"n": 36, "q": "¿Quién lidera el Equipo de Recuperación a Nivel Central?", "opts": ["A. El Vicepresidente de Seguridad y Riesgos Empresariales.", "B. El Presidente de Colpensiones.", "C. El Gerente de Riesgos y Seguridad de la Información.", "D. El Gerente de Planeación Institucional."], "ans": "C"}, {"n": 37, "q": "¿Cuáles son las responsabilidades principales del Comité de Crisis según el manual?", "opts": ["A. Aprobar el presupuesto anual del plan de continuidad.", "B. Administrar y verificar recursos para recuperar operaciones críticas, definir lineamientos para la contingencia, monitorear escenarios de falla, administrar comunicaciones y hacer seguimiento a la crisis.", "C. Realizar auditorías internas periódicas a los procesos esenciales.", "D. Contratar los seguros empresariales para los activos críticos de la entidad."], "ans": "B"}, {"n": 38, "q": "¿Cómo se reporta un incidente que afecta la salud de un funcionario según el manual?", "opts": ["A. Directamente a la Gerencia de Riesgos y Seguridad de la Información por correo.", "B. Al brigadista más cercano para su apoyo en atención primaria.", "C. A la mesa de servicio de TI como incidente de alta prioridad.", "D. Al Comité de Crisis a través del árbol de llamadas."], "ans": "B"}, {"n": 39, "q": "¿A través de qué medios se reporta un incidente que amerite la activación del PCN?", "opts": ["A. Solo por correo electrónico institucional.", "B. Solo por el portal web de gestión de riesgos.", "C. A través de las extensiones 3000-3013 (celulares del Equipo de Continuidad) o por correo a gestionderiesgos@colpensiones.gov.co.", "D. Directamente a la Superintendencia Financiera de Colombia."], "ans": "C"}, {"n": 40, "q": "¿Cuál de las siguientes NO es una condición que debe alertar sobre una situación de crisis según el manual?", "opts": ["A. La presencia de un incidente que comprometa la seguridad e integridad de las personas.", "B. La ausencia de servicios o infraestructura necesaria para la operación de los procesos esenciales.", "C. La presentación de una queja formal por parte de un ciudadano sobre la calidad del servicio.", "D. La imposibilidad de ejecutar procesos de la plataforma tecnológica por retiro o ausencia de personal."], "ans": "C"}, {"n": 41, "q": "¿Cuánto tiempo máximo puede transcurrir después de ocurrido un incidente para obtener los estimativos preliminares de daños?", "opts": ["A. 30 minutos.", "B. 4 horas.", "C. 2 horas.", "D. 1 hora."], "ans": "C"}, {"n": 42, "q": "¿Qué áreas deben participar en la evaluación inicial del daño según el manual?", "opts": ["A. Solo la Gerencia de TI y la Gerencia de Riesgos.", "B. Los líderes del área involucrada en el incidente (telecomunicaciones, hardware, software, centro de cómputo, sistema eléctrico, estructura física) y el Líder del PCN.", "C. Exclusivamente el Comité de Crisis y los auditores internos.", "D. Solo los proveedores tecnológicos y el equipo DRP."], "ans": "B"}, {"n": 43, "q": "¿Qué ocurre si el incidente es calificado como un evento que requiere la activación del PCN durante la evaluación de daños?", "opts": ["A. Se suspende la operación y se notifica a la Superintendencia Financiera.", "B. Se comunica al Líder del Plan Continuidad para que decida activar el Plan y se entra en la fase de Administración de Crisis.", "C. Se activa automáticamente el Centro de Datos Alterno sin necesidad de autorización.", "D. Se convoca una reunión extraordinaria de la Junta Directiva."], "ans": "B"}, {"n": 44, "q": "¿Cuándo debe notificarse al Lider del PCN el incidente durante la evaluación de daños, sin exceder ese tiempo?", "opts": ["A. Una vez superados los peligros inminentes y con seguridad absoluta de no correr peligro.", "B. Inmediatamente al detectar cualquier irregularidad en los sistemas.", "C. Solo si el Comité de Crisis así lo autoriza.", "D. Después de que el equipo DRP haya evaluado los daños tecnológicos."], "ans": "A"}, {"n": 45, "q": "¿En qué consiste la etapa de 'Investigación y Diagnóstico' del incidente?", "opts": ["A. La elaboración del informe final de cierre del incidente.", "B. La reunión del Comité de Crisis para aprobar el Plan de Continuidad.", "C. Reunir la mayor cantidad de información posible para determinar las causas raíces del incidente y restablecer el servicio en el menor tiempo posible.", "D. La activación del Centro de Datos Alterno y la migración de aplicativos."], "ans": "C"}, {"n": 46, "q": "¿Cuál es el propósito del 'Plan de Acción y Seguimiento' dentro de la administración de incidentes?", "opts": ["A. Documentar el incidente para presentarlo a los entes de control.", "B. Determinar las causas del incidente y definir acciones para evitar la recurrencia del evento en el futuro.", "C. Activar los seguros empresariales para recuperar los activos dañados.", "D. Comunicar a los ciudadanos el estado de la contingencia."], "ans": "B"}, {"n": 47, "q": "¿Qué equipo debe activar sus procedimientos si el evento resulta ser un ataque cibernético?", "opts": ["A. El Equipo de Comunicaciones en Crisis.", "B. El Equipo de Apoyo Administrativo.", "C. El Equipo de Respuesta a Incidentes – ERI.", "D. El Equipo de Recuperación de Oficinas."], "ans": "C"}, {"n": 48, "q": "¿Quién decide si debe informarse a la Junta Directiva sobre la crisis?", "opts": ["A. El Vicepresidente de Seguridad y Riesgos Empresariales.", "B. El Comité de Crisis de forma colegiada.", "C. El Presidente de Colpensiones.", "D. El líder del Equipo de Comunicaciones en Crisis."], "ans": "C"}, {"n": 49, "q": "¿Quiénes son los únicos autorizados para emitir comunicaciones externas durante una crisis?", "opts": ["A. El Presidente y los Vicepresidentes de Colpensiones.", "B. Los voceros oficiales definidos por la Oficina de Relacionamiento y Comunicaciones.", "C. El Comité de Crisis en pleno.", "D. El Gerente de Riesgos y Seguridad de la Información."], "ans": "B"}, {"n": 50, "q": "¿Dónde se sesiona inicialmente el Comité de Crisis cuando el líder lo convoca durante una contingencia?", "opts": ["A. Siempre en la sede principal del Centro de Datos Alterno.", "B. En una sede central si es posible acceder físicamente; de lo contrario se usan mecanismos alternos de comunicación.", "C. Obligatoriamente de forma virtual a través de las herramientas en la nube.", "D. En la sede de la Superintendencia Financiera de Colombia."], "ans": "B"}, {"n": 51, "q": "¿Cuál es la primera prioridad del Comité de Crisis al determinar el escenario de crisis según el manual?", "opts": ["A. Activar inmediatamente el Centro de Datos Alterno.", "B. Asegurarse de que todo el personal se encuentre sano y salvo.", "C. Notificar a la Junta Directiva sobre el estado de la contingencia.", "D. Establecer los canales de comunicación con los medios de prensa."], "ans": "B"}, {"n": 52, "q": "¿Cuál es una de las condiciones mínimas para el retorno a la operación normal después de una crisis?", "opts": ["A. Que hayan transcurrido al menos 72 horas desde la activación del PCN.", "B. Que la Superintendencia Financiera autorice el retorno.", "C. Que las instalaciones del Centro de Datos Principal estén restablecidas, los equipos probados, la información actualizada y las comunicaciones funcionando.", "D. Que el Comité de Crisis sesione de manera ordinaria y apruebe el retorno."], "ans": "C"}, {"n": 53, "q": "¿Cuál es el objetivo general del Sistema de Administración del Riesgo de Fraude y Corrupción (SARFC) de Colpensiones?", "opts": ["A. Sustituir el Sistema de Control Interno en materia de prevención de riesgos.", "B. Definir e implementar el SARFC como parte del Manual del SIAR, complementando la identificación, análisis, evaluación, tratamiento y monitoreo de riesgos de fraude y corrupción.", "C. Crear un régimen sancionatorio interno para los funcionarios investigados.", "D. Gestionar exclusivamente los riesgos de lavado de activos del sistema pensional."], "ans": "B"}, {"n": 54, "q": "¿Cómo define el manual del SARFC el concepto de 'Fraude'?", "opts": ["A. El incumplimiento de los procedimientos internos por parte de los colaboradores.", "B. Cualquier acción u omisión intencional realizada con el fin de obtener un provecho económico ilícito y/o beneficio, en detrimento de los intereses de la entidad o de un tercero.", "C. El acto cometido por un tercero ajeno a la entidad que cause daño patrimonial.", "D. Toda conducta que afecte la reputación institucional de Colpensiones."], "ans": "B"}, {"n": 55, "q": "¿Cómo define el manual del SARFC el concepto de 'Corrupción'?", "opts": ["A. Cualquier irregularidad administrativa cometida por un colaborador.", "B. La comisión de delitos tipificados en el Código Penal por servidores públicos.", "C. Cualquier acción u omisión cometida por un servidor, colaborador o tercero usando las facultades del cargo, con el fin de desviar la gestión del servicio público hacia un beneficio privado.", "D. El incumplimiento de los acuerdos de niveles de servicio con los proveedores."], "ans": "C"}, {"n": 56, "q": "Según el manual, ¿cuál es la relación entre 'fraude' y 'corrupción'?", "opts": ["A. Son conceptos completamente independientes que se gestionan por separado.", "B. La corrupción es una clasificación del fraude que implica el uso del cargo o poder asignado para obtener un beneficio particular.", "C. El fraude es una modalidad de la corrupción aplicable solo al sector privado.", "D. Son sinónimos en el contexto del derecho administrativo colombiano."], "ans": "B"}, {"n": 57, "q": "¿Cuál es el principio rector de la cultura institucional de Colpensiones frente al fraude y la corrupción?", "opts": ["A. Tolerancia cero ante irregularidades de alto impacto financiero.", "B. Posición de cero tolerancia frente al fraude y la corrupción.", "C. Prevención moderada con enfoque en la detección temprana.", "D. Gestión proporcional al nivel de riesgo identificado en cada proceso."], "ans": "B"}, {"n": 58, "q": "¿Qué tratamiento NO aplica para los riesgos de fraude y corrupción en Colpensiones?", "opts": ["A. Prevención.", "B. Detección.", "C. Aceptación del riesgo.", "D. Respuesta y acciones correctivas."], "ans": "C"}, {"n": 59, "q": "Según el SARFC, ¿qué niveles de impacto se aplican para la clasificación de los riesgos de fraude y corrupción?", "opts": ["A. Todos los niveles: inferior, menor, importante, mayor y crítico.", "B. Solo los niveles importante, mayor y crítico (los niveles menor e inferior no aplican).", "C. Solo los niveles crítico y mayor.", "D. Los niveles se determinan caso a caso sin una clasificación fija."], "ans": "B"}, {"n": 60, "q": "¿Qué elementos contempla la descripción de un riesgo de corrupción según la matriz de definición del SARFC?", "opts": ["A. Causa, evento, efecto y responsable.", "B. Acción u omisión + uso del poder + desviación de la gestión de lo público + beneficio privado.", "C. Probabilidad, impacto, control y residual.", "D. Actor, modus operandi, daño y evidencia."], "ans": "B"}, {"n": 61, "q": "¿Con qué enfoque aplica Colpensiones los controles dentro de la valoración de riesgos de fraude y corrupción?", "opts": ["A. Reactivo y correctivo, actuando después de la materialización del evento.", "B. Solo detectivo para identificar eventos ya materializados.", "C. Preventivo y disuasivo (anticiparse a la materialización) y detectivo con identificación temprana.", "D. Exclusivamente tecnológico a través del Centro de Operaciones de Seguridad."], "ans": "C"}, {"n": 62, "q": "¿Qué es el Centro de Operaciones de Seguridad (SOC) en el marco del SARFC?", "opts": ["A. Una sala de crisis para la atención de desastres naturales.", "B. El espacio físico donde opera el Comité de Crisis durante una contingencia.", "C. La instancia que gestiona eventos de seguridad relacionados con posibles hechos de fraude y corrupción, configurando alertas sobre datos sensibles para identificar accesos no autorizados, fuga de información y cambios no autorizados.", "D. El equipo encargado de gestionar las PQRS de los ciudadanos pensionados."], "ans": "C"}, {"n": 63, "q": "¿Con qué periodicidad monitorea Colpensiones el perfil de riesgos de fraude y corrupción?", "opts": ["A. Anualmente.", "B. Mensualmente.", "C. Trimestralmente.", "D. Semestralmente."], "ans": "C"}, {"n": 64, "q": "¿Cuándo debe publicarse el mapa de riesgos de corrupción en la página web de Colpensiones?", "opts": ["A. El 31 de marzo de cada año.", "B. El 31 de enero de cada año.", "C. El 30 de junio de cada año.", "D. El 31 de diciembre de cada año."], "ans": "B"}, {"n": 65, "q": "¿Qué área de Colpensiones recibe y gestiona los eventos de riesgo de presuntos hechos de fraude y corrupción?", "opts": ["A. La Oficina de Control Interno.", "B. La Gerencia de Riesgos y Seguridad de la Información.", "C. La Gerencia de Prevención de Fraude.", "D. La Vicepresidencia de Planeación y Tecnologías."], "ans": "C"}, {"n": 66, "q": "¿Qué hace la Oficina de Control Interno en el marco del seguimiento al mapa de riesgos de corrupción?", "opts": ["A. Elabora directamente el mapa de riesgos de corrupción de todos los procesos.", "B. Sanciona a los líderes de proceso que no actualicen el mapa.", "C. Adelanta el seguimiento asegurando que los controles sean efectivos, les apunten al riesgo y funcionen oportunamente; verifica y evalúa la elaboración, visibilización, seguimiento y control del mapa.", "D. Gestiona los eventos de riesgo reportados por los ciudadanos."], "ans": "C"}, {"n": 67, "q": "¿Qué garantiza Colpensiones respecto a los canales de reporte de hechos de fraude y corrupción?", "opts": ["A. Solo canales de reporte presencial en las oficinas principales.", "B. Canales de reporte interno y externo con reserva y confidencialidad del reportante, posibilidad de reporte anónimo y protección al denunciante para evitar retaliaciones.", "C. Canales exclusivamente digitales sin posibilidad de anonimato.", "D. Solo canales de reporte ante la Contraloría General de la República."], "ans": "B"}, {"n": 68, "q": "¿Cuáles son las principales responsabilidades de los Líderes de Área frente al PCN?", "opts": ["A. Diseñar el plan de continuidad de su área de manera autónoma sin reportar a ninguna gerencia.", "B. Cumplir las políticas del plan, mantener actualizados los planes de contingencia, velar por el correcto funcionamiento de procesos en situaciones normales y de crisis, y asegurar la participación de sus funcionarios en las pruebas.", "C. Aprobar los presupuestos tecnológicos para las sedes alternas de operación.", "D. Certificar externamente los planes de contingencia de su área ante la SFC."], "ans": "B"}, {"n": 69, "q": "¿Cuál es la responsabilidad de los funcionarios de Colpensiones en general ante el PCN?", "opts": ["A. Diseñar los escenarios de falla de su proceso.", "B. Cumplir las políticas y procedimientos del manual y participar activamente en las pruebas que programe la Gerencia de Riesgos y Seguridad de la Información.", "C. Aprobar los cambios al árbol de llamadas de su área.", "D. Gestionar directamente los contratos con proveedores críticos."], "ans": "B"}, {"n": 70, "q": "¿Cuáles son las funciones principales de la Gerencia de Riesgos y Seguridad de la Información en el PCN?", "opts": ["A. Aprobar el presupuesto del plan y contratar los seguros empresariales.", "B. Establecer y difundir metodología y estándares; brindar soporte a áreas; coordinar y monitorear el plan; y retroalimentar a las áreas con informes tras cada prueba.", "C. Presidir el Comité de Crisis y tomar decisiones finales de activación.", "D. Gestionar los eventos de fraude y corrupción reportados por los ciudadanos."], "ans": "B"}, {"n": 71, "q": "¿Qué debe ocurrir con los cambios en el ambiente productivo de la infraestructura tecnológica respecto al Centro de Datos Alterno?", "opts": ["A. No requieren ninguna acción especial en el Centro de Datos Alterno.", "B. Deben ser evaluados y, si se requiere, replicados y probados en el Centro de Datos Alterno.", "C. Solo se replican los cambios aprobados por la Junta Directiva.", "D. Se replican automáticamente sin necesidad de evaluación previa."], "ans": "B"}, {"n": 72, "q": "¿Cuál es el propósito de la Política de Integridad según el SARFC?", "opts": ["A. Establecer el régimen disciplinario para los servidores que cometan fraude.", "B. Promover la transparencia e integridad; desarrollar actividades en legalidad; construir confianza con el ciudadano; y proteger el patrimonio público y los recursos de los trabajadores frente a maniobras al margen de la ley.", "C. Definir los criterios para la contratación de auditores externos especializados en fraude.", "D. Reglamentar las sanciones administrativas por incumplimiento del Código de Ética."], "ans": "B"}, {"n": 73, "q": "¿Cuál es la norma legal que establece el marco del Plan Anticorrupción y de Atención al Ciudadano referenciada en el SARFC?", "opts": ["A. Ley 87 de 1993.", "B. Ley 1474 de 2011 (Estatuto Anticorrupción).", "C. Ley 100 de 1993.", "D. Ley 489 de 1998."], "ans": "B"}, {"n": 74, "q": "¿Cuál es la Circular de la SFC que regula la administración del riesgo operacional y en la que se basa el PCN?", "opts": ["A. Circular Externa 018 de 2021.", "B. Circular Básica Contable 100 de 1995.", "C. Circular Externa 025 de 2020.", "D. Circular Externa 050 de 2019."], "ans": "C"}, {"n": 75, "q": "¿Qué elementos forman la 'Infraestructura Ética' de Colpensiones según el SARFC?", "opts": ["A. El presupuesto de riesgos y el plan anticorrupción.", "B. Los valores institucionales (Transparencia, Integridad, Respeto, Honestidad, Compromiso, Diligencia y Justicia) y los elementos formales (Código de Ética, Pacto de Integridad, ley disciplinaria, matriz de riesgos y estructura de responsabilidad).", "C. El Código de Gobierno Corporativo y el Manual del SIAR.", "D. Los informes de auditoría interna y los planes de mejoramiento."], "ans": "B"}, {"n": 76, "q": "¿Qué aspectos se tienen en cuenta para el monitoreo trimestral del perfil de riesgos de fraude y corrupción?", "opts": ["A. Solo los cambios normativos y los hallazgos de auditoría.", "B. Cambios en alcance y ejecución del proceso, hallazgos de auditoría, eventos de riesgo, resultados de indicadores, autoevaluación de controles y demás que consideren los líderes.", "C. Exclusivamente los eventos reportados por el SOC.", "D. Solo los indicadores de gestión definidos por la Superintendencia Financiera."], "ans": "B"}, {"n": 77, "q": "¿Qué aspectos incorpora Colpensiones en la administración del riesgo de fraude y corrupción respecto a tecnología?", "opts": ["A. La certificación ISO de los sistemas de información críticos.", "B. Técnicas de análisis de datos e implementación de modelos descriptivos y prescriptivos para la detección de anomalías y comportamientos atípicos.", "C. La contratación de herramientas de ciberseguridad certificadas por entidades internacionales.", "D. La auditoría mensual de los logs de los sistemas de información misionales."], "ans": "B"}, {"n": 78, "q": "¿Qué elementos del PCN deben ser verificados cuando se generan nuevos proyectos, procesos o servicios?", "opts": ["A. Solo los diagramas de flujo de los nuevos procesos.", "B. El impacto en el plan de continuidad y la necesidad de incluir nuevos procesos esenciales o ajustar requerimientos mínimos tecnológicos u operativos.", "C. Solo la infraestructura tecnológica del Centro de Datos Alterno.", "D. Únicamente las funciones del Comité de Crisis frente al nuevo proceso."], "ans": "B"}, {"n": 79, "q": "¿Qué medidas implementa Colpensiones en sus relaciones contractuales para mitigar riesgos de fraude y corrupción?", "opts": ["A. Exige caución o pólizas de cumplimiento en todos los contratos sin excepción.", "B. Establece compromisos de conducta íntegra y transparente, y mecanismos de reacción y sanción para vínculos con personas naturales y jurídicas que representen riesgos de fraude o corrupción.", "C. Solo contrata con proveedores certificados por la Contraloría General.", "D. Exige auditorías externas anuales a todos sus proveedores de servicios críticos."], "ans": "B"}, {"n": 80, "q": "Según el PCN, ¿cuál es el documento de referencia para la gestión de incidentes de seguridad de la información y ciberseguridad en Colpensiones?", "opts": ["A. El Manual del Sistema Integral de Administración de Riesgos (SIAR).", "B. El Manual de Políticas y Lineamientos de Seguridad de la Información.", "C. El documento AGE-GRI-INS-002 - Instructivo Gestión de Incidentes de Seguridad de la Información y Ciberseguridad.", "D. La Circular Externa 025 de 2020 de la Superintendencia Financiera."], "ans": "C"}]}, "ci": {"name": "Sistema de Control Interno — Colpensiones", "bloques": ["BLOQUE 1 — OBJETIVO, ALCANCE Y MARCO LEGAL  (Preguntas 1–10)", "BLOQUE 2 — DEFINICIONES Y PRINCIPIOS  (Preguntas 11–20)", "BLOQUE 3 — OBJETIVOS Y POLÍTICA DEL SCI  (Preguntas 21–30)", "BLOQUE 4 — COMPONENTES DEL SCI  (Preguntas 31–44)", "BLOQUE 5 — MODELO DE TRES LÍNEAS Y ROLES  (Preguntas 45–56)", "BLOQUE 6 — ARTICULACIÓN, CONTROL FISCAL Y SIG  (Preguntas 57–60)"], "questions": [{"n": 1, "q": "¿Cuál es el objetivo principal del Manual del Sistema de Control Interno de Colpensiones?", "opts": ["A. Reglamentar el régimen salarial de los servidores públicos de la entidad.", "B. Establecer los lineamientos y servir de guía para el mantenimiento y mejora del SCI, en armonía con el MIPG, el Modelo de Gobierno Corporativo y el Modelo SIG.", "C. Definir exclusivamente las funciones de la Oficina de Control Interno.", "D. Regular los contratos con proveedores y auditores externos."], "ans": "B"}, {"n": 2, "q": "Conforme al manual, ¿quiénes son responsables del establecimiento y desarrollo del Sistema de Control Interno en Colpensiones?", "opts": ["A. Únicamente la Oficina de Control Interno.", "B. La Junta Directiva y el Representante Legal de Colpensiones.", "C. Solo la Alta Gerencia y los líderes de proceso.", "D. El Comité de Auditoría y la Superintendencia Financiera de Colombia."], "ans": "B"}, {"n": 3, "q": "¿Qué artículo de la Constitución Política de Colombia establece que 'la administración pública, en todos sus órdenes, tendrá un control interno que se ejercerá en los términos que señale la ley'?", "opts": ["A. Artículo 267.", "B. Artículo 269.", "C. Artículo 209.", "D. Artículo 123."], "ans": "C"}, {"n": 4, "q": "¿Qué ley establece las normas para el ejercicio del control interno en las entidades y organismos del Estado colombiano?", "opts": ["A. Ley 610 de 2000.", "B. Ley 489 de 1998.", "C. Ley 87 de 1993.", "D. Ley 1474 de 2011."], "ans": "C"}, {"n": 5, "q": "¿Qué decreto reglamentó el alcance del Sistema de Gestión y su articulación con el Sistema de Control Interno en el marco del MIPG, e incluyó el MECI como herramienta de implementación?", "opts": ["A. Decreto 1083 de 2015.", "B. Decreto 648 de 2017.", "C. Decreto 1499 de 2017.", "D. Decreto 309 de 2017."], "ans": "C"}, {"n": 6, "q": "La Circular Básica Jurídica de la Superintendencia Financiera de Colombia que regula el Sistema de Control Interno de Colpensiones corresponde a:", "opts": ["A. Parte II, Título III, Capítulo VI.", "B. Parte I, Título I, Capítulo IV.", "C. Parte III, Título II, Capítulo I.", "D. Parte I, Título II, Capítulo VIII."], "ans": "B"}, {"n": 7, "q": "¿Qué marco internacional de mejores prácticas en control interno ha adoptado Colpensiones según el manual?", "opts": ["A. ISO 31000:2018 de gestión de riesgos.", "B. Marco Integrado de Control Interno COSO 2013.", "C. Norma ISO 9001:2015 de gestión de calidad.", "D. Estándares ITIL de gestión de servicios de TI."], "ans": "B"}, {"n": 8, "q": "El Acto Legislativo 04 de 2019 y el Decreto Ley 403 de 2020 son referenciados en el manual principalmente porque:", "opts": ["A. Regulan el Sistema de Gestión de Calidad de entidades públicas.", "B. Reforman el régimen de control fiscal y fortalecen el control fiscal interno.", "C. Establecen los estándares de auditoría interna del sector público.", "D. Reglamentan la rendición de cuentas ante la ciudadanía."], "ans": "B"}, {"n": 9, "q": "¿Cuál de los siguientes documentos no hace parte del marco de referencia del Sistema de Control Interno de Colpensiones según el manual?", "opts": ["A. Modelo de las Tres Líneas (IIA 2020).", "B. Lineamientos del Comité de Supervisión Bancaria de Basilea.", "C. Norma ISO 45001:2018 de seguridad y salud en el trabajo.", "D. Marco Integrado de Control Interno COSO 2013."], "ans": "C"}, {"n": 10, "q": "¿Qué herramienta es utilizada por Colpensiones para actualizar y desarrollar el control interno dentro de la séptima dimensión del MIPG?", "opts": ["A. El Sistema de Gestión de Seguridad de la Información.", "B. El Modelo Estándar de Control Interno (MECI).", "C. El Plan Estratégico de Tecnologías de la Información (PETI).", "D. El Plan Anual de Auditoría Interna."], "ans": "B"}, {"n": 11, "q": "Según las definiciones del manual, ¿qué es el 'control interno'?", "opts": ["A. El conjunto de normas expedidas exclusivamente por la Superintendencia Financiera de Colombia para las entidades vigiladas.", "B. Sistema integrado por el esquema de organización y el conjunto de planes, métodos, principios, normas, procedimientos y mecanismos de verificación y evaluación adoptados por una entidad.", "C. El mecanismo de vigilancia ejercido únicamente por la Contraloría General de la República.", "D. El proceso de auditoría externa contratado con firmas privadas especializadas."], "ans": "B"}, {"n": 12, "q": "¿Qué es el 'control fiscal interno' según el manual?", "opts": ["A. El control ejercido por la Contraloría General de la República sobre los recursos del Estado.", "B. El alude al primer nivel para la vigilancia fiscal de los recursos públicos y para la prevención de riesgos fiscales y defensa del patrimonio público.", "C. El proceso de conciliación contable entre la entidad y la DIAN.", "D. La auditoría practicada por revisores fiscales de firmas privadas."], "ans": "B"}, {"n": 13, "q": "¿Cómo define el manual el concepto de 'control fiscal multinivel'?", "opts": ["A. La supervisión que ejercen simultáneamente varias contralorías sobre una misma entidad.", "B. La articulación entre el sistema de control interno y el control externo, con participación activa del control social.", "C. El modelo de auditoría interna que abarca los tres niveles jerárquicos de la entidad.", "D. El esquema de reporte de riesgos a los tres niveles de gobierno: nacional, departamental y municipal."], "ans": "B"}, {"n": 14, "q": "El 'MECI' se define en el manual como:", "opts": ["A. El Manual Estratégico de Comunicación Interna de Colpensiones.", "B. El Modelo Estándar de Control Interno que proporciona una estructura para el control a la estrategia, la gestión y la evaluación en las entidades del Estado.", "C. El Mecanismo Especial de Control Institucional creado por la Superintendencia Financiera.", "D. El Modelo de Evaluación Continua Interna de los procesos misionales."], "ans": "B"}, {"n": 15, "q": "Según el manual, ¿cuáles son los tres principios del Sistema de Control Interno de Colpensiones?", "opts": ["A. Legalidad, transparencia y rendición de cuentas.", "B. Autocontrol, autorregulación y autogestión.", "C. Eficiencia, eficacia y efectividad.", "D. Planeación, ejecución y evaluación."], "ans": "B"}, {"n": 16, "q": "El principio de 'autocontrol' implica que los trabajadores deben:", "opts": ["A. Contratar empresas externas para evaluar sus procesos.", "B. Reportar directamente a la Contraloría cualquier irregularidad detectada.", "C. Evaluar y controlar su trabajo, detectar desviaciones y adoptar correctivos de manera oportuna.", "D. Aplicar únicamente los controles definidos por la Oficina de Control Interno."], "ans": "C"}, {"n": 17, "q": "La 'autorregulación' como principio del SCI implica que Colpensiones debe:", "opts": ["A. Someterse a las regulaciones emitidas exclusivamente por entes externos.", "B. Desarrollar métodos, normas y procedimientos internos que permitan la implementación y mejoramiento del SCI.", "C. Delegar la regulación interna en la Superintendencia Financiera.", "D. Adoptar únicamente las mejores prácticas internacionales sin adaptarlas."], "ans": "B"}, {"n": 18, "q": "La 'autogestión' como principio del SCI significa que Colpensiones debe tener capacidad para:", "opts": ["A. Gestionar autónomamente su presupuesto sin controles externos.", "B. Coordinar, ejecutar y evaluar de manera efectiva, eficiente y eficaz el funcionamiento del SCI.", "C. Tomar decisiones de inversión sin reportar a la Junta Directiva.", "D. Contratar libremente auditores externos sin aprobación del Comité de Auditoría."], "ans": "B"}, {"n": 19, "q": "Según el manual, ¿qué es la 'evaluación independiente'?", "opts": ["A. Una evaluación realizada en tiempo real por los líderes de proceso.", "B. Las evaluaciones llevadas a cabo de forma periódica por la Oficina de Control Interno a través de la auditoría interna de gestión.", "C. La evaluación que practica anualmente la Contraloría General de la República.", "D. El proceso de autoevaluación que realizan los trabajadores en sus puestos de trabajo."], "ans": "B"}, {"n": 20, "q": "¿Cómo define el manual el 'riesgo fiscal'?", "opts": ["A. La probabilidad de que la entidad incumpla el presupuesto aprobado por el Congreso.", "B. El efecto dañoso sobre los recursos públicos y/o los bienes e intereses patrimoniales de naturaleza pública, a causa de un evento potencial.", "C. El riesgo de que los estados financieros no reflejen la situación real de la entidad.", "D. La posibilidad de que la Contraloría detecte irregularidades en una auditoría."], "ans": "B"}, {"n": 21, "q": "¿Cuál es el objetivo general del Sistema de Control Interno de Colpensiones según el manual?", "opts": ["A. Garantizar la certificación en ISO 9001:2015 de todos los procesos.", "B. Proporcionar una estructura de control para que las actividades, operaciones y actuaciones se lleven a cabo de acuerdo con las normas constitucionales y legales vigentes dentro de las políticas de la alta gerencia.", "C. Eliminar completamente los riesgos a los que está expuesta la entidad.", "D. Sustituir las funciones de la Contraloría en la vigilancia de los recursos públicos."], "ans": "B"}, {"n": 22, "q": "¿Cuál de los siguientes es un objetivo fundamental del SCI de Colpensiones conforme al manual?", "opts": ["A. Maximizar las utilidades de la entidad a través de inversiones financieras.", "B. Prevenir y mitigar la ocurrencia de fraudes internos y externos.", "C. Reducir la planta de personal para optimizar los costos operativos.", "D. Eliminar la necesidad de auditorías externas."], "ans": "B"}, {"n": 23, "q": "¿Qué cultura organizacional promueve el SCI de Colpensiones según el manual?", "opts": ["A. Una cultura basada exclusivamente en el cumplimiento normativo externo.", "B. Una cultura fundamentada en principios, valores y conductas éticas, en el adecuado uso de la información, el control y la evaluación para la toma de decisiones.", "C. Una cultura de competencia entre dependencias para el logro de metas individuales.", "D. Una cultura orientada únicamente al control presupuestal."], "ans": "B"}, {"n": 24, "q": "La Política del SCI de Colpensiones establece compromisos de la entidad. ¿Cuál de los siguientes es uno de ellos?", "opts": ["A. Externalizar todas las funciones de auditoría interna a firmas especializadas.", "B. Implementar, mantener, evaluar y mejorar de manera continua el Sistema de Control Interno.", "C. Concentrar el control interno únicamente en la Oficina de Control Interno.", "D. Eliminar la presentación de informes periódicos a la Junta Directiva."], "ans": "B"}, {"n": 25, "q": "Según la Política del SCI, ¿qué estrategias debe adoptar Colpensiones para promover el control interno?", "opts": ["A. Estrategias orientadas a reducir el número de controles para agilizar los procesos.", "B. Estrategias orientadas a promover el ambiente de control, la gestión del riesgo, las actividades de control, la información y comunicación y las actividades de seguimiento y monitoreo.", "C. Estrategias exclusivamente tecnológicas de automatización.", "D. Estrategias enfocadas únicamente en el control del gasto público."], "ans": "B"}, {"n": 26, "q": "La Política del SCI establece que el/la líder del SCI debe presentar al Comité de Auditoría:", "opts": ["A. Un informe trimestral sobre el estado del presupuesto.", "B. Al menos semestralmente, un informe sobre los cambios realizados al SCI en el marco de su mantenimiento y mejora.", "C. Un informe anual de auditoría interna completo.", "D. Un informe diario sobre los riesgos operativos identificados."], "ans": "B"}, {"n": 27, "q": "¿Cuántos objetivos fundamentales orienta el diseño y desarrollo del SCI de Colpensiones según el manual?", "opts": ["A. 5 objetivos.", "B. 8 objetivos.", "C. 13 objetivos.", "D. 20 objetivos."], "ans": "C"}, {"n": 28, "q": "Uno de los objetivos del SCI es 'asegurar la oportunidad y confiabilidad de la información y de sus registros'. Esto se relaciona principalmente con el componente de:", "opts": ["A. Gestión de riesgos.", "B. Actividades de control.", "C. Información y comunicación.", "D. Actividades de seguimiento y monitoreo."], "ans": "C"}, {"n": 29, "q": "¿Cuál es la estructura sobre la que se basa el Sistema de Control Interno de Colpensiones según el manual?", "opts": ["A. Una estructura basada en tres componentes y un esquema de auditoría externa.", "B. Una estructura basada en cinco componentes y un esquema de responsabilidades basado en el modelo de las tres líneas.", "C. Una estructura basada en siete dimensiones del MIPG.", "D. Una estructura basada exclusivamente en los requisitos de la NTC ISO 9001:2015."], "ans": "B"}, {"n": 30, "q": "¿En qué materia contribuye el SCI a la cultura organizacional de Colpensiones, conforme al manual?", "opts": ["A. En la gestión del talento humano y la nómina.", "B. En la comercialización de los productos pensionales.", "C. En la adecuada gestión por procesos y administración de los riesgos para mayor seguridad a los grupos d
