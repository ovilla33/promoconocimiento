e interés.", "D. En la gestión presupuestal y la ejecución del gasto público."], "ans": "C"}, {"n": 31, "q": "¿Cuántos componentes conforman el Sistema de Control Interno de Colpensiones según el manual?", "opts": ["A. Tres componentes.", "B. Cuatro componentes.", "C. Cinco componentes.", "D. Siete componentes."], "ans": "C"}, {"n": 32, "q": "El 'Ambiente de Control' se define en el manual como:", "opts": ["A. El proceso de identificación y valoración de riesgos estratégicos y operativos.", "B. El conjunto de políticas, normas internas, objetivos, procedimientos y estructuras jerárquicas y de gobierno al que se encuentran sujetos todos los trabajadores en el SCI.", "C. El mecanismo de auditoría interna que evalúa los controles diseñados en los procesos.", "D. Los canales de comunicación entre Colpensiones y sus grupos de interés externos."], "ans": "B"}, {"n": 33, "q": "¿Qué es el Código de Ética de Colpensiones en el marco del Ambiente de Control?", "opts": ["A. El reglamento de contratación pública de la entidad.", "B. El documento que contiene los valores, lineamientos y referentes de comportamiento para los colaboradores, que exige la primacía de los intereses públicos sobre los privados.", "C. El manual de procedimientos disciplinarios de la entidad.", "D. El estatuto de la Junta Directiva aprobado por la Superintendencia Financiera."], "ans": "B"}, {"n": 34, "q": "El Código de Ética de Colpensiones se encuentra documentado bajo el código:", "opts": ["A. AGE-GRI-MAN-009.", "B. DIE-COM-MAN-002.", "C. ECG-PDI-DIN-001.", "D. AGE-GIR-MAN-019."], "ans": "C"}, {"n": 35, "q": "¿Qué es el Estatuto de Auditoría según el manual?", "opts": ["A. El reglamento de la Junta Directiva aprobado por la Asamblea General.", "B. El documento formal aprobado por el Comité de Auditoría que define la posición, relaciones de dependencia, alcance y tipos de servicios de la auditoría interna.", "C. El plan anual de actividades de la Oficina de Control Interno.", "D. El protocolo para la contratación de auditores externos."], "ans": "B"}, {"n": 36, "q": "El componente de 'Gestión de Riesgos' del SCI tiene como propósito:", "opts": ["A. Ejecutar directamente los controles sobre los procesos de la primera línea.", "B. Identificar, evaluar y gestionar eventos potenciales internos y externos que puedan afectar el logro de los objetivos institucionales.", "C. Emitir los informes de auditoría interna al Comité de Auditoría.", "D. Establecer los canales de comunicación con los grupos de interés externos."], "ans": "B"}, {"n": 37, "q": "¿Qué es el Sistema Integral de Administración de Riesgos (SIAR) de Colpensiones?", "opts": ["A. El sistema que gestiona exclusivamente los riesgos de lavado de activos.", "B. El sistema que tiene como objetivo crear y proteger el valor de la entidad dentro del apetito de riesgo definido, con políticas y metodologías para identificar, valorar, tratar y comunicar los riesgos.", "C. El sistema de auditoría de los estados financieros de Colpensiones.", "D. El programa de seguros corporativos de la entidad."], "ans": "B"}, {"n": 38, "q": "Las 'Actividades de Control' en el SCI son acciones que deben realizarse:", "opts": ["A. Solo en la Oficina de Control Interno y la alta gerencia.", "B. Exclusivamente en los procesos misionales de la entidad.", "C. En todos los niveles de Colpensiones, en las diferentes etapas de los procesos y en el entorno tecnológico.", "D. Solo cuando se detecte un hallazgo en una auditoría interna."], "ans": "C"}, {"n": 39, "q": "¿Cuáles son los cuatro tipos de actividades de control contemplados en el manual?", "opts": ["A. Controles preventivos, detectivos, correctivos y disuasivos.", "B. Controles de alto nivel, controles generales, controles sobre la tecnología y controles sobre la gestión contable y financiera.", "C. Controles estratégicos, tácticos, operativos y de apoyo.", "D. Controles manuales, automatizados, mixtos y compensatorios."], "ans": "B"}, {"n": 40, "q": "Los 'controles de alto nivel' en el componente de Actividades de Control se refieren a:", "opts": ["A. Los controles tecnológicos implementados en los sistemas de información críticos.", "B. El seguimiento por parte de la Junta Directiva, comités de apoyo y alta gerencia del funcionamiento del SCI y del progreso en el logro de objetivos estratégicos.", "C. Los controles aplicados por la segunda línea sobre la primera línea.", "D. Los controles diseñados para mitigar exclusivamente el riesgo de fraude."], "ans": "B"}, {"n": 41, "q": "El componente de 'Información y Comunicación' tiene como propósito:", "opts": ["A. Realizar las auditorías anuales del SCI.", "B. Utilizar la información de manera adecuada y comunicarla por los medios y en los tiempos oportunos.", "C. Gestionar exclusivamente los riesgos de seguridad de la información.", "D. Aprobar el presupuesto anual de comunicaciones de la entidad."], "ans": "B"}, {"n": 42, "q": "¿Cómo se denomina el canal anónimo y confidencial de denuncias de Colpensiones mencionado en el manual?", "opts": ["A. Canal de Transparencia y Ética.", "B. Línea de Integridad y Transparencia.", "C. Portal de Denuncias Ciudadanas.", "D. Buzón de Control Interno."], "ans": "B"}, {"n": 43, "q": "Las 'Actividades de Seguimiento y Monitoreo' tienen como propósito:", "opts": ["A. Diseñar los controles para los riesgos identificados en los procesos.", "B. Desarrollar actividades de supervisión continua y evaluaciones periódicas que permiten valorar la efectividad del control interno, eficiencia y eficacia de los procesos, y resultados de la gestión.", "C. Aprobar los planes estratégicos anuales de la entidad.", "D. Emitir los informes financieros ante la Superintendencia Financiera."], "ans": "B"}, {"n": 44, "q": "¿Qué tipo de evaluaciones pueden contratar Colpensiones para verificar el funcionamiento de los diferentes componentes del SCI?", "opts": ["A. Solo evaluaciones internas realizadas por la Oficina de Control Interno.", "B. Únicamente evaluaciones de la Contraloría General de la República.", "C. Evaluaciones externas con firmas privadas, además de las evaluaciones periódicas de los entes de control.", "D. Solo evaluaciones de pares entre entidades del sector público."], "ans": "C"}, {"n": 45, "q": "¿Cuál es el propósito del Modelo de las Tres Líneas en el SCI de Colpensiones?", "opts": ["A. Concentrar toda la gestión del control interno en la Oficina de Control Interno.", "B. Promover estructuras de gobierno y procesos que contribuyan a los objetivos estratégicos, facilitando la gestión de los riesgos con responsabilidades distribuidas transversalmente.", "C. Establecer tres niveles jerárquicos de supervisión únicamente para el control fiscal.", "D. Separar completamente las funciones de auditoría interna y externa."], "ans": "B"}, {"n": 46, "q": "¿Qué conforman la 'Línea Estratégica' en el modelo de tres líneas de Colpensiones?", "opts": ["A. Exclusivamente la Oficina de Control Interno y los auditores internos.", "B. Los integrantes de la Junta Directiva y la alta gerencia (presidente, vicepresidentes y jefes de Oficina), representados en sus comités.", "C. Los líderes de macroprocesos y sus equipos de trabajo operativo.", "D. Los trabajadores de las áreas de riesgo y cumplimiento normativo."], "ans": "B"}, {"n": 47, "q": "¿Cuál de los siguientes comités NO hace parte de la Línea Estratégica del SCI según el manual?", "opts": ["A. Junta Directiva y sus comités decisorios.", "B. Comité Institucional de Gestión y Desempeño (CIGD).", "C. Comité Integral de Riesgos (CIR).", "D. Comité de Auditoría Externa de la Contraloría."], "ans": "D"}, {"n": 48, "q": "La 'Primera Línea' en el modelo de tres líneas está conformada por:", "opts": ["A. Los funcionarios de la Oficina de Control Interno.", "B. Los directivos de la segunda línea y sus equipos de supervisión.", "C. Los trabajadores en sus diferentes niveles, quienes aplican las medidas de control interno en las operaciones del día a día.", "D. Los auditores externos contratados por la entidad."], "ans": "C"}, {"n": 49, "q": "¿Cuál es una de las responsabilidades de la Primera Línea según el manual?", "opts": ["A. Aprobar las políticas del Sistema de Control Interno.", "B. Identificar, evaluar, controlar, mitigar y monitorear los riesgos estratégicos, tácticos y por procesos.", "C. Realizar auditorías independientes a los procesos de la entidad.", "D. Presentar informes semestrales al Comité de Auditoría."], "ans": "B"}, {"n": 50, "q": "¿Quién lidera la 'Segunda Línea' en Colpensiones según el manual?", "opts": ["A. La Oficina de Control Interno.", "B. La Junta Directiva y sus comités de apoyo.", "C. La Vicepresidencia de Planeación y TI, la Vicepresidencia de Seguridad y Riesgos Empresariales, la Vicepresidencia de Gestión Corporativa y la Oficina Asesora de Asuntos Legales, entre otras.", "D. Los auditores externos de la Revisoría Fiscal."], "ans": "C"}, {"n": 51, "q": "¿Cuál es una responsabilidad de la Segunda Línea conforme al manual?", "opts": ["A. Ejecutar directamente los controles en las operaciones del día a día.", "B. Capacitar y asesorar a la Primera Línea para la implementación, mantenimiento y mejora del Modelo SIG en el marco del SCI.", "C. Aprobar el Plan Anual de Auditoría Interna.", "D. Presentar los estados financieros de la entidad ante la Superintendencia Financiera."], "ans": "B"}, {"n": 52, "q": "La 'Tercera Línea' del modelo está conformada por:", "opts": ["A. La Contraloría General de la República.", "B. La Revisoría Fiscal de la entidad.", "C. La Oficina de Control Interno de Colpensiones, que evalúa de manera independiente y objetiva los controles de la Primera Línea.", "D. Los organismos de control externo del orden nacional."], "ans": "C"}, {"n": 53, "q": "¿Ante quién rinde cuentas la Tercera Línea según el manual?", "opts": ["A. Ante la Primera Línea y los líderes de proceso.", "B. Ante la Junta Directiva y el Comité de Auditoría.", "C. Ante la Superintendencia Financiera de Colombia exclusivamente.", "D. Ante la alta gerencia y el CIGD."], "ans": "B"}, {"n": 54, "q": "¿Qué decreto desarrolla las funciones y responsabilidades de la Oficina de Control Interno (Tercera Línea) en Colpensiones?", "opts": ["A. Decreto 1083 de 2015.", "B. Decreto 1499 de 2017.", "C. Decreto 309 de 2017.", "D. Decreto 648 de 2017."], "ans": "C"}, {"n": 55, "q": "¿Qué es la 'Línea de Rendición de Cuentas' en el modelo de tres líneas de Colpensiones?", "opts": ["A. El proceso de auditoría fiscal practicado por la Contraloría General.", "B. Las instancias y canales a través de los cuales se informa el cumplimiento de las funciones para todo el SCI.", "C. El informe anual de gestión presentado ante el Congreso de la República.", "D. El proceso de autoevaluación de competencias del talento humano."], "ans": "B"}, {"n": 56, "q": "¿Cuál es la responsabilidad central de la Línea Estratégica frente al SCI?", "opts": ["A. Ejecutar los controles operativos en los procesos misionales.", "B. Realizar la auditoría interna independiente a los procesos de la entidad.", "C. La emisión, revisión, validación y supervisión del cumplimiento de políticas y lineamientos en materia de control interno.", "D. Identificar y gestionar diariamente los riesgos operativos de la entidad."], "ans": "C"}, {"n": 57, "q": "El Control Fiscal Interno es parte del Sistema de Control Interno y es responsabilidad de:", "opts": ["A. Exclusivamente la Contraloría General de la República.", "B. Las y los servidores públicos y quienes administran recursos, bienes e intereses patrimoniales de naturaleza pública, en el marco del modelo de Tres Líneas.", "C. Solo la Oficina de Control Interno de Colpensiones.", "D. El Comité de Auditoría y los auditores externos contratados."], "ans": "B"}, {"n": 58, "q": "¿Qué metodología adopta Colpensiones para la identificación del riesgo fiscal según el manual?", "opts": ["A. La metodología ISO 31000 de gestión de riesgos internacionales.", "B. La metodología del Departamento Administrativo de la Función Pública para la identificación, análisis y valoración del riesgo fiscal.", "C. La metodología COSO ERM para la gestión de riesgos empresariales.", "D. La metodología definida por la Contraloría General de la República."], "ans": "B"}, {"n": 59, "q": "¿Cómo se articula el Sistema de Control Interno con el Modelo del Sistema Integrado de Gestión (SIG) de Colpensiones?", "opts": ["A. El SCI reemplaza al SIG en la gestión de los procesos misionales.", "B. El SCI es parte integral de la gestión de Colpensiones a nivel estratégico, táctico y en la ejecución de los procesos, articulado con el SIG conforme al Decreto 1083 de 2015.", "C. El SCI y el SIG operan de manera completamente independiente sin puntos de articulación.", "D. El SCI solo se articula con el Sistema de Gestión de Calidad y no con los demás sistemas del SIG."], "ans": "B"}, {"n": 60, "q": "¿Qué afirma el Decreto 1083 de 2015 sobre la articulación del Sistema de Gestión con el Sistema de Control Interno, según el manual?", "opts": ["A. Que el SCI sustituye al Sistema de Gestión en la séptima dimensión del MIPG.", "B. Que el SCI, previsto en la Ley 87 de 1993, se articulará al Sistema de Gestión en el marco del MIPG a través de mecanismos de control y verificación, siendo transversal a la gestión.", "C. Que ambos sistemas deben operar de manera independiente para garantizar objetividad.", "D. Que el MECI remplaza completamente al SCI en las entidades del Estado."], "ans": "B"}]}, "ley2381": {"name": "Reforma Pensional — Ley 2381 de 2024", "bloques": ["BLOQUE 1 — DISPOSICIONES GENERALES: OBJETO, ÁMBITO Y ESTRUCTURA  (1–10)", "BLOQUE 2 — PILARES SOLIDARIO Y SEMICONTRIBUTIVO  (11–20)", "BLOQUE 3 — COTIZACIONES, DISTRIBUCIÓN Y FONDO DE AHORRO  (21–30)", "BLOQUE 4 — PENSIÓN INTEGRAL DE VEJEZ Y BENEFICIOS ESPECIALES  (31–42)", "BLOQUE 5 — PENSIÓN DE INVALIDEZ Y SOBREVIVIENTES  (43–52)", "BLOQUE 6 — ADMINISTRADORAS, COLPENSIONES, RECTORÍA Y TRANSICIÓN  (53–65)"], "questions": [{"n": 1, "q": "¿Cuál es el objeto del Sistema de Protección Social Integral para la Vejez, Invalidez y Muerte según el artículo 1° de la Ley 2381 de 2024?", "opts": ["A. Crear un régimen único de pensiones privadas para trabajadores formales.", "B. Garantizar el amparo contra las contingencias de vejez, invalidez y muerte mediante un sistema de pilares, fundamentado en universalidad, solidaridad y eficiencia.", "C. Sustituir completamente el sistema pensional de la Ley 100 de 1993.", "D. Establecer un seguro obligatorio de vida para todos los colombianos."], "ans": "B"}, {"n": 2, "q": "El Sistema de Protección Social Integral para la Vejez está estructurado por los siguientes pilares:", "opts": ["A. Pilar Solidario, Pilar Contributivo y Pilar Voluntario.", "B. Pilar Solidario, Pilar Semicontributivo, Pilar Contributivo (con sus dos componentes) y Pilar de Ahorro Voluntario.", "C. Pilar Básico, Pilar Intermedio y Pilar Superior.", "D. Pilar Público, Pilar Mixto y Pilar Privado."], "ans": "B"}, {"n": 3, "q": "¿A qué personas aplica el Pilar Solidario de la Ley 2381 de 2024?", "opts": ["A. A todos los colombianos residentes y en el exterior.", "B. Solo a los colombianos residentes en el país en condición de pobreza extrema, pobreza y vulnerabilidad.", "C. A los trabajadores independientes con ingresos inferiores a 2.3 smlmv.", "D. A los pensionados cuya mesada sea inferior al salario mínimo."], "ans": "B"}, {"n": 4, "q": "El Pilar Contributivo en su Componente de Prima Media recibe cotizaciones por ingresos base de cotización entre:", "opts": ["A. 1 smlmv y hasta 5 smlmv.", "B. 1 smlmv y hasta 2.3 smlmv.", "C. 2.3 smlmv y hasta 25 smlmv.", "D. Cualquier monto sin tope mínimo ni máximo."], "ans": "B"}, {"n": 5, "q": "El Componente Complementario de Ahorro Individual del Pilar Contributivo recibe cotizaciones por la parte del IBC que exceda:", "opts": ["A. 1 smlmv hasta 10 smlmv.", "B. 2 smlmv hasta 20 smlmv.", "C. 2.3 smlmv hasta 25 smlmv.", "D. 5 smlmv hasta 30 smlmv."], "ans": "C"}, {"n": 6, "q": "¿Quién administra el Pilar Solidario según la Ley 2381 de 2024?", "opts": ["A. El Ministerio del Trabajo directamente.", "B. El Departamento Administrativo de Prosperidad Social.", "C. Colpensiones como administradora única.", "D. Las administradoras de fondos de pensiones privadas."], "ans": "B"}, {"n": 7, "q": "¿Cuántos principios contempla el artículo 4° de la Ley 2381 de 2024 para el Sistema de Protección Social Integral?", "opts": ["A. 10 principios.", "B. 15 principios.", "C. 22 principios.", "D. 7 principios."], "ans": "C"}, {"n": 8, "q": "Según el principio de 'dignidad' (art. 4° lit. c), no podrán acceder a una prestación o pensión de sustitución o de sobrevivientes:", "opts": ["A. Las personas mayores de 80 años sin cotizaciones.", "B. Las personas que hayan sido declaradas indignas para suceder con respecto al causante en los términos del art. 1025 del Código Civil.", "C. Los trabajadores que no hayan cotizado al menos 500 semanas.", "D. Los extranjeros sin residencia permanente en Colombia."], "ans": "B"}, {"n": 9, "q": "¿Qué establece la Ley 2381 de 2024 respecto a la edad máxima para acceder al Sistema de Protección Social Integral para la Vejez?", "opts": ["A. La edad máxima es de 70 años.", "B. No existirá una edad máxima para poder acceder al sistema.", "C. La edad máxima se fija en 75 años por reglamentación.", "D. La edad máxima varía según el pilar al que se acceda."], "ans": "B"}, {"n": 10, "q": "¿Cuál es el límite máximo de la base de cotización en el Pilar Contributivo según la Ley 2381 de 2024?", "opts": ["A. 10 salarios mínimos legales mensuales vigentes.", "B. 20 salarios mínimos legales mensuales vigentes.", "C. 25 salarios mínimos legales mensuales vigentes.", "D. 30 salarios mínimos legales mensuales vigentes."], "ans": "C"}, {"n": 11, "q": "¿Cuáles son los requisitos de edad para acceder a la Renta Básica Solidaria del Pilar Solidario?", "opts": ["A. 60 años hombres y 55 años mujeres.", "B. 65 años hombres y 60 años mujeres (o hombre mayor de 55 con discapacidad ≥50% o mujer mayor de 50 con discapacidad ≥50%).", "C. 65 años tanto para hombres como para mujeres.", "D. 62 años hombres y 57 años mujeres."], "ans": "B"}, {"n": 12, "q": "¿Cuántos años de residencia en Colombia debe acreditar quien solicite la Renta Básica Solidaria?", "opts": ["A. 5 años inmediatamente anteriores a la solicitud.", "B. 15 años en cualquier momento de su vida.", "C. 10 años inmediatamente anteriores a la fecha de solicitud.", "D. 20 años continuos o discontinuos."], "ans": "C"}, {"n": 13, "q": "¿La Renta Básica Solidaria constituye una pensión según la Ley 2381 de 2024?", "opts": ["A. Sí, es una pensión especial de vejez a cargo del Estado.", "B. No, en ningún caso la Renta Básica Solidaria constituye una pensión.", "C. Solo constituye pensión si su monto supera un salario mínimo.", "D. Sí, pero únicamente para los beneficiarios del programa Colombia Mayor."], "ans": "B"}, {"n": 14, "q": "¿Cuántas semanas de cotización debe haber aportado una persona para acceder al Pilar Semicontributivo (Renta Vitalicia) según el artículo 18?", "opts": ["A. Menos de 300 semanas.", "B. Entre 300 y menos de 1.000 semanas (o hasta 1.300 para hombres a partir de 2036).", "C. Entre 1.000 y 1.300 semanas.", "D. Más de 1.300 semanas sin llegar a las requeridas para pensión."], "ans": "B"}, {"n": 15, "q": "¿Qué ocurre con los afiliados que hayan cotizado hasta 299 semanas según el parágrafo 3 del artículo 18?", "opts": ["A. Acceden automáticamente al Pilar Solidario.", "B. Se les otorga una indemnización sustitutiva para el Componente de Prima Media y devolución de saldos para el Componente Complementario.", "C. Pueden cotizar semanas adicionales de manera retroactiva.", "D. Quedan excluidos de todo beneficio del sistema."], "ans": "B"}, {"n": 16, "q": "A partir del 1° de enero de 2036, ¿cuál será el rango de semanas para acceder al Pilar Semicontributivo para los hombres?", "opts": ["A. Entre 300 y menos de 1.000 semanas.", "B. Entre 300 y menos de 1.300 semanas.", "C. Entre 500 y menos de 1.500 semanas.", "D. Entre 600 y menos de 1.300 semanas."], "ans": "B"}, {"n": 17, "q": "¿Cuál es el subsidio adicional que reciben los hombres en el Pilar Semicontributivo para el literal b) del artículo 18?", "opts": ["A. 30% del saldo restante.", "B. 20% del saldo restante.", "C. 10% del saldo restante.", "D. 25% del saldo restante."], "ans": "B"}, {"n": 18, "q": "¿Qué entidad coordina y tramita los beneficios del Pilar Semicontributivo?", "opts": ["A. El Ministerio de Hacienda y Crédito Público.", "B. La Administradora Colombiana de Pensiones — Colpensiones.", "C. El Departamento Administrativo de Prosperidad Social.", "D. La UGPP — Unidad de Gestión de Pensiones y Parafiscales."], "ans": "B"}, {"n": 19, "q": "¿Puede una misma persona recibir simultáneamente la Renta Vitalicia del Pilar Semicontributivo y el beneficio de Colombia Mayor?", "opts": ["A. Sí, son compatibles siempre que cumpla los requisitos de ambos programas.", "B. No, en ningún caso pueden coexistir simultáneamente para una misma persona.", "C. Solo pueden coexistir durante los primeros seis meses de transición.", "D. Sí, si la persona tiene discapacidad certificada mayor al 50%."], "ans": "B"}, {"n": 20, "q": "El beneficio del Pilar Semicontributivo (Renta Vitalicia del literal b) no puede superar:", "opts": ["A. El 100% del salario mínimo legal mensual vigente.", "B. El 80% del salario mínimo legal mensual vigente.", "C. El 60% del salario mínimo legal mensual vigente.", "D. El 70% del salario mínimo legal mensual vigente."], "ans": "B"}, {"n": 21, "q": "¿Cuál es la tasa de cotización al Pilar Contributivo según la Ley 2381 de 2024?", "opts": ["A. 12% del Ingreso Base de Cotización.", "B. 14% del Ingreso Base de Cotización.", "C. 16% del Ingreso Base de Cotización.", "D. 18% del Ingreso Base de Cotización."], "ans": "C"}, {"n": 22, "q": "En la cotización al Pilar Contributivo, ¿qué porcentaje paga el empleador y cuál el trabajador?", "opts": ["A. El empleado s financieras de los supervisores.", "D. Establecer el régimen de inhabilidades e incompatibilidades de los contratistas."], "ans": "B"}, {"n": 2, "q": "¿Qué norma derogó expresamente la Resolución 009 de 2025?", "opts": ["A. La Resolución 073 del 10 de febrero de 2020.", "B. La Resolución 099 del 16 de mayo de 2018.", "C. La Resolución 511 de 2017.", "D. El Acuerdo 073 de 2014."], "ans": "B"}, {"n": 3, "q": "¿Bajo qué régimen jurídico se rige la actividad contractual de Colpensiones según el Acuerdo 005 de 2020?", "opts": ["A. El Estatuto General de Contratación de la Administración Pública (Ley 80 de 1993) en su totalidad.", "B. Las normas del Derecho Privado y los principios de igualdad, moralidad, eficacia, economía, celeridad, imparcialidad, responsabilidad y publicidad.", "C. Exclusivamente el Derecho Comercial colombiano.", "D. Las disposiciones del Código de Procedimiento Administrativo."], "ans": "B"}, {"n": 4, "q": "¿Qué es la 'Supervisión' según las definiciones de la Resolución 009 de 2025?", "opts": ["A. El seguimiento técnico especializado realizado por un tercero contratado.", "B. El seguimiento integral que hace Colpensiones a la ejecución del contrato, con cuidado y revisión constante de sus aspectos técnicos, administrativos, financieros, contables y jurídicos.", "C. La evaluación periódica que realiza la Contraloría sobre los contratos.", "D. El control exclusivamente financiero sobre la ejecución del presupuesto."], "ans": "B"}, {"n": 5, "q": "¿Cuándo procede la 'Interventoría' según la Resolución 009 de 2025?", "opts": ["A. En todos los contratos sin importar su valor o complejidad.", "B. Cuando la complejidad, extensión o el seguimiento del contrato suponga conocimientos especializados.", "C. Solo en contratos de obra pública superiores a 6.000 SMLMV.", "D. Únicamente cuando lo exija la Superintendencia Financiera."], "ans": "B"}, {"n": 6, "q": "¿Qué es el Acta de Inicio según la Resolución 009 de 2025?", "opts": ["A. El documento que formaliza la terminación del contrato y el balance final.", "B. El documento suscrito entre el supervisor o interventor y el contratista que señala el inicio de la ejecución y puede incluir requisitos previos y otros aspectos que las partes consideren pertinentes.", "C. El acta que aprueba la modificación del objeto contractual.", "D. El documento que certifica el recibo satisfactorio de los servicios."], "ans": "B"}, {"n": 7, "q": "¿Qué es el Acta de Liquidación según la Resolución 009 de 2025?", "opts": ["A. El documento que señala el inicio de la ejecución del contrato.", "B. El documento en que las partes realizan un balance final económico, jurídico y técnico de la ejecución del contrato, verificando obligaciones y estableciendo si están a paz y salvo.", "C. El documento que suspende temporalmente el plazo de ejecución.", "D. El informe parcial de ejecución elaborado para cada pago."], "ans": "B"}, {"n": 8, "q": "¿Qué es una 'Adición' contractual según la Resolución 009 de 2025?", "opts": ["A. El acto jurídico que modifica el objeto del contrato.", "B. El acto jurídico mediante el cual las partes acuerdan incrementar el valor del contrato sin modificar su objeto, con justificación previa del supervisor y disponibilidad presupuestal.", "C. El documento que prorroga el plazo de ejecución del contrato.", "D. La cesión de la posición contractual a un tercero."], "ans": "B"}, {"n": 9, "q": "¿Qué se entiende por 'Penal Pecuniaria' en la Resolución 009 de 2025?", "opts": ["A. Una sanción definitiva que determina los perjuicios exactos causados.", "B. La disposición contractual que fija un monto o porcentaje como estimación anticipada pero no definitiva de perjuicios cuando se presenta incumplimiento del contratista.", "C. El mecanismo para resolver controversias entre las partes.", "D. La garantía de cumplimiento exigida al contratista."], "ans": "B"}, {"n": 10, "q": "¿Cuándo se contabiliza el plazo de ejecución del contrato cuando se ha pactado un acta de inicio, según el Acuerdo 005 de 2020?", "opts": ["A. Desde la fecha de suscripción del contrato.", "B. Desde el momento en que dicha acta sea suscrita por el supervisor y el contratista, o desde el momento que las partes prevean en el respectivo contrato.", "C. Desde la expedición del Certificado de Disponibilidad.", "D. Desde la aprobación de la garantía por el Director Contractual."], "ans": "B"}, {"n": 11, "q": "¿Quién tiene la competencia para celebrar contratos y convenios en Colpensiones según el Acuerdo 005 de 2020?", "opts": ["A. La Dirección Contractual de manera exclusiva.", "B. El Comité de Contratación y Racionalización del Gasto.", "C. El Representante Legal o sus suplentes, con posibilidad de delegar en funcionarios del nivel directivo.", "D. El Vicepresidente de Gestión Corporativa."], "ans": "C"}, {"n": 12, "q": "¿Cuándo puede Colpensiones prescindir de garantías en sus contratos según el Acuerdo 005 de 2020?", "opts": ["A. Cuando el contratista sea una entidad pública.", "B. En los contratos inferiores a cien salarios mínimos legales mensuales vigentes (100 SMLMV), interadministrativos y los de seguros.", "C. Solo cuando el Comité de Contratación así lo autorice.", "D. En todos los contratos de prestación de servicios profesionales."], "ans": "B"}, {"n": 13, "q": "¿Cuáles son las cuatro modalidades de contratación previstas en el Manual de Contratación de Colpensiones (Acuerdo 005 de 2020)?", "opts": ["A. Licitación pública, selección abreviada, concurso de méritos y contratación directa.", "B. Invitación a una pluralidad determinada de proponentes, Convocatoria Pública, Invitación a un proponente y Subasta Inversa.", "C. Contratación por cuantía, por urgencia manifiesta, por acuerdo marco y por mínima cuantía.", "D. Invitación cerrada, convocatoria abierta, concurso técnico y adjudicación directa."], "ans": "B"}, {"n": 14, "q": "¿Cuándo procede la modalidad de 'Invitación a una pluralidad determinada de proponentes'?", "opts": ["A. Cuando la cuantía sea superior a 6.000 SMLMV.", "B. Cuando la cuantía estimada sea superior a 300 SMLMV e inferior a 6.000 SMLMV, sin incluir IVA.", "C. Cuando la cuantía sea inferior a 300 SMLMV.", "D. Solo en contratos de obra pública."], "ans": "B"}, {"n": 15, "q": "¿Cuántos oferentes mínimos deben invitarse en la modalidad de 'Invitación a una pluralidad determinada de proponentes'?", "opts": ["A. Mínimo cinco (5) oferentes.", "B. Mínimo dos (2) oferentes cuando solo existen esos en el mercado.", "C. Mínimo tres (3) oferentes; o dos (2) si el estudio de mercado evidencia que solo existen dos oferentes en el mercado.", "D. Mínimo cuatro (4) oferentes siempre."], "ans": "C"}, {"n": 16, "q": "¿Cuándo procede la modalidad de 'Convocatoria Pública'?", "opts": ["A. Cuando la cuantía sea superior a 300 SMLMV e inferior a 6.000 SMLMV.", "B. Cuando la cuantía sea igual o superior a 6.000 SMLMV, o en vigencia de la Ley 996 de 2005.", "C. En cualquier contrato sin importar la cuantía.", "D. Solo cuando el Representante Legal lo considere necesario."], "ans": "B"}, {"n": 17, "q": "¿Por cuánto tiempo queda el Informe de Evaluación a disposición de los proponentes en los procesos de pluralidad determinada y convocatoria pública?", "opts": ["A. Cinco (5) días hábiles.", "B. Diez (10) días calendario.", "C. Tres (3) días hábiles.", "D. Dos (2) días hábiles."], "ans": "C"}, {"n": 18, "q": "¿En cuál de los siguientes casos procede la modalidad 'Invitación a un proponente' según el Acuerdo 005 de 2020?", "opts": ["A. Cuando la cuantía sea superior a 6.000 SMLMV.", "B. Cuando se trate de contratos intuito personae, cuya cuantía no sobrepase 300 SMLMV, cuando no haya pluralidad de oferentes, o cuando la necesidad inminente no permita otra modalidad, entre otros casos.", "C. Solo cuando el procedimiento de convocatoria pública haya fracasado.", "D. Únicamente para contratos de prestación de servicios profesionales."], "ans": "B"}, {"n": 19, "q": "¿Qué es la 'Subasta Inversa' según el Acuerdo 005 de 2020?", "opts": ["A. Un proceso de negociación directa con un único proveedor.", "B. Modalidad de contratación competitiva en que los invitados realizan una puja dinámica mediante reducción sucesiva de precios durante un tiempo determinado, seleccionando la oferta con el menor precio al finalizar.", "C. Un mecanismo de evaluación de ofertas basado únicamente en criterios técnicos.", "D. La selección del proveedor con el precio más alto que garantice calidad."], "ans": "B"}, {"n": 20, "q": "¿Cuándo procede la 'Subasta Inversa' según el Acuerdo 005 de 2020?", "opts": ["A. Para cualquier bien o servicio cuando la cuantía supere 100 SMLMV.", "B. Para la adquisición de bienes y servicios de características técnicas uniformes y de común utilización, cuya cuantía sea igual o superior a 300 SMLMV.", "C. Solo para contratos de tecnología y comunicaciones.", "D. Exclusivamente cuando no haya pluralidad de oferentes."], "ans": "B"}, {"n": 21, "q": "¿Qué es el 'Grupo Evaluador' en los procesos de contratación de Colpensiones?", "opts": ["A. El comité directivo que aprueba la selección del contratista.", "B. El grupo conformado para cada procedimiento de convocatoria pública, pluralidad o subasta que evalúa técnica, jurídica, financiera y económicamente las propuestas, con sujeción a las Reglas de Participación.", "C. El equipo de auditores internos que verifica la contratación.", "D. Los representantes de la Contraloría durante el proceso."], "ans": "B"}, {"n": 22, "q": "¿Qué ocurre si el oferente seleccionado no acepta la decisión de contratación o no suscribe el contrato en el tiempo establecido en la Convocatoria Pública?", "opts": ["A. Se declara fallido el proceso sin posibilidad de continuar.", "B. Colpensiones puede contratar, dentro de los cinco (5) días hábiles siguientes, con el oferente calificado en segundo lugar, siempre que su oferta sea favorable y vigente.", "C. Se reinicia el proceso de evaluación desde el inicio.", "D. La Entidad debe esperar seis meses para lanzar un nuevo proceso."], "ans": "B"}, {"n": 23, "q": "¿En qué niveles jerárquicos recae por regla general la designación de supervisión al interior de Colpensiones?", "opts": ["A. Solo en el nivel directivo.", "B. En servidores del nivel directivo, asesor y profesional, conforme al Manual Específico de Funciones.", "C. En cualquier servidor sin importar su nivel.", "D. Solo en los trabajadores de la dependencia solicitante."], "ans": "B"}, {"n": 24, "q": "¿Es obligatoria la designación como supervisor cuando se comunica formalmente?", "opts": ["A. No, el servidor puede rechazarla libremente.", "B. Sí, es de forzosa aceptación, salvo fuerza mayor, caso fortuito, inhabilidad, incompatibilidad, impedimento o conflicto de interés, que deberá manifestarse por escrito al Representante Legal.", "C. Solo es obligatoria para servidores del nivel directivo.", "D. Sí, pero solo si el servidor ha participado en la etapa previa."], "ans": "B"}, {"n": 25, "q": "¿Qué debe hacer el supervisor al recibir la comunicación de designación como primera obligación administrativa?", "opts": ["A. Convocar inmediatamente al contratista para firmar el acta de inicio.", "B. Verificar que las garantías contractuales estén aprobadas por el Director Contractual, lo cual es requisito para suscribir el acta de inicio.", "C. Elaborar el primer informe parcial de ejecución.", "D. Solicitar a la Dirección Contractual el expediente completo."], "ans": "B"}, {"n": 26, "q": "¿Con cuánta anticipación mínima debe el supervisor solicitar modificaciones, aclaraciones, adiciones, prórrogas, cesiones o suspensiones al vencimiento del contrato?", "opts": ["A. Cinco (5) días hábiles.", "B. Diez (10) días hábiles; o veinte (20) días hábiles si el trámite requiere recomendación del Comité de Contratación.", "C. Quince (15) días hábiles en todos los casos.", "D. Treinta (30) días calendario."], "ans": "B"}, {"n": 27, "q": "¿Dentro de qué plazo debe el supervisor elaborar y remitir el Informe de Supervisión para Terminación del contrato a la Dirección Contractual?", "opts": ["A. Dentro del mes (1) siguiente al vencimiento del plazo contractual.", "B. Dentro de los dos (2) meses siguientes al vencimiento del plazo contractual.", "C. Dentro de los tres (3) meses siguientes a la terminación.", "D. Dentro de los cuatro (4) meses, plazo máximo de liquidación."], "ans": "B"}, {"n": 28, "q": "¿Cuál es una obligación presupuestal, financiera y contable del supervisor según la Resolución 009 de 2025?", "opts": ["A. Aprobar directamente el presupuesto anual de la entidad.", "B. Verificar previo a cada pago que el contratista esté al día en aportes al Sistema de Seguridad Social Integral y parafiscales.", "C. Autorizar transferencias entre vigencias presupuestales.", "D. Negociar directamente con la DIAN el régimen tributario del contratista."], "ans": "B"}, {"n": 29, "q": "¿Cuál es una obligación jurídica del supervisor frente a un posible incumplimiento contractual?", "opts": ["A. Imponer directamente las multas y cláusula penal sin trámite previo.", "B. Presentar un informe detallado a la Dirección Contractual con las razones, descripción cronológica, disposiciones incumplidas, actuaciones que evidencien el debido proceso y estimación de perjuicios.", "C. Resolver unilateralmente el contrato sin informar a la Dirección.", "D. Conciliar directamente con el contratista sin documentar el proceso."], "ans": "B"}, {"n": 30, "q": "¿Cuál de las siguientes es una prohibición expresa para los supervisores e interventores según el Artículo Quinto de la Resolución 009 de 2025?", "opts": ["A. Solicitar informes periódicos al contratista.", "B. Solicitar y/o recibir, directa o indirectamente, dádivas, favores o beneficios del contratista.", "C. Verificar el cumplimiento de las garantías contractuales.", "D. Convocar reuniones periódicas con el contratista."], "ans": "B"}, {"n": 31, "q": "¿Puede el supervisor permitir la iniciación del objeto del contrato antes de la fecha estipulada y sin verificar los requisitos previos?", "opts": ["A. Sí, si el contratista lo solicita con justificación.", "B. No, es una prohibición expresa para supervisores e interventores.", "C. Sí, con autorización verbal del jefe inmediato.", "D. Solo si existe disponibilidad presupuestal verificada."], "ans": "B"}, {"n": 32, "q": "¿Qué debe hacer el supervisor si se encuentra en situación de conflicto de interés, inhabilidad o incompatibilidad?", "opts": ["A. Continuar ejerciendo la supervisión informando solo al final del contrato.", "B. Abstenerse de participar, declararse impedido y comunicar de manera inmediata al Representante Legal o su delegado.", "C. Delegar informalmente sus funciones a otro servidor.", "D. Solicitar autorización al Comité de Contratación para continuar."], "ans": "B"}, {"n": 33, "q": "¿Quién asume la supervisión automáticamente ante ausencia temporal o definitiva del supervisor?", "opts": ["A. El supervisor más antiguo del área.", "B. El Jefe del área que solicitó la contratación, hasta tanto se haga una nueva designación.", "C. El Director Contractual de manera temporal.", "D. Un supervisor de otra dependencia designado por la Dirección Contractual."], "ans": "B"}, {"n": 34, "q": "¿Cuántos informes parciales de ejecución y supervisión debe elaborar como mínimo el supervisor según los criterios generales de la Resolución 009 de 2025?", "opts": ["A. Solo uno al final del contrato.", "B. Uno por cada pago que se gestione en desarrollo del contrato, sin perjuicio de elaborar otros informes adicionales.", "C. Uno mensual sin excepción.", "D. Solo cuando el contratista presente incumplimientos."], "ans": "B"}, {"n": 35, "q": "¿Qué debe contener como mínimo el Informe de Supervisión para Terminación del contrato?", "opts": ["A. Solo el valor ejecutado y los pagos realizados.", "B. Identificación general del contrato, porcentaje de cumplimiento de obligaciones, resumen de ejecución financiera, servicios recibidos a satisfacción, novedades presentadas, constancia de paz y salvo laboral y demás aspectos relevantes.", "C. Solo los hallazgos de incumplimiento y las multas aplicadas.", "D. Únicamente el acta de liquidación final."], "ans": "B"}, {"n": 36, "q": "¿Puede el supervisor certificar el cumplimiento parcial o total cuando existen dudas sobre el cumplimiento de obligaciones?", "opts": ["A. Sí, si el jefe inmediato lo autoriza.", "B. No, es una prohibición expresa para supervisores e interventores.", "C. Sí, con reserva escrita en el informe.", "D. Solo para pagos inferiores a 50 SMLMV."], "ans": "B"}, {"n": 37, "q": "¿Por qué tipos de responsabilidad responden los supervisores e interventores según el Artículo Séptimo de la Resolución 009 de 2025?", "opts": ["A. Solo por responsabilidad disciplinaria.", "B. Por responsabilidad disciplinaria, fiscal, civil y penal.", "C. Solo por responsabilidad civil y penal.", "D. Únicamente por responsabilidad administrativa."], "ans": "B"}, {"n": 38, "q": "¿Cuándo se configura la responsabilidad disciplinaria del supervisor?", "opts": ["A. Solo cuando se produce un daño económico demostrado al patrimonio público.", "B. Cuando incumple sus deberes, se extralimita en derechos y funciones, vulnera prohibiciones o infringe el régimen de inhabilidades, incompatibilidades, impedimentos y conflictos de interés, conforme a la Ley 1952 de 2019.", "C. Únicamente cuando es condenado penalmente.", "D. Solo cuando el contratista presenta una queja formal."], "ans": "B"}, {"n": 39, "q": "¿Qué característica tiene la responsabilidad fiscal según la Resolución 009 de 2025?", "opts": ["A. Es de naturaleza penal y busca sancionar al responsable.", "B. Es de naturaleza administrativa, determinada por un proceso de la misma naturaleza, con carácter eminentemente resarcitorio, buscando recuperar el valor equivalente al detrimento ocasionado.", "C. Es de naturaleza civil exclusivamente.", "D. Es determinada únicamente por la Contraloría General sin proceso previo."], "ans": "B"}, {"n": 40, "q": "¿Cuándo son responsables fiscales los supervisores e interventores?", "opts": ["A. Cuando el contratista incumple sus obligaciones sin causa justificada.", "B. Cuando por incumplimiento de sus funciones de control y vigilancia sobre determinado contrato se ocasiona un detrimento patrimonial para la Entidad.", "C. Solo cuando son condenados penalmente por peculado.", "D. Cuando el contrato supera los 6.000 SMLMV y presenta sobrecostos."], "ans": "B"}, {"n": 41, "q": "¿Mediante qué mecanismo puede Colpensiones ejercer la responsabilidad civil contra el supervisor o interventor?", "opts": ["A. Mediante denuncia penal directa ante la Fiscalía.", "B. Mediante la acción de repetición o el mecanismo de llamamiento en garantía, cuando se le imponga una condena por daños derivados del incumplimiento de su función.", "C. Solo mediante proceso disciplinario ante la Procuraduría.", "D. Mediante embargo preventivo de bienes del supervisor."], "ans": "B"}, {"n": 42, "q": "¿Cuáles son los delitos contra la administración pública que pueden dar lugar a responsabilidad penal del supervisor o interventor?", "opts": ["A. Solo el peculado y el cohecho.", "B. Entre otros: celebración indebida de contratos, tráfico de influencias, peculado, concusión, cohecho, enriquecimiento ilícito y prevaricato.", "C. Únicamente el enriquecimiento ilícito.", "D. Solo los delitos tipificados en el Código Penal para servidores públicos."], "ans": "B"}, {"n": 43, "q": "¿Cómo responden los supervisores en supervisiones compartidas?", "opts": ["A. Cada supervisor responde solo por sus actuaciones individuales.", "B. De manera solidaria por las obligaciones, deberes y compromisos relacionados con el objeto de supervisión.", "C. Solo el supervisor principal asume la responsabilidad.", "D. Responden de manera subsidiaria, primero el principal y luego el suplente."], "ans": "B"}, {"n": 44, "q": "¿Cuál de los siguientes actos puede constituir falta gravísima para el supervisor según el Artículo Tercero de la Resolución 009 de 2025?", "opts": ["A. No asistir a una reunión de seguimiento sin justificación.", "B. El incumplimiento de las funciones de supervisión e interventoría, conforme al artículo 84 de la Ley 1474 de 2011.", "C. Presentar el informe de terminación con un día de retraso.", "D. No utilizar los formatos normalizados en todos los informes."], "ans": "B"}, {"n": 45, "q": "¿Qué procedimiento debe seguirse para hacer efectiva la cláusula de multas prevista en los contratos de Colpensiones?", "opts": ["A. El supervisor las impone directamente mediante acto administrativo.", "B. El supervisor presenta al contratista el informe de retardo; el contratista tiene 5 días hábiles para pagar o controvertir; Colpensiones analiza y en 20 días hábiles decide si acepta las observaciones o cobra la multa.", "C. Las multas se aplican automáticamente al vencimiento de cada obligación.", "D. Solo la Dirección Contractual puede imponer multas sin intervención del supervisor."], "ans": "B"}, {"n": 46, "q": "¿Qué anticipo máximo puede pactar Colpensiones en sus contratos según el Acuerdo 005 de 2020?", "opts": ["A. Hasta el 30% del valor inicial del contrato.", "B. Hasta el 50% del valor inicial, siendo obligatoria la póliza de buen manejo y la aprobación del programa de inversión.", "C. Hasta el 70% del valor del contrato para contratos de obra.", "D. Sin límite si el Comité de Contratación lo aprueba."], "ans": "B"}, {"n": 47, "q": "¿Cuál es la naturaleza jurídica del contrato de interventoría según la Resolución 009 de 2025?", "opts": ["A. Es accesorio y depende del contrato vigilado para existir.", "B. Es principal y autónomo, independiente del contrato vigilado, aunque supone la existencia de este.", "C. Es un contrato de adhesión que sigue siempre las condiciones del contrato principal.", "D. Es un convenio interadministrativo sin carácter contractual."], "ans": "B"}, {"n": 48, "q": "¿Quién supervisa directamente el contrato de interventoría?", "opts": ["A. El mismo interventor de manera autónoma.", "B. Colpensiones directamente, designando un supervisor para verificar el cumplimiento de las condiciones pactadas.", "C. La Oficina de Control Interno de manera exclusiva.", "D. El Comité de Contratación y Racionalización del Gasto."], "ans": "B"}, {"n": 49, "q": "¿Puede la interventoría coexistir con la supervisión para un mismo contrato principal?", "opts": ["A. No, son mutuamente excluyentes sin excepción.", "B. Por regla general no son concurrentes, pero Colpensiones puede determinar vigilancia conjunta, indicando en el contrato de interventoría las actividades a cargo del interventor y entendiendo las demás a cargo del supervisor.", "C. Siempre deben coexistir en contratos superiores a 3.000 SMLMV.", "D. Solo cuando la Superintendencia Financiera lo ordene."], "ans": "B"}, {"n": 50, "q": "¿Cuál es una obligación financiera de la interventoría según la Resolución 009 de 2025?", "opts": ["A. Aprobar directamente el presupuesto del proyecto.", "B. Verificar, revisar, aprobar y gestionar las solicitudes de pago y llevar un registro cronológico de pagos y ajustes económicos del contrato.", "C. Negociar con la aseguradora las condiciones de las pólizas.", "D. Autorizar el traslado de recursos entre vigencias fiscales."], "ans": "B"}, {"n": 51, "q": "¿Cuál es una obligación legal-ambiental de la interventoría según la Resolución 009 de 2025?", "opts": ["A. Aprobar los estudios de impacto ambiental del contratista.", "B. Efectuar el seguimiento ambiental al objeto contractual, garantizar el cumplimiento de normas ambientales y verificar la disponibilidad de recursos suficientes en materia de Gestión Ambiental y SST.", "C. Tramitar las licencias ambientales requeridas para el proyecto.", "D. Contratar de manera directa los servicios de gestión ambiental."], "ans": "B"}, {"n": 52, "q": "¿Cuál es la obligación jurídica del interventor frente a dádivas o beneficios?", "opts": ["A. Reportarlos al supervisor y continuar ejerciendo sus funciones.", "B. Abstenerse de generar o patrocinar conductas de dar o exigir dádivas en virtud de su labor, o permitir que alguien lo haga en su nombre.", "C. Aceptarlos solo si son de bajo valor y no afectan la imparcialidad.", "D. Informarlos a la Contraloría sin suspender sus funciones."], "ans": "B"}, {"n": 53, "q": "¿Cuándo deben liquidarse los contratos suscritos por Colpensiones según el Acuerdo 005 de 2020?", "opts": ["A. En todos los contratos sin excepción.", "B. Cuando superen los 100 SMLMV y ocurra terminación anticipada, situaciones de incumplimiento o sanciones, ejecución por demanda de Colpensiones, o cuando el supervisor lo recomiende.", "C. Solo en contratos de obra pública.", "D. Únicamente cuando el contratista lo solicite expresamente."], "ans": "B"}, {"n": 54, "q": "¿Dentro de qué plazo debe realizarse la liquidación de mutuo acuerdo cuando es obligatoria y las partes no han pactado plazo?", "opts": ["A. Dentro de los seis (6) meses siguientes a la terminación del contrato.", "B. Dentro de los cuatro (4) meses siguientes a la terminación del respectivo contrato.", "C. Dentro de los dos (2) meses siguientes al informe de terminación.", "D. Dentro del mes siguiente a la terminación del contrato."], "ans": "B"}, {"n": 55, "q": "¿Qué ocurre si el contratista no se presenta a suscribir el acta de liquidación dentro del mes siguiente a ser informado?", "opts": ["A. El contrato se entiende liquidado tácitamente sin ningún trámite.", "B. Se tendrá como liquidación del contrato el Informe de Supervisión para Terminación, para efectos de liberar saldos.", "C. Colpensiones debe esperar seis meses antes de liquidar unilateralmente.", "D. Se inicia automáticamente un proceso disciplinario contra el contratista."], "ans": "B"}, {"n": 56, "q": "¿Cuáles son los documentos que forman parte integral del contrato según la Resolución 009 de 2025?", "opts": ["A. Solo el texto del contrato y las garantías.", "B. Las autorizaciones de ley, estudios previos, invitación/reglas de participación, propuesta u oferta, disponibilidad presupuestal, reserva presupuestal, pólizas aprobadas y todas las actuaciones de su ejecución.", "C. Únicamente el objeto, valor y plazo pactados.", "D. Solo los documentos posteriores a la firma del contrato."], "ans": "B"}, {"n": 57, "q": "¿Cuál es el valor mínimo asegurado de la garantía de 'Seriedad del Ofrecimiento' según el Acuerdo 005 de 2020?", "opts": ["A. El 5% del monto de las propuestas.", "B. No inferior al 10% del monto de las propuestas o del presupuesto oficial estimado.", "C. El 20% del valor estimado del contrato.", "D. El 15% del presupuesto oficial."], "ans": "B"}, {"n": 58, "q": "¿Cuál es la vigencia mínima de la garantía de 'Pago de salarios, prestaciones sociales e indemnizaciones laborales'?", "opts": ["A. El plazo del contrato más un (1) año.", "B. El plazo del contrato más tres (3) años.", "C. Cinco (5) años a partir de la terminación del contrato.", "D. Durante el plazo de ejecución del contrato únicamente."], "ans": "B"}, {"n": 59, "q": "¿Qué debe verificar el supervisor sobre las garantías una vez finalizado el plazo de ejecución?", "opts": ["A. Solo verificar que las pólizas hayan sido expedidas.", "B. Exigir al contratista la extensión o ampliación de los amparos de estabilidad, calidad del bien o servicio, y demás garantías requeridas con posterioridad a la terminación; e informar a la Dirección Contractual sobre el vencimiento de vigencias.", "C. Archivar las pólizas sin más trámite.", "D. Solicitar al contratista nuevas pólizas sin relación con las obligaciones contractuales."], "ans": "B"}, {"n": 60, "q": "¿Quién es responsable de la conformación y custodia técnica de los expedientes contractuales según el Acuerdo 005 de 2020?", "opts": ["A. El supervisor del contrato de manera exclusiva.", "B. La Dirección Contractual (conformación) y la Dirección Documental (procesamiento y custodia técnica); los supervisores son responsables de entregar los documentos producidos o recibidos en orden.", "C. La Dirección de Bienes y Servicios.", "D. El Comité de Contratación y Racionalización del Gasto."], "ans": "B"}]}};

// Quiz metadata (icons, colors, extra info)
const META = {
  disciplinario:{icon:'⚖️',color:'#9b59b6',desc:'Ley 1952 de 2019 · Principios, faltas, sanciones y etapa de juzgamiento'},
  riesgos:{icon:'🛡️',color:'#e74c3c',desc:'PCN, fraude y corrupción, seguridad de la información y ciberseguridad'},
  ci:{icon:'🔍',color:'#3498db',desc:'Manual SCI · Principios, componentes, modelo tres líneas y roles'},
  ley2381:{icon:'🏛️',color:'#2ecc71',desc:'Reforma pensional · Pilares, cotizaciones, prestaciones y transición'},
  contractual:{icon:'📋',color:'#f39c12',desc:'Res. 009/2025 y Manual de Contratación · Supervisión e interventoría'},
};

let currentQuiz = null;
let currentIndex = 0;
let answers = {};
let answered = false;
let streak = 0;
const results = {};

function getScoreClass(pct){
  if(pct===null) return 'score-none';
  if(pct<50) return 'score-low';
  if(pct<80) return 'score-mid';
  return 'score-high';
}
function getScoreLabel(pct){
  if(pct===null) return 'Sin intentar';
  return pct+'%';
}

function renderHome(){
  const grid = document.getElementById('quizzes-grid');
  grid.innerHTML = '';
  Object.entries(QUIZZES).forEach(([key, qdata])=>{
    const m = META[key]||{icon:'📝',color:'var(--blue)',desc:''};
    const pct = results[key]!==undefined ? results[key] : null;
    const sc = getScoreClass(pct);
    const n = qdata.questions.length;
    const nb = qdata.bloques.length;
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.innerHTML = `
      <span class="qc-score ${sc}">${getScoreLabel(pct)}</span>
      <div class="qc-icon" style="background:${m.color}22;color:${m.color}">${m.icon}</div>
      <div class="qc-title">${qdata.name}</div>
      <p style="font-size:.82rem;color:var(--text2);margin:.4rem 0 .8rem;line-height:1.4">${m.desc}</p>
      <div class="qc-meta">
        <span>${n} preguntas</span>
        <span>${nb} bloques</span>
      </div>`;
    card.onclick = ()=> startQuiz(key);
    grid.appendChild(card);
  });
}

function startQuiz(key){
  currentQuiz = key;
  currentIndex = 0;
  answers = {};
  answered = false;
  streak = 0;
  showScreen('quiz');
  document.getElementById('topbar-title').textContent = QUIZZES[key].name;
  renderQuestion();
}

function getBloqueForQ(key, qNum){
  const qs = QUIZZES[key].questions;
  const bloques = QUIZZES[key].bloques;
  if(!bloques.length) return '';
  // Find which bloque range contains this question
  const idx = qs.findIndex(q=>q.n===qNum);
  const perBloque = Math.ceil(qs.length / bloques.length);
  const bi = Math.min(Math.floor(idx/perBloque), bloques.length-1);
  return bloques[bi] || '';
}

function renderQuestion(){
  const qdata = QUIZZES[currentQuiz];
  const q = qdata.questions[currentIndex];
  const total = qdata.questions.length;
  const pct = Math.round((currentIndex/total)*100);

  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent = `${currentIndex+1}/${total}`;
  document.getElementById('bloque-label').textContent = getBloqueForQ(currentQuiz, q.n).replace(/\s*\(\d+[–-]\d+\)\s*$/, '');
  document.getElementById('q-counter').textContent = `Pregunta ${q.n} de ${total}`;
  document.getElementById('q-text').textContent = q.q;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = ()=> selectOption(letters[i], q.ans);
    list.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none';
  fb.className = 'feedback-box';

  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentIndex < total-1 ? 'Siguiente →' : 'Ver resultados';
  btnNext.disabled = true;

  answered = false;
  document.getElementById('streak-info').textContent = streak>1 ? `🔥 Racha: ${streak} correctas` : '';
}

function selectOption(letter, correct){
  if(answered) return;
  answered = true;
  answers[currentIndex] = letter;

  const isCorrect = letter === correct;
  if(isCorrect) streak++; else streak=0;

  const btns = document.querySelectorAll('.option-btn');
  const letters = ['A','B','C','D'];
  btns.forEach((btn,i)=>{
    btn.disabled = true;
    if(letters[i]===letter && isCorrect) btn.classList.add('correct');
    else if(letters[i]===letter && !isCorrect) btn.classList.add('wrong');
    else if(letters[i]===correct && !isCorrect) btn.classList.add('show-correct');
  });

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'block';
  if(isCorrect){
    fb.className = 'feedback-box correct';
    const msgs = ['¡Correcto!','¡Exacto!','¡Muy bien!','¡Perfecto!'];
    fb.innerHTML = `<span class="feedback-icon">✓</span>${msgs[Math.floor(Math.random()*msgs.length)]}`;
  } else {
    fb.className = 'feedback-box wrong';
    fb.innerHTML = `<span class="feedback-icon">✗</span>Incorrecto. La respuesta correcta es <strong>${correct}</strong>.`;
  }

  document.getElementById('btn-next').disabled = false;
  document.getElementById('streak-info').textContent = streak>1 ? `🔥 Racha: ${streak} correctas` : '';
}

function nextQuestion(){
  const total = QUIZZES[currentQuiz].questions.length;
  if(currentIndex < total-1){
    currentIndex++;
    renderQuestion();
    window.scrollTo(0,0);
  } else {
    showResults();
  }
}

function showResults(){
  const qdata = QUIZZES[currentQuiz];
  const qs = qdata.questions;
  let correct=0, wrong=0;
  qs.forEach((q,i)=>{
    if(answers[i]===q.ans) correct++; else wrong++;
  });
  const pct = Math.round((correct/qs.length)*100);
  results[currentQuiz] = pct;

  // Score circle color
  const circle = document.getElementById('score-circle');
  let cc = pct>=80?'#2ecc71':pct>=50?'#f39c12':'#e74c3c';
  circle.style.background = cc+'22';
  circle.style.border = '3px solid '+cc;
  document.getElementById('score-pct').style.color = cc;
  document.getElementById('score-pct').textContent = pct+'%';

  const msg = pct>=90?'¡Excelente dominio!':pct>=75?'¡Buen resultado!':pct>=50?'Resultado aprobatorio':'Necesitas repasar';
  document.getElementById('results-title').textContent = msg;
  document.getElementById('results-sub').textContent = `${qdata.name}`;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-total').textContent = qs.length;
  document.getElementById('stat-pct').textContent = pct+'%';

  renderReview('all');
  showScreen('results');
  window.scrollTo(0,0);
}

let currentFilter = 'all';
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.btn-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderReview(f);
}

function renderReview(filter){
  const qs = QUIZZES[currentQuiz].questions;
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  const letters = ['A','B','C','D'];
  let shown = 0;
  qs.forEach((q,i)=>{
    const userAns = answers[i];
    const ok = userAns === q.ans;
    if(filter==='ok' && !ok) return;
    if(filter==='fail' && ok) return;
    shown++;
    const item = document.createElement('div');
    item.className = 'review-item '+(ok?'ok':'fail');
    const userOptIdx = letters.indexOf(userAns);
    const corrOptIdx = letters.indexOf(q.ans);
    item.innerHTML = `
      <div class="review-q"><strong>P${q.n}.</strong> ${q.q}</div>
      <div class="review-ans">
        ${ok
          ? `<span class="review-ok-lbl">✓ ${userAns}. ${q.opts[corrOptIdx]||''}</span>`
          : `<span class="review-your">✗ Tu respuesta: ${userAns}. ${userOptIdx>=0?q.opts[userOptIdx]:''}</span>
             <span class="review-correct">✓ Correcta: ${q.ans}. ${corrOptIdx>=0?q.opts[corrOptIdx]:''}</span>`
        }
      </div>`;
    list.appendChild(item);
  });
  document.getElementById('review-heading').textContent =
    filter==='all'?`Revisión de todas las respuestas (${shown})`:
    filter==='fail'?`Respuestas incorrectas (${shown})`:
    `Respuestas correctas (${shown})`;
}

function retryQuiz(){ startQuiz(currentQuiz); }

function goHome(){
  showScreen('home');
  renderHome();
}

function showScreen(s){
  ['home','quiz','results'].forEach(id=>{
    const el = document.getElementById('screen-'+id);
    el.style.display = (id===s)?'flex':'none';
  });
}

renderHome();
</script>
</body>
</html>
