<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionarios Colpensiones</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#181c25;--surface2:#1e2333;--surface3:#252b3b;
  --border:#2a3045;--border2:#3a4260;
  --text:#e8eaf0;--text2:#9ba3c0;--text3:#5a6380;
  --blue:#4a90e2;--blue2:#2d6bb5;--blue-bg:#1a2540;
  --green:#2ecc71;--green-bg:#0d2b1a;--green2:#1a6b3a;
  --red:#e74c3c;--red-bg:#2b0d0d;--red2:#8b2020;
  --amber:#f39c12;--amber-bg:#2b1d06;
  --purple:#9b59b6;--purple-bg:#1e0f2b;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* ── HOME ── */
#screen-home{display:flex;flex-direction:column;min-height:100vh}
.home-header{padding:3rem 2rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
.home-header h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-0.5px;color:var(--text);margin-bottom:.5rem}
.home-header p{color:var(--text2);font-size:.95rem}
.logo-ring{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-size:1.5rem}

.quizzes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;padding:2rem;flex:1}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.quiz-card:hover{border-color:var(--blue);background:var(--surface2);transform:translateY(-2px);box-shadow:var(--shadow)}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--purple));opacity:0;transition:.18s}
.quiz-card:hover::before{opacity:1}
.qc-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:1rem}
.qc-title{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:.3rem;line-height:1.3}
.qc-meta{font-size:.82rem;color:var(--text2);display:flex;gap:.6rem;flex-wrap:wrap}
.qc-meta span{background:var(--surface3);padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
.qc-score{position:absolute;top:1rem;right:1rem;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px}
.score-none{background:var(--surface3);color:var(--text3);border:1px solid var(--border)}
.score-low{background:var(--red-bg);color:var(--red);border:1px solid var(--red2)}
.score-mid{background:var(--amber-bg);color:var(--amber);border:1px solid #6b4010}
.score-high{background:var(--green-bg);color:var(--green);border:1px solid var(--green2)}

/* ── QUIZ SCREEN ── */
#screen-quiz{display:none;flex-direction:column;min-height:100vh}
.quiz-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
.btn-back{background:none;border:1px solid var(--border);color:var(--text2);padding:.35rem .8rem;border-radius:var(--radius-xs);cursor:pointer;font-size:.85rem;transition:all .15s;white-space:nowrap}
.btn-back:hover{border-color:var(--border2);color:var(--text)}
.quiz-topbar-title{font-weight:600;font-size:.9rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-wrap{flex:1;max-width:200px;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:3px;transition:width .3s}
.progress-label{font-size:.8rem;color:var(--text2);white-space:nowrap}

.quiz-body{flex:1;max-width:780px;width:100%;margin:0 auto;padding:2rem 1.5rem}

.bloque-label{font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:.5rem}
.question-counter{font-size:.82rem;color:var(--text3);margin-bottom:.4rem}
.question-text{font-size:1.05rem;font-weight:500;color:var(--text);line-height:1.65;margin-bottom:1.5rem}

.options-list{display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}
.option-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1.1rem;cursor:pointer;text-align:left;color:var(--text);font-size:.9rem;line-height:1.5;transition:all .15s;display:flex;gap:.75rem;align-items:flex-start}
.option-btn:hover:not(:disabled){border-color:var(--blue);background:var(--blue-bg)}
.option-letter{width:24px;min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px}
.option-btn:hover:not(:disabled) .option-letter{border-color:var(--blue);color:var(--blue)}
.option-btn.correct{border-color:var(--green);background:var(--green-bg)}
.option-btn.correct .option-letter{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.15)}
.option-btn.wrong{border-color:var(--red);background:var(--red-bg)}
.option-btn.wrong .option-letter{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.15)}
.option-btn.show-correct{border-color:var(--green);background:var(--green-bg);opacity:.7}
.option-btn:disabled{cursor:default}

.feedback-box{padding:1rem 1.2rem;border-radius:var(--radius-sm);margin-bottom:1.5rem;display:none;font-size:.9rem;line-height:1.5}
.feedback-box.correct{background:var(--green-bg);border:1px solid var(--green2);color:#7fffb0}
.feedback-box.wrong{background:var(--red-bg);border:1px solid var(--red2);color:#ffaaaa}
.feedback-icon{font-size:1.1rem;margin-right:.5rem}

.quiz-nav{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;border-top:1px solid var(--border)}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:.6rem 1.4rem;border-radius:var(--radius-xs);cursor:pointer;font-size:.9rem;font-weight:500;transition:all .15s}
.btn-primary:hover{background:var(--blue2)}
.btn-primary:disabled{opacity:.4;cursor:default}

/* ── RESULTS SCREEN ── */
#screen-results{display:none;flex-direction:column;min-height:100vh}
.results-header{padding:3rem 2rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}
.score-circle .pct{font-size:2rem;font-weight:700;line-height:1}
.score-circle .lbl{font-size:.75rem;color:var(--text2);margin-top:.2rem}
.results-title{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.results-sub{color:var(--text2);font-size:.9rem}

.stats-row{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;padding:1.5rem 2rem;border-bottom:1px solid var(--border)}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1.5rem;text-align:center;min-width:100px}
.stat-val{font-size:1.5rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.stat-lbl{font-size:.75rem;color:var(--text2);margin-top:.2rem}

.review-section{max-width:780px;width:100%;margin:0 auto;padding:2rem 1.5rem}
.review-section h3{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.2rem;margin-bottom:.75rem}
.review-item.ok{border-left:3px solid var(--green)}
.review-item.fail{border-left:3px solid var(--red)}
.review-q{font-size:.88rem;color:var(--text);margin-bottom:.5rem;line-height:1.5}
.review-ans{font-size:.82rem;display:flex;gap:1rem;flex-wrap:wrap}
.review-your{color:var(--red)}
.review-correct{color:var(--green)}
.review-ok-lbl{color:var(--green);font-size:.82rem}

.results-actions{display:flex;gap:.75rem;justify-content:center;padding:2rem;flex-wrap:wrap}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.6rem 1.4rem;border-radius:var(--radius-xs);cursor:pointer;font-size:.9rem;font-weight:500;transition:all .15s}
.btn-secondary:hover{border-color:var(--border2);background:var(--surface2)}
.btn-filter{background:none;border:1px solid var(--border);color:var(--text2);padding:.3rem .8rem;border-radius:20px;cursor:pointer;font-size:.8rem;transition:all .15s}
.btn-filter.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.filter-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home">
  <div class="home-header">
    <div class="logo-ring">🎓</div>
    <h1>Centro de Evaluación</h1>
    <p>Colpensiones — Cuestionarios de conocimiento institucional</p>
  </div>
  <div class="quizzes-grid" id="quizzes-grid"></div>
</div>

<!-- QUIZ -->
<div id="screen-quiz">
  <div class="quiz-topbar">
    <button class="btn-back" onclick="goHome()">← Inicio</button>
    <span class="quiz-topbar-title" id="topbar-title"></span>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label"></span>
  </div>
  <div class="quiz-body">
    <div class="bloque-label" id="bloque-label"></div>
    <div class="question-counter" id="q-counter"></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-list" id="options-list"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <div class="quiz-nav">
      <span id="streak-info" style="font-size:.82rem;color:var(--text2)"></span>
      <button class="btn-primary" id="btn-next" onclick="nextQuestion()">Siguiente →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="screen-results">
  <div class="results-header">
    <div class="score-circle" id="score-circle">
      <span class="pct" id="score-pct"></span>
      <span class="lbl">correcto</span>
    </div>
    <div class="results-title" id="results-title"></div>
    <div class="results-sub" id="results-sub"></div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="stat-correct" style="color:var(--green)"></div><div class="stat-lbl">Correctas</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-wrong" style="color:var(--red)"></div><div class="stat-lbl">Incorrectas</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-total"></div><div class="stat-lbl">Total</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-pct" style="color:var(--amber)"></div><div class="stat-lbl">Porcentaje</div></div>
  </div>
  <div class="review-section">
    <div class="filter-row">
      <button class="btn-filter active" onclick="setFilter('all',this)">Todas</button>
      <button class="btn-filter" onclick="setFilter('fail',this)">Solo incorrectas</button>
      <button class="btn-filter" onclick="setFilter('ok',this)">Solo correctas</button>
    </div>
    <h3 id="review-heading">Revisión de respuestas</h3>
    <div id="review-list"></div>
  </div>
  <div class="results-actions">
    <button class="btn-primary" onclick="retryQuiz()">↺ Repetir cuestionario</button>
    <button class="btn-secondary" onclick="goHome()">← Volver al inicio</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// MOTOR DE MÓDULOS — No modificar esta sección
// Para agregar un módulo nuevo: copia el bloque de otro módulo
//   y pégalo antes del cierre de esta sección.
// Para desactivar un módulo: comenta su bloque (/* ... */)
// ════════════════════════════════════════════════════════════
const QUIZZES = {};
const META = {};

function registerModule(key, data) {
  QUIZZES[key] = {
    name: data.name,
    bloques: data.bloques,
    questions: data.questions
  };
  META[key] = {
    icon: data.icon,
    color: data.color,
    desc: data.desc
  };
}
// ════════════════════════════════════════════════════════════
// MÓDULOS REGISTRADOS ↓  (agrega, quita o reordena aquí)
// ════════════════════════════════════════════════════════════

// ============================================================
// ============================================================
// MÓDULO: constitucion
// Nombre: Constitución Política de Colombia — 1991
// Preguntas: 150
// ============================================================
registerModule("constitucion", {
  "name": "Constitución Política de Colombia — 1991",
  "icon": "🇨🇴",
  "color": "#4a90e2",
  "desc": "150 preguntas · Títulos I–XIII · Principios, Derechos, Poder Público, Régimen Económico y Reforma",
  "bloques": [
    "MÓDULO A — Títulos I y II: Principios Fundamentales, Derechos y Deberes (1–50)",
    "MÓDULO B — Títulos III–VII: Territorio, Ramas del Poder Público, Organización del Estado (51–100)",
    "MÓDULO C — Títulos VIII–XIII: Régimen Económico, Reforma Constitucional, Jurisprudencia (101–150)"
  ],
  "questions": [
    {"n":1,"bloque":0,"q":"El Preámbulo de la Constitución de 1991 enuncia los valores que el pueblo busca asegurar. ¿Cuáles son esos valores?","opts":["La libertad, la justicia, la igualdad, el conocimiento, la paz y la soberanía","La vida, la convivencia, el trabajo, la justicia, la igualdad, el conocimiento, la libertad y la paz","La dignidad, la soberanía, la democracia, el trabajo y la seguridad","La igualdad, la fraternidad, la solidaridad, la prosperidad y la libertad"],"ans":"B"},
    {"n":2,"bloque":0,"q":"El artículo 1° define el modelo de Estado colombiano. ¿Cuál opción lo recoge correctamente?","opts":["Estado federal, descentralizado, pluralista, con autonomía plena de sus territorios","Estado social de derecho, República unitaria, descentralizada, con autonomía de sus entidades territoriales, democrática, participativa y pluralista, fundada en el respeto de la dignidad humana, el trabajo y la solidaridad","Estado democrático y social, unitario centralizado, fundado en la igualdad y la seguridad jurídica","Estado constitucional, plurinacional, descentralizado, con autonomía indígena y fundado en la interculturalidad"],"ans":"B"},
    {"n":3,"bloque":0,"q":"Según el artículo 2°, ¿cuáles son los fines esenciales del Estado colombiano?","opts":["Garantizar el orden público, administrar justicia, recaudar tributos y defender el territorio","Servir a la comunidad, promover la prosperidad general, garantizar la efectividad de derechos y deberes, facilitar la participación, defender la independencia, mantener la integridad territorial y asegurar la convivencia pacífica","Proteger los recursos naturales, fomentar el desarrollo económico, garantizar la seguridad y promover la integración latinoamericana","Establecer el bienestar general, distribuir la riqueza, garantizar salud y educación, y proteger el medio ambiente"],"ans":"B"},
    {"n":4,"bloque":0,"q":"El artículo 3° establece dónde reside la soberanía. ¿Cuál es la formulación correcta?","opts":["La soberanía reside en el Estado y se ejerce a través de los tres poderes públicos","La soberanía reside exclusivamente en el pueblo, del cual emana el poder público; el pueblo la ejerce en forma directa o por medio de sus representantes","La soberanía reside en la Constitución y se ejerce por los jueces constitucionales","La soberanía es compartida entre el pueblo y el Congreso, quienes la ejercen concurrentemente"],"ans":"B"},
    {"n":5,"bloque":0,"q":"El artículo 4° establece la supremacía constitucional. ¿Qué consecuencia tiene para servidores públicos y particulares?","opts":["Solo los servidores públicos están obligados a acatar la Constitución","La Constitución es norma de normas; en todo caso de incompatibilidad con la ley u otra norma jurídica se aplicarán las disposiciones constitucionales; es deber de los nacionales y extranjeros acatarla","La Constitución prevalece solo en materia de derechos fundamentales; en los demás aspectos las leyes orgánicas tienen igual jerarquía","La supremacía constitucional opera únicamente cuando la Corte Constitucional así lo declara"],"ans":"B"},
    {"n":6,"bloque":0,"q":"El artículo 6° establece una diferencia fundamental en la responsabilidad de servidores públicos y particulares. ¿En qué consiste?","opts":["Los particulares responden por infracciones; los servidores solo responden disciplinariamente","Los particulares son responsables ante las autoridades por infringir la Constitución y las leyes; los servidores públicos responden por esos mismos hechos y además por omisión o extralimitación en el ejercicio de sus funciones","Los particulares responden penalmente; los servidores públicos responden únicamente ante sus superiores jerárquicos","Los dos tipos de sujetos responden en igualdad de condiciones sin ninguna distinción"],"ans":"B"},
    {"n":7,"bloque":0,"q":"¿Qué obligación impone el artículo 8° relacionada con el patrimonio nacional?","opts":["Es obligación exclusiva del Estado proteger las riquezas culturales y naturales","Es obligación del Estado y de las personas proteger las riquezas culturales y naturales de la Nación","Es obligación de los municipios y departamentos preservar el patrimonio dentro de sus territorios","Es obligación solo de las comunidades étnicas preservar su patrimonio cultural"],"ans":"B"},
    {"n":8,"bloque":0,"q":"El artículo 9° establece los fundamentos de las relaciones exteriores. ¿Cuáles son?","opts":["La seguridad nacional, la defensa del territorio, la cooperación económica y la integración andina","La soberanía nacional, el respeto a la autodeterminación de los pueblos y el reconocimiento de los principios del derecho internacional aceptados por Colombia; la política exterior se orientará hacia la integración latinoamericana y del Caribe","El libre comercio, los tratados bilaterales, la no injerencia en asuntos internos y el respeto por la jurisdicción universal","La soberanía compartida, los acuerdos multilaterales, el principio de reciprocidad y la defensa de los colombianos en el exterior"],"ans":"B"},
    {"n":9,"bloque":0,"q":"El artículo 10° establece el idioma oficial. ¿Qué regla especial contempla para los grupos étnicos?","opts":["El castellano es el único idioma oficial en todo el territorio nacional sin excepción","El castellano es el idioma oficial de Colombia; las lenguas y dialectos de los grupos étnicos son también oficiales en sus territorios; la enseñanza en comunidades con tradiciones lingüísticas propias será bilingüe","Las lenguas indígenas son co-oficiales en todo el país con el mismo rango que el castellano","El Gobierno puede declarar otros idiomas como oficiales en regiones donde más del 30% los hable"],"ans":"B"},
    {"n":10,"bloque":0,"q":"Según el artículo 5°, ¿qué dos reconocimientos hace el Estado sin discriminación alguna?","opts":["La primacía de los derechos inalienables de la persona y el amparo a la familia como institución básica de la sociedad","La igualdad de todas las personas ante la ley y la protección del medio ambiente","La dignidad humana como valor supremo y el trabajo como derecho irrenunciable","La libertad de cultos y la protección especial a los grupos étnicos"],"ans":"A"},
    {"n":11,"bloque":0,"q":"El artículo 11 establece que el derecho a la vida es inviolable y prohíbe expresamente una sanción específica. ¿Cuál?","opts":["La cadena perpetua","La extradición de nacionales","La pena de muerte","La reclusión en establecimientos de máxima seguridad"],"ans":"C"},
    {"n":12,"bloque":0,"q":"El artículo 13 consagra el derecho a la igualdad. ¿Qué obligación específica impone al Estado respecto a grupos discriminados?","opts":["Solo prohíbe la discriminación pero no impone obligaciones positivas","El Estado promoverá las condiciones para que la igualdad sea real y efectiva y adoptará medidas en favor de grupos discriminados o marginados; protegerá especialmente a las personas en circunstancia de debilidad manifiesta","El Estado debe garantizar igualdad de resultados entre todos los ciudadanos a través de la redistribución económica","El Estado solo debe abstenerse de discriminar, pero la igualdad real depende exclusivamente de la iniciativa privada"],"ans":"B"},
    {"n":13,"bloque":0,"q":"El artículo 15 consagra el derecho a la intimidad y el habeas data. ¿Qué facultades otorga respecto a datos personales?","opts":["Solo el derecho a conocer qué datos existen sobre ellas en archivos públicos","El derecho a conocer, actualizar y rectificar las informaciones que sobre ellas se hayan recogido en bancos de datos y en archivos de entidades públicas y privadas","El derecho a solicitar la eliminación total de sus datos de cualquier base de datos sin excepción","El derecho a impedir que cualquier entidad recolecte información personal bajo cualquier circunstancia"],"ans":"B"},
    {"n":14,"bloque":0,"q":"El artículo 16 consagra el libre desarrollo de la personalidad. ¿Con qué límites?","opts":["Sin ningún límite; es un derecho absoluto que prevalece sobre cualquier norma","Con las limitaciones que imponga el bienestar general, la salubridad pública y el orden económico","Sin más limitaciones que las que imponen los derechos de los demás y el orden jurídico","Con los límites que establezcan la moral pública, las buenas costumbres y la tradición cultural"],"ans":"C"},
    {"n":15,"bloque":0,"q":"El artículo 18 consagra la libertad de conciencia. ¿Qué garantía específica establece frente a declaraciones sobre convicciones?","opts":["Se garantiza la libertad de conciencia solo en el ámbito privado, no en el espacio público","Nadie será molestado por razón de sus convicciones o creencias ni compelido a revelarlas ni obligado a actuar contra su conciencia","La libertad de conciencia puede limitarse cuando afecte el orden público o la seguridad del Estado","La conciencia solo puede invocarse como causal de objeción en el servicio militar"],"ans":"B"},
    {"n":16,"bloque":0,"q":"El artículo 20 consagra la libertad de expresión e información. ¿Qué prohibición expresa contiene?","opts":["Prohíbe que los medios privados reciban financiación estatal","Se garantiza la libertad de expresar y difundir el pensamiento y las opiniones; se prohíbe la censura","Prohíbe la publicación de información que afecte la seguridad nacional","Prohíbe que los extranjeros sean propietarios de medios de comunicación en Colombia"],"ans":"B"},
    {"n":17,"bloque":0,"q":"El artículo 23 consagra el derecho de petición. ¿Cuál es su alcance actual?","opts":["Aplica exclusivamente ante autoridades públicas del orden nacional","Toda persona tiene derecho a presentar peticiones respetuosas a las autoridades y a obtener pronta resolución; el legislador podrá reglamentar su ejercicio ante organizaciones privadas para garantizar los derechos fundamentales","Aplica solo cuando el peticionario acredita un interés legítimo reconocido por la ley","Aplica únicamente en asuntos administrativos y no en materia judicial ni legislativa"],"ans":"B"},
    {"n":18,"bloque":0,"q":"El artículo 29 consagra el debido proceso. ¿Cuál es la regla sobre la prueba obtenida con violación de este derecho?","opts":["La prueba ilícita puede ser admitida por el juez si es el único medio para acreditar la verdad","Es nula de pleno derecho la prueba obtenida con violación del debido proceso","La prueba ilícita puede usarse con autorización del juez cuando sea necesaria para esclarecer graves delitos","El juez tiene discreción para admitir o excluir la prueba ilícita según las circunstancias"],"ans":"B"},
    {"n":19,"bloque":0,"q":"El artículo 30 consagra el habeas corpus. ¿Ante quién puede invocarse y en qué plazo debe resolverse?","opts":["Solo ante el juez penal competente en un plazo de diez días hábiles","Quien esté privado de su libertad y crea estarlo ilegalmente puede invocar ante cualquier autoridad judicial el habeas corpus, que debe resolverse en el término de 36 horas","Solo ante el juez constitucional y en el término de 48 horas de presentada la solicitud","Ante el ministerio público o la fiscalía, quienes deben resolver en el término de 72 horas"],"ans":"B"},
    {"n":20,"bloque":0,"q":"El artículo 33 consagra el derecho a la no autoincriminación. ¿Cuál es su alcance?","opts":["Solo cubre al imputado en proceso penal, no a testigos","Nadie podrá ser obligado a declarar contra sí mismo o contra su cónyuge, compañero permanente o parientes dentro del cuarto grado de consanguinidad, segundo de afinidad o primero civil","Cubre únicamente al imputado en materia penal y a sus cónsules o representantes diplomáticos","Aplica solo en juicios orales y no en investigaciones administrativas o disciplinarias"],"ans":"B"},
    {"n":21,"bloque":0,"q":"El artículo 34 prohíbe ciertas penas pero contempla una excepción importante sobre bienes. ¿En qué consiste?","opts":["Se prohíben destierro, prisión perpetua y confiscación sin excepción alguna","Se prohíben destierro, prisión perpetua y confiscación; pero por sentencia judicial se declarará extinguido el dominio sobre bienes adquiridos mediante enriquecimiento ilícito, en perjuicio del Tesoro Público o con grave deterioro de la moral social","Se prohíbe la pena de muerte y la cadena perpetua, pero permite la confiscación de bienes cuando exista condena penal","Solo se prohíbe la pena de muerte; las demás penas pueden aplicarse según las circunstancias"],"ans":"B"},
    {"n":22,"bloque":0,"q":"El artículo 37 reconoce el derecho de reunión y manifestación pública. ¿Qué tipo de reuniones se prohíben expresamente?","opts":["Las reuniones de más de 500 personas sin autorización previa de las autoridades","Toda reunión y manifestación pública y pacífica es lícita; la ley puede limitar expresamente este ejercicio; las reuniones armadas están prohibidas","Las reuniones en espacio público requieren permiso previo de la alcaldía y notificación a la Policía","Solo se requiere aviso previo a las autoridades; no existe ninguna restricción al ejercicio de este derecho"],"ans":"B"},
    {"n":23,"bloque":0,"q":"El artículo 40 consagra el derecho a participar en la conformación del poder político. ¿Cuáles son algunos de los mecanismos enumerados?","opts":["Únicamente el derecho a elegir y ser elegido en elecciones populares","Elegir y ser elegido; participar en elecciones, plebiscitos, referendos, consultas populares; constituir partidos; revocar el mandato de los elegidos; tener iniciativa en corporaciones públicas; interponer acciones públicas; y acceder al desempeño de funciones y cargos públicos","Solo elegir representantes, votar en plebiscitos y presentar peticiones a las autoridades","Votar en elecciones, pertenecer a partidos políticos y participar en consultas populares convocadas por el Gobierno"],"ans":"B"},
    {"n":24,"bloque":0,"q":"El artículo 29 establece el principio de legalidad penal. ¿Cómo está formulado?","opts":["Nadie puede ser juzgado sino conforme a las leyes preexistentes al acto que se le imputa, ante juez o tribunal competente, y con observancia de la plenitud de las formas propias de cada juicio","Solo podrá ser juzgado quien sea capturado en flagrancia o con orden judicial previa","El legislador tiene discreción para tipificar conductas con efectos retroactivos cuando lo exija el interés general","La ley penal puede aplicarse retroactivamente cuando beneficie al procesado pero no cuando lo perjudique"],"ans":"A"},
    {"n":25,"bloque":0,"q":"El artículo 28 consagra la libertad personal. ¿Cuándo puede privarse de la libertad a una persona?","opts":["En cualquier momento si existe sospecha razonable de la comisión de un delito","Nadie puede ser molestado en su persona o familia, ni reducido a prisión o arresto, ni detenido, ni su domicilio registrado, sino en virtud de mandamiento escrito de autoridad judicial competente, con las formalidades legales y por motivo previamente definido en la ley","La privación de libertad solo requiere orden verbal de autoridad competente en casos de urgencia","La detención preventiva puede ordenarse por el fiscal sin control judicial posterior"],"ans":"B"},
    {"n":26,"bloque":0,"q":"El artículo 44 establece los derechos fundamentales de los niños. ¿Cuál es la regla especial sobre su prevalencia?","opts":["Los derechos de los niños tienen la misma jerarquía que los derechos de los adultos","Los derechos de los niños prevalecen sobre los derechos de los demás","Los derechos de los niños solo prevalecen sobre los derechos económicos de los adultos","Los derechos de los niños prevalecen únicamente cuando hay conflicto con los derechos del empleador"],"ans":"B"},
    {"n":27,"bloque":0,"q":"El artículo 48 consagra la seguridad social. ¿Cómo la define y bajo qué principios debe prestarse?","opts":["La seguridad social es un servicio privado complementario prestado bajo principios de eficiencia y rentabilidad","La seguridad social es un servicio público de carácter obligatorio que se prestará bajo la dirección, coordinación y control del Estado, en sujeción a los principios de eficiencia, universalidad y solidaridad","La seguridad social es un derecho prestacional de libre configuración legislativa sin principios constitucionales definidos","La seguridad social es un servicio mixto administrado por el sector privado bajo supervisión bancaria"],"ans":"B"},
    {"n":28,"bloque":0,"q":"El artículo 49 consagra el derecho a la salud y al saneamiento ambiental. ¿Cuál es su caracterización?","opts":["La salud es únicamente un servicio público sin carácter de derecho subjetivo exigible","La atención de la salud y el saneamiento ambiental son servicios públicos a cargo del Estado; se garantiza a todas las personas el acceso a los servicios de promoción, protección y recuperación de la salud","La salud es un derecho privado que debe ser satisfecho por el mercado con mínima intervención estatal","La salud se garantiza solo a quienes estén afiliados al sistema de seguridad social"],"ans":"B"},
    {"n":29,"bloque":0,"q":"El artículo 51 consagra el derecho a la vivienda digna. ¿Qué obligación impone al Estado?","opts":["El Estado debe construir y entregar gratuitamente vivienda a todos los colombianos en situación de pobreza","El Estado fijará las condiciones necesarias para hacer efectivo este derecho y promoverá planes de vivienda de interés social, sistemas adecuados de financiación a largo plazo y formas asociativas de ejecución de estos programas","El Estado garantiza el acceso a la vivienda solo a través del subsidio familiar sin otras obligaciones","El derecho a la vivienda digna es un fin programático sin obligaciones concretas para el Estado"],"ans":"B"},
    {"n":30,"bloque":0,"q":"El artículo 53 establece el estatuto del trabajo. ¿Cuáles son algunos de los principios mínimos que debe contener?","opts":["Solo la igualdad de oportunidades y la estabilidad en el empleo","Igualdad de oportunidades; remuneración mínima vital y móvil; estabilidad en el empleo; irrenunciabilidad de beneficios mínimos; situación más favorable al trabajador en caso de duda; primacía de la realidad; garantías a la seguridad social; capacitación y descanso necesario","Solo el salario mínimo, la jornada máxima y las prestaciones sociales básicas","La primacía del contrato laboral escrito, la irrenunciabilidad total de derechos y la estabilidad laboral absoluta"],"ans":"B"},
    {"n":31,"bloque":0,"q":"El artículo 58 garantiza la propiedad privada. ¿Bajo qué condición puede ser expropiada y qué función tiene?","opts":["La propiedad privada es absoluta e inviolable; solo puede limitarse por tratados internacionales","Se garantiza la propiedad privada y demás derechos adquiridos; cuando así lo exija el interés social o la utilidad pública, puede haber expropiación mediante sentencia judicial e indemnización previa; la propiedad tiene una función social que implica obligaciones","La propiedad puede limitarse en cualquier momento por decreto presidencial cuando lo exija la economía nacional","La propiedad privada no puede ser expropiada bajo ninguna circunstancia en un Estado de derecho"],"ans":"B"},
    {"n":32,"bloque":0,"q":"El artículo 67 consagra el derecho a la educación. ¿Cuál es la fórmula sobre gratuidad y obligatoriedad?","opts":["La educación es un derecho y un servicio público; entre los 5 y 15 años es obligatoria e incluirá como mínimo un año de preescolar y nueve de educación básica; la educación será gratuita en las instituciones del Estado, sin perjuicio del cobro a quienes puedan sufragarlos","La educación es gratuita y obligatoria hasta los 18 años en todos los establecimientos públicos y privados","La educación básica es responsabilidad exclusiva del Estado sin participación de la familia","Solo la educación universitaria es gratuita en los establecimientos del Estado"],"ans":"A"},
    {"n":33,"bloque":0,"q":"El artículo 70 consagra el acceso a la cultura. ¿Qué relación establece con la identidad nacional?","opts":["La cultura solo puede ser promovida por el Estado a través de sus instituciones oficiales","El Estado tiene el deber de promover y fomentar el acceso a la cultura de todos los colombianos en igualdad de oportunidades; la cultura es fundamento de la nacionalidad; el Estado reconocerá y protegerá la diversidad étnica y cultural de la Nación","La cultura es un asunto de iniciativa privada sin obligaciones para el Estado","El Estado solo protege la cultura colombiana frente a influencias extranjeras mediante restricciones"],"ans":"B"},
    {"n":34,"bloque":0,"q":"El artículo 72 establece el régimen del patrimonio cultural. ¿Qué restricción especial existe para los bienes arqueológicos?","opts":["El patrimonio cultural puede enajenarse libremente por sus propietarios privados","El patrimonio cultural de la Nación está bajo la protección del Estado; los bienes arqueológicos pertenecen a la Nación y son inalienables, inembargables e imprescriptibles","Los bienes arqueológicos pueden ser vendidos al exterior con licencia previa del Ministerio de Cultura","El patrimonio cultural es de propiedad de las entidades territoriales donde se ubica físicamente"],"ans":"B"},
    {"n":35,"bloque":0,"q":"El artículo 46 establece la protección especial del Estado a los adultos mayores. ¿Qué obligación impone a la familia, la sociedad y el Estado?","opts":["La obligación de proveer pensión de vejez a todo adulto mayor sin importar su historia laboral","La protección y asistencia del adulto mayor, garantizando su integración a la vida activa y comunitaria; el Estado garantizará los servicios de la seguridad social integral y el subsidio alimentario en caso de indigencia","La obligación de garantizar vivienda gratuita a todos los adultos mayores en situación de abandono","Solo al Estado le corresponde la protección del adulto mayor, sin obligaciones para la familia"],"ans":"B"},
    {"n":36,"bloque":0,"q":"El artículo 42 de la Constitución define a la familia. ¿Cuál es la regla sobre la igualdad de derechos en las relaciones familiares?","opts":["El padre de familia tiene mayor autoridad en las decisiones familiares según la tradición jurídica colombiana","Las relaciones familiares se basan en la igualdad de derechos y deberes de la pareja y en el respeto recíproco entre todos sus integrantes; cualquier forma de violencia en la familia se considera destructiva de su armonía y unidad","Los derechos de la pareja son iguales pero los deberes pueden diferenciarse por razones de naturaleza biológica","La igualdad solo aplica a los derechos patrimoniales y no a los personales dentro del matrimonio"],"ans":"B"},
    {"n":37,"bloque":0,"q":"El artículo 79 consagra el derecho a un ambiente sano. ¿Qué obligación tiene quien cause daño ambiental?","opts":["Solo el Estado tiene la obligación de proteger el medio ambiente sin responsabilidad para los particulares","Toda persona tiene derecho a gozar de un ambiente sano; la ley garantizará la participación de la comunidad en las decisiones que puedan afectarlo; es deber del Estado proteger la diversidad e integridad del ambiente; quien cause daño al ambiente deberá repararlo","Los daños ambientales solo son perseguibles penalmente pero no generan responsabilidad civil ni administrativa","El derecho a un ambiente sano es un derecho programático sin mecanismos específicos de protección"],"ans":"B"},
    {"n":38,"bloque":0,"q":"El artículo 83 consagra el principio de buena fe. ¿Cómo opera respecto a las actuaciones de particulares ante el Estado?","opts":["Los particulares deben probar su buena fe en cada actuación ante el Estado","Las actuaciones de los particulares y de las autoridades públicas deberán ceñirse a los postulados de la buena fe, la cual se presumirá en todas las gestiones que aquellos adelanten ante estas","La buena fe solo aplica en relaciones contractuales con el Estado y no en actuaciones administrativas","Los particulares tienen la carga de demostrar que actúan de buena fe cuando el Estado lo requiera"],"ans":"B"},
    {"n":39,"bloque":0,"q":"El artículo 86 consagra la acción de tutela. ¿Cuáles son sus elementos esenciales?","opts":["Es una acción ordinaria que procede contra todas las autoridades y particulares sin excepción","Toda persona puede reclamar ante los jueces en todo momento y lugar, mediante procedimiento preferente y sumario, la protección inmediata de sus derechos constitucionales fundamentales cuando resulten vulnerados o amenazados por la acción o la omisión de cualquier autoridad pública; procede contra particulares en los casos previstos por la ley","La tutela solo procede contra autoridades públicas del orden ejecutivo y no contra el Congreso ni la rama judicial","La tutela procede siempre que se invoque cualquier derecho constitucional, no solo los fundamentales"],"ans":"B"},
    {"n":40,"bloque":0,"q":"El artículo 87 consagra la acción de cumplimiento. ¿Cuál es su objeto?","opts":["Proteger los derechos colectivos de la comunidad frente a daños ambientales","Toda persona puede acudir ante la autoridad judicial para hacer efectivo el cumplimiento de una ley o un acto administrativo","Impugnar los actos administrativos que lesionen derechos subjetivos de los ciudadanos","Solicitar la declaratoria de inexequibilidad de leyes que contraríen la Constitución"],"ans":"B"},
    {"n":41,"bloque":0,"q":"El artículo 88 consagra las acciones populares y las acciones de grupo. ¿Cuál es la diferencia entre estas dos acciones?","opts":["Son la misma acción con distintos nombres","Las acciones populares protegen derechos e intereses colectivos; las acciones de grupo son el medio procesal para obtener el reconocimiento y pago de indemnización de los daños y perjuicios causados a un número plural de personas","Las acciones populares las ejercen autoridades públicas; las de grupo las ejercen particulares afectados","Las acciones populares solo proceden en materia ambiental; las de grupo en materia de consumidores"],"ans":"B"},
    {"n":42,"bloque":0,"q":"El artículo 90 establece la responsabilidad patrimonial del Estado. ¿Cuál es el mecanismo de recuperación frente al funcionario responsable?","opts":["El Estado no puede recuperar los dineros pagados por su responsabilidad, esos costos son asumidos definitivamente por el erario","El Estado responde patrimonialmente por los daños antijurídicos que le sean imputables; cuando la conducta sea dolosa o gravemente culposa del agente, el Estado deberá repetir contra este","El Estado puede sancionar disciplinariamente al funcionario pero no puede iniciar una acción civil de repetición","La repetición es facultativa del Estado y solo procede en casos de condena penal del funcionario"],"ans":"B"},
    {"n":43,"bloque":0,"q":"El artículo 93 establece la prevalencia de los tratados internacionales de derechos humanos. ¿En qué condición operan como parámetro de constitucionalidad?","opts":["Todos los tratados internacionales prevalecen sobre la Constitución sin importar su contenido","Los tratados y convenios internacionales ratificados por el Congreso que reconocen derechos humanos y prohíben su limitación en los estados de excepción prevalecen en el orden interno; los derechos y deberes de la Constitución se interpretarán de conformidad con los tratados de derechos humanos ratificados por Colombia","Solo los tratados de la OEA y la ONU prevalecen sobre la Constitución en materia de derechos","Los tratados de derechos humanos solo sirven como criterio auxiliar de interpretación sin carácter vinculante"],"ans":"B"},
    {"n":44,"bloque":0,"q":"El artículo 94 establece el principio de la no negación de derechos. ¿Qué consagra?","opts":["La enumeración de derechos en la Constitución y los convenios internacionales no debe entenderse como negación de otros que, siendo inherentes a la persona humana, no figuren expresamente en ellos","Solo los derechos expresamente enumerados en la Constitución son exigibles ante los tribunales","La Constitución de 1991 es un catálogo cerrado y taxativo de derechos sin posibilidad de reconocimiento de derechos implícitos","Los derechos no enumerados pueden ser reconocidos solo mediante ley aprobada por mayoría calificada del Congreso"],"ans":"A"},
    {"n":45,"bloque":0,"q":"El artículo 95 enumera los deberes de la persona y del ciudadano. ¿Cuáles son algunos de los deberes expresamente mencionados?","opts":["Solo el pago de tributos y el servicio militar","Respetar los derechos ajenos, no abusar de los propios, obrar conforme al principio de solidaridad, respetar y apoyar a las autoridades democráticas, contribuir al financiamiento del Estado, proteger los recursos culturales y naturales, velar por la honra y bienestar de la familia, entre otros","Únicamente el voto obligatorio y el cumplimiento de las leyes","Solo el respeto por la propiedad privada, el pago de impuestos y el servicio a la comunidad"],"ans":"B"},
    {"n":46,"bloque":0,"q":"El artículo 84 de la Constitución establece una garantía frente a la reglamentación de derechos. ¿Cuál?","opts":["El Estado puede exigir permisos, licencias o requisitos adicionales para ejercer cualquier derecho","Cuando un derecho o una actividad hayan sido reglamentados de manera general, las autoridades públicas no podrán establecer ni exigir permisos, licencias o requisitos adicionales para su ejercicio","Solo las corporaciones públicas de elección popular pueden reglamentar los derechos constitucionales","El Gobierno puede establecer requisitos adicionales a los legales mediante decretos reglamentarios"],"ans":"B"},
    {"n":47,"bloque":0,"q":"El artículo 85 señala los derechos de aplicación inmediata. ¿Qué significa esta categoría?","opts":["Son derechos que no requieren desarrollo legislativo para ser exigibles directamente ante los jueces","Son derechos que el legislador tiene prioridad en desarrollar dentro de los dos años siguientes a la Constitución","Son derechos que solo aplican para los funcionarios públicos sin extensión a los particulares","Son derechos que la Corte Constitucional ha declarado como fundamentales mediante sentencia de tutela"],"ans":"A"},
    {"n":48,"bloque":0,"q":"El artículo 53 establece el carácter de los tratados internacionales del trabajo. ¿Cuál?","opts":["Los convenios de la OIT deben ser ratificados por ley ordinaria para tener efecto interno","Los convenios internacionales del trabajo debidamente ratificados hacen parte de la legislación interna","Los convenios de la OIT no tienen aplicación directa en Colombia hasta que sean incorporados por decreto","Los tratados del trabajo tienen jerarquía constitucional automática sin necesidad de ratificación"],"ans":"B"},
    {"n":49,"bloque":0,"q":"El artículo 22 establece la paz. ¿Cómo la consagra y cuál es su carácter?","opts":["La paz es solo un objetivo del Estado sin carácter de derecho individual","La paz es un derecho y un deber de obligatorio cumplimiento","La paz es un bien colectivo que solo puede ser garantizado por el Estado","La paz es un principio orientador de la política exterior sin alcance de derecho interno"],"ans":"B"},
    {"n":50,"bloque":0,"q":"El artículo 19 consagra la libertad de cultos. ¿Cuál es su formulación?","opts":["Colombia es un Estado laico que no reconoce ninguna religión y prohíbe el financiamiento de iglesias","Se garantiza la libertad de cultos; toda persona tiene derecho a profesar libremente su religión y a difundirla en forma individual o colectiva; todas las confesiones religiosas e iglesias son igualmente libres ante la ley","La Iglesia Católica tiene un estatus privilegiado reconocido por el concordato con la Santa Sede","Las religiones deben obtener autorización estatal para ejercer sus cultos en Colombia"],"ans":"B"},
    {"n":51,"bloque":1,"q":"El artículo 96 establece la nacionalidad colombiana. ¿Por cuáles vínculos se adquiere?","opts":["Solo por nacimiento en territorio colombiano","Por nacimiento (nacer en territorio colombiano, ser hijo de padre o madre colombianos naturales o adoptar la nacionalidad) o por adopción (extranjeros que la soliciten y cumplan los requisitos legales)","Solo por ser hijo de padre o madre colombiana, independientemente del lugar de nacimiento","Solo por residencia de más de 5 años en el territorio nacional con fines de trabajo lícito"],"ans":"B"},
    {"n":52,"bloque":1,"q":"El artículo 101 define el territorio nacional. ¿Cuáles son sus componentes?","opts":["Solo el territorio continental y las aguas jurisdiccionales","El territorio continental, el archipiélago de San Andrés, Providencia y Santa Catalina, la isla de Malpelo y demás islas; el subsuelo, el mar territorial, la zona contigua, la plataforma continental, la zona económica exclusiva, el espacio aéreo y el segmento de la órbita geoestacionaria","Solo el territorio terrestre y el espacio aéreo nacional delimitado por tratados","El territorio nacional equivale al espacio físico delimitado por las fronteras internacionales reconocidas"],"ans":"B"},
    {"n":53,"bloque":1,"q":"El artículo 103 enumera los mecanismos de participación del pueblo. ¿Cuáles son todos los enumerados?","opts":["Solo el voto, el referendo y la consulta popular","El voto, el plebiscito, el referendo, la consulta popular, el cabildo abierto, la iniciativa legislativa y la revocatoria del mandato","Solo la iniciativa popular legislativa, el referendo y la revocatoria del mandato","El plebiscito, el referendo constitucional, las consultas previas y las audiencias públicas"],"ans":"B"},
    {"n":54,"bloque":1,"q":"El artículo 113 establece las Ramas del Poder Público. ¿Qué principio rige su relación?","opts":["Las tres ramas son completamente independientes sin ningún tipo de colaboración entre ellas","Son Ramas del Poder Público la legislativa, la ejecutiva y la judicial; existen otros órganos autónomos e independientes; los diferentes órganos tienen funciones separadas pero colaboran armónicamente para la realización de sus fines","Las ramas del poder son cuatro: legislativa, ejecutiva, judicial y electoral","Las ramas del poder están subordinadas al Presidente de la República quien coordina su funcionamiento"],"ans":"B"},
    {"n":55,"bloque":1,"q":"El artículo 116 establece quiénes administran justicia. ¿En qué circunstancias pueden los particulares ejercer funciones jurisdiccionales?","opts":["Los particulares nunca pueden ejercer funciones jurisdiccionales en Colombia","Los particulares pueden ser investidos transitoriamente de la función de administrar justicia en la condición de jurados en causas criminales, conciliadores o árbitros habilitados por las partes para proferir fallos en derecho o en equidad","Los particulares solo pueden actuar como peritos, no como jueces o árbitros","Los particulares pueden ejercer funciones judiciales solo en municipios donde no haya jueces de la República"],"ans":"B"},
    {"n":56,"bloque":1,"q":"El artículo 121 establece el principio de legalidad de las funciones públicas. ¿Cómo está formulado?","opts":["Las autoridades públicas pueden hacer todo lo que no les esté expresamente prohibido","Ninguna autoridad del Estado podrá ejercer funciones distintas de las que le atribuyen la Constitución y la ley","Las autoridades pueden actuar cuando cuenten con autorización expresa del Presidente de la República","Las autoridades públicas tienen libertad de actuación dentro del margen de discrecionalidad que les otorga la ley"],"ans":"B"},
    {"n":57,"bloque":1,"q":"El artículo 114 establece las funciones del Congreso de la República. ¿Cuáles son?","opts":["Solo expedir leyes y reformar la Constitución","Reformar la Constitución, hacer las leyes y ejercer control político sobre el Gobierno y la administración","Legislar, juzgar al Presidente y administrar los bienes de la Nación","Solo el control político sin función legislativa, la cual corresponde exclusivamente al Gobierno"],"ans":"B"},
    {"n":58,"bloque":1,"q":"El artículo 133 establece la responsabilidad de los congresistas. ¿Ante quién responden?","opts":["Los congresistas responden única y exclusivamente ante sus partidos políticos","Los miembros de cuerpos colegiados de elección directa representan al pueblo y deberán actuar consultando la justicia y el bien común; el voto será nominal y público excepto en los casos que determine la ley; los congresistas son responsables políticamente ante la sociedad y frente a sus electores","Los congresistas no tienen responsabilidad por sus votaciones, las cuales son libres e inviolables","Los congresistas responden solo ante la Corte Suprema de Justicia"],"ans":"B"},
    {"n":59,"bloque":1,"q":"El artículo 150 establece las funciones del Congreso para hacer las leyes. ¿Cuáles son algunas de las más importantes?","opts":["Solo interpretar la Constitución y aprobar el presupuesto nacional","Interpretar, reformar y derogar leyes; expedir códigos; aprobar el plan de desarrollo; determinar la estructura de la administración nacional; revestir al Presidente de facultades extraordinarias; aprobar el presupuesto; aprobar tratados y convenios internacionales","Solo aprobar leyes ordinarias y orgánicas sin funciones de control político","Solo expedir leyes tributarias y el presupuesto general de la Nación"],"ans":"B"},
    {"n":60,"bloque":1,"q":"El artículo 157 establece cuándo un proyecto se convierte en ley. ¿Cuáles son los cuatro requisitos?","opts":["Solo que sea aprobado por mayoría simple en cada cámara","Haber sido publicado oficialmente por el Congreso; haber sido aprobado en primer debate en la comisión permanente de cada cámara; haber sido aprobado en cada cámara en segundo debate; haber obtenido la sanción del Gobierno","Aprobación por mayoría calificada en ambas cámaras y sanción presidencial","Solo aprobación en plenaria de ambas cámaras y promulgación en el Diario Oficial"],"ans":"B"},
    {"n":61,"bloque":1,"q":"El artículo 166 establece el plazo para que el Presidente objete o sancione un proyecto. ¿Cuáles son los plazos?","opts":["Siempre tiene 10 días hábiles sin importar la extensión del proyecto","Seis días para proyectos de menos de veinte artículos; diez días para los de veinte a cincuenta artículos; veinte días para los que tengan más de cincuenta artículos","Siempre tiene 30 días calendario para objetar o sancionar cualquier proyecto de ley","15 días para todos los proyectos con extensión adicional de 5 días por cada 10 artículos adicionales"],"ans":"B"},
    {"n":62,"bloque":1,"q":"El artículo 170 consagra el referendo derogatorio de leyes. ¿Cuáles son las condiciones para que proceda?","opts":["Solo el Gobierno puede convocar un referendo derogatorio de leyes","Un número de ciudadanos equivalente a la décima parte del censo electoral puede solicitar la convocatoria de un referendo para derogar una ley; si la mayoría de los votantes lo aprueba, con un quórum de la cuarta parte más uno del total del censo electoral, la ley quedará derogada","El 5% del censo electoral puede solicitar el referendo derogatorio ante el Congreso","El referendo derogatorio es convocado únicamente por el Presidente con concepto favorable del Consejo de Estado"],"ans":"B"},
    {"n":63,"bloque":1,"q":"El artículo 155 establece la iniciativa popular legislativa. ¿Cuántos ciudadanos deben firmarla?","opts":["100.000 ciudadanos en ejercicio","Un número de ciudadanos igual o superior al cinco por ciento del censo electoral vigente","El 1% del censo electoral o 50.000 ciudadanos lo que sea menor","500 ciudadanos organizados en comités de iniciativa popular"],"ans":"B"},
    {"n":64,"bloque":1,"q":"El artículo 179 establece las inhabilidades para ser elegido congresista. ¿Cuál de las siguientes es una de ellas?","opts":["Haber participado en actividades sindicales en los últimos dos años","Haber sido condenado por sentencia judicial a pena privativa de la libertad salvo por delitos políticos o culposos; haber ejercido jurisdicción o autoridad política, civil, administrativa o militar dentro de los doce meses anteriores a la elección; haber participado en gestión de negocios ante entidades públicas en interés propio","Solo haber sido sancionado disciplinariamente por la Procuraduría en los últimos 5 años","Haber ejercido como magistrado de alta corte en los últimos tres años"],"ans":"B"},
    {"n":65,"bloque":1,"q":"El artículo 176 establece la circunscripción especial para grupos étnicos. ¿Cómo se distribuyen los representantes?","opts":["Dos representantes por las comunidades negras y uno por las indígenas","La ley podrá establecer circunscripción especial para grupos étnicos, minorías políticas y colombianos en el exterior; la circunscripción especial tiene cinco representantes: dos por comunidades negras, uno por comunidades indígenas, uno por minorías políticas y uno por colombianos en el exterior","Solo hay representación especial para las comunidades indígenas con tres escaños fijos en la Cámara","La circunscripción especial elige diez representantes para garantizar la diversidad étnica y política"],"ans":"B"},
    {"n":66,"bloque":1,"q":"El artículo 171 establece la circunscripción especial en el Senado para comunidades indígenas. ¿Cuántos senadores eligen?","opts":["Uno por cada resguardo indígena legalmente constituido","La ley garantizará la participación de las comunidades indígenas en el Congreso; habrá un número adicional de dos senadores elegidos en circunscripción nacional especial por comunidades indígenas","Cinco senadores elegidos en circunscripción especial regional","Tres senadores elegidos en circunscripción nacional por comunidades étnicas"],"ans":"B"},
    {"n":67,"bloque":1,"q":"El artículo 188 establece el juramento presidencial. ¿Cuáles son los compromisos del Presidente?","opts":["Guardar la Constitución, ejecutar las leyes y defender a la Nación","Cumplir la Constitución y las leyes de Colombia, respetar y hacer respetar los derechos y libertades de todos los colombianos y obrar siempre para el bien general","Servir al pueblo, proteger la soberanía y cumplir las funciones del cargo con honestidad","Defender la Constitución, combatir la corrupción y garantizar la seguridad nacional"],"ans":"B"},
    {"n":68,"bloque":1,"q":"El artículo 191 establece los requisitos para ser Presidente de la República. ¿Cuáles son?","opts":["Ser colombiano de nacimiento, mayor de 30 años, ciudadano en ejercicio y no tener doble nacionalidad","Ser colombiano de nacimiento, ciudadano en ejercicio y mayor de treinta años","Ser colombiano de nacimiento, mayor de 35 años, con título universitario y sin condenas penales","Ser colombiano por nacimiento o adopción, mayor de 25 años y en ejercicio pleno de derechos civiles"],"ans":"B"},
    {"n":69,"bloque":1,"q":"El artículo 197 establece la prohibición de reelección presidencial. ¿Cuál es la regla vigente?","opts":["El Presidente puede ser reelegido una sola vez","Nadie podrá ser elegido para ocupar la Presidencia de la República por más de una vez","El Presidente puede ser reelegido indefinidamente si obtiene más del 60% de los votos","El Presidente puede ser reelegido después de un período de cuatro años de no ejercer el cargo"],"ans":"B"},
    {"n":70,"bloque":1,"q":"El artículo 209 establece los principios de la función administrativa. ¿Cuáles son?","opts":["Eficiencia, economía y control","Igualdad, moralidad, eficacia, economía, celeridad, imparcialidad y publicidad","Legalidad, eficiencia, transparencia y buena fe","Responsabilidad, control, publicidad y participación"],"ans":"B"},
    {"n":71,"bloque":1,"q":"El artículo 212 regula el Estado de Guerra Exterior. ¿Cuáles son las condiciones para su declaratoria?","opts":["El Presidente puede declararlo unilateralmente cuando considere que la seguridad nacional está amenazada","El Presidente de la República, con la firma de todos los ministros, puede declarar el estado de guerra exterior; para declarar la guerra, el Gobierno necesita la autorización del Senado, salvo que sea necesario repeler una agresión extranjera; mientras subsista, el Congreso se reunirá de pleno derecho","El Presidente necesita aprobación del Congreso por mayoría absoluta para declarar cualquier estado de guerra","El estado de guerra solo puede declararse con aprobación previa de la Corte Constitucional"],"ans":"B"},
    {"n":72,"bloque":1,"q":"El artículo 215 regula el Estado de Emergencia Económica. ¿Cuál es el plazo máximo y cuántas veces puede declararse?","opts":["Puede declararse por períodos de 90 días por dos veces al año máximo","Cada declaratoria no puede exceder treinta días prorrogables por treinta días más; en el año solo puede declararse por tres períodos; el Presidente solo podrá decretar las medidas necesarias para conjurar la crisis y evitar su extensión","Puede declararse por períodos de seis meses prorrogables indefinidamente por el Congreso","Solo puede declararse una vez al año por un período máximo de 180 días"],"ans":"B"},
    {"n":73,"bloque":1,"q":"El artículo 214 establece controles a los estados de excepción. ¿Cuáles son las prohibiciones expresas?","opts":["Solo se prohíbe suspender el derecho a la vida y a la integridad personal","Se prohíbe suspender los derechos humanos ni las libertades fundamentales; el Gobierno no podrá desmejorar los derechos sociales de los trabajadores; no podrán suspenderse los derechos del artículo 29; el Congreso se reunirá de pleno derecho y controlará cada medida adoptada","Durante los estados de excepción todas las garantías pueden suspenderse temporalmente","Solo se prohíbe suspender el habeas corpus y el derecho de petición durante los estados de excepción"],"ans":"B"},
    {"n":74,"bloque":1,"q":"El artículo 200 establece que los ministros tienen iniciativa legislativa. ¿Cuáles son sus otras funciones respecto al Congreso?","opts":["Los ministros solo elaboran proyectos de ley pero no pueden presentarlos directamente","Corresponde al Gobierno en relación con el Congreso: concurrir a la formación de las leyes; ejercer la iniciativa legislativa; objetar los proyectos de ley; promulgarlos; reglamentarlos; cumplirlos y hacerlos cumplir; presentar el plan de desarrollo y el presupuesto","Los ministros solo asisten al Congreso cuando son citados a debate de control político","Los ministros pueden presentar proyectos de ley pero solo en materias de su competencia sectorial"],"ans":"B"},
    {"n":75,"bloque":1,"q":"El artículo 228 establece la prevalencia del derecho sustancial. ¿Cómo está formulada esta regla?","opts":["Los procedimientos siempre prevalecen sobre el derecho sustancial para garantizar la seguridad jurídica","Las actuaciones de la administración de justicia son públicas y permanentes; en sus actuaciones prevalecerá el derecho sustancial; los términos procesales se observarán con diligencia y su incumplimiento será sancionado; su funcionamiento será desconcentrado y autónomo","El juez puede prescindir del derecho sustancial cuando el procedimiento sea más conveniente","El derecho sustancial y el procedimental tienen igual jerarquía; ninguno prevalece sobre el otro"],"ans":"B"},
    {"n":76,"bloque":1,"q":"El artículo 230 establece los criterios que guían las decisiones judiciales. ¿Cuáles son?","opts":["Los jueces pueden fallar según su conciencia sin sujeción a ninguna norma","Los jueces en sus providencias solo están sometidos al imperio de la ley; la equidad, la jurisprudencia, los principios generales del derecho y la doctrina son criterios auxiliares de la actividad judicial","Los jueces están sometidos a la ley y a la jurisprudencia obligatoria de las altas cortes en toda materia","Los jueces están sometidos a la ley, la Constitución y los tratados internacionales en igual jerarquía"],"ans":"B"},
    {"n":77,"bloque":1,"q":"El artículo 232 establece los requisitos para ser Magistrado de la Corte Suprema, Consejo de Estado o Corte Constitucional. ¿Cuáles son?","opts":["Ser colombiano, abogado, con 20 años de experiencia y sin condena penal","Ser colombiano de nacimiento y en ejercicio de la ciudadanía; ser abogado; no haber sido condenado a pena privativa de la libertad salvo por delitos políticos o culposos; haber desempeñado durante diez años cargos en la Rama Judicial, el Ministerio Público, ejercido la abogacía o la cátedra universitaria en disciplinas jurídicas","Solo se requiere ser colombiano, abogado y tener más de 45 años de edad","Se requieren 15 años de experiencia en el sector público, título de doctor en derecho y no tener vínculos políticos activos"],"ans":"B"},
    {"n":78,"bloque":1,"q":"El artículo 233 establece el período de los magistrados de las altas cortes. ¿Cuál es ese período?","opts":["Los magistrados tienen período de seis años y pueden ser reelegidos por una sola vez","Los magistrados de la Corte Constitucional, Corte Suprema, Consejo de Estado y Consejo Superior de la Judicatura son elegidos para períodos individuales de ocho años, no son reelegibles y permanecerán en el ejercicio de sus cargos mientras observen buena conducta y tengan rendimiento satisfactorio","El período de los magistrados es de diez años sin posibilidad de reelección","Los magistrados son de libre nombramiento y remoción; no tienen período fijo"],"ans":"B"},
    {"n":79,"bloque":1,"q":"El artículo 239 establece la composición y elección de los magistrados de la Corte Constitucional. ¿Cómo son elegidos?","opts":["Son elegidos directamente por el pueblo en elecciones generales","La Corte Constitucional tendrá el número impar de miembros que determine la ley; sus magistrados serán elegidos por el Senado de la República para períodos individuales de ocho años de ternas que le presenten el Presidente de la República, la Corte Suprema de Justicia y el Consejo de Estado","Son elegidos por el Congreso pleno de ternas presentadas solo por el Presidente de la República","Son nombrados por el Presidente de la República con aval del Congreso en votación pública"],"ans":"B"},
    {"n":80,"bloque":1,"q":"El artículo 241 establece las funciones de la Corte Constitucional. ¿Cuál es la función más característica?","opts":["Solo revisar las sentencias de tutela de segunda instancia","Guardar la integridad y supremacía de la Constitución; decidir demandas de inconstitucionalidad; revisar fallos de tutela; decidir sobre la constitucionalidad de los decretos legislativos; revisar la constitucionalidad de los proyectos de ley objetados; decidir definitivamente sobre la constitucionalidad de los tratados internacionales","Solo decidir sobre las reformas constitucionales propuestas por el Gobierno","Defender los derechos fundamentales de los ciudadanos y administrar la rama judicial"],"ans":"B"},
    {"n":81,"bloque":1,"q":"El artículo 237 establece las atribuciones del Consejo de Estado. ¿Cuáles son las más importantes?","opts":["Solo el control de los actos administrativos del ejecutivo","Desempeñar las funciones de tribunal supremo de lo contencioso administrativo; conocer de las acciones de nulidad por inconstitucionalidad de los decretos del Gobierno Nacional; actuar como cuerpo supremo consultivo del Gobierno en asuntos de administración; preparar y presentar proyectos de reformas constitucionales y de ley","Juzgar al Presidente de la República y a los altos funcionarios del ejecutivo","Solo emitir conceptos consultivos sin pronunciamientos jurisdiccionales obligatorios"],"ans":"B"},
    {"n":82,"bloque":1,"q":"El artículo 246 reconoce las jurisdicciones especiales indígenas. ¿Cuál es el límite a la autonomía de esas jurisdicciones?","opts":["Las comunidades indígenas tienen plena soberanía judicial sin ningún límite constitucional","Las autoridades de los pueblos indígenas podrán ejercer funciones jurisdiccionales dentro de su ámbito territorial, de conformidad con sus propias normas y procedimientos, siempre que no sean contrarios a la Constitución y leyes de la República; la ley establecerá las formas de coordinación con el sistema judicial nacional","Las jurisdicciones indígenas solo pueden conocer de conflictos entre miembros de la comunidad y no de delitos graves","Los indígenas son juzgados siempre por la jurisdicción ordinaria aunque vivan en territorios indígenas"],"ans":"B"},
    {"n":83,"bloque":1,"q":"El artículo 250 establece las funciones de la Fiscalía General de la Nación. ¿Cuál es su función principal?","opts":["Defender al Estado en los procesos judiciales y administrativos","Investigar y acusar ante los jueces competentes a los presuntos infractores de la ley penal; dirigir, coordinar y controlar las funciones de policía judicial; adoptar medidas necesarias para asegurar el cumplimiento de los fines de la investigación","Imponer sanciones disciplinarias a los servidores públicos","Administrar los establecimientos penitenciarios y carcelarios del país"],"ans":"B"},
    {"n":84,"bloque":1,"q":"El artículo 267 establece la Contraloría General. ¿Qué tipo de control ejerce?","opts":["Un control previo de todos los gastos del Estado que requiere aprobación antes de ejecutarse","El control fiscal que vigila la gestión fiscal de la administración y de los particulares o entidades que manejen fondos o bienes de la Nación; este control se ejercerá en forma posterior y selectiva","Un control concurrente simultáneo a la ejecución presupuestal","Un control administrativo equivalente al de la Procuraduría pero en materia fiscal"],"ans":"B"},
    {"n":85,"bloque":1,"q":"El artículo 275 establece el papel del Procurador General de la Nación. ¿Cuál es su función principal?","opts":["Investigar y juzgar penalmente a los servidores públicos","El Procurador General de la Nación es el supremo director del Ministerio Público; le corresponde vigilar el cumplimiento de la Constitución, las leyes, las decisiones judiciales y los actos administrativos; proteger los derechos humanos; defender los intereses de la sociedad","Defender al Estado colombiano ante organismos internacionales de derechos humanos","Coordinar la función de control interno de todas las entidades del sector público"],"ans":"B"},
    {"n":86,"bloque":1,"q":"El artículo 281 consagra la figura del Defensor del Pueblo. ¿De quién depende y cuáles son sus funciones?","opts":["Depende de la Presidencia de la República y tiene funciones de control disciplinario","El Defensor del Pueblo es elegido por la Cámara de Representantes de terna enviada por el Presidente; hace parte del Ministerio Público; velará por la promoción, el ejercicio y la divulgación de los derechos humanos","Depende de la Corte Constitucional y tiene funciones de revisión de tutelas","Depende del Congreso y tiene funciones de investigación disciplinaria"],"ans":"B"},
    {"n":87,"bloque":1,"q":"El artículo 287 establece la autonomía de las entidades territoriales. ¿Cuáles son los derechos que les garantiza la Constitución?","opts":["Solo el derecho a recaudar sus propios tributos","Gobernarse por autoridades propias, ejercer las competencias que les correspondan, administrar los recursos y establecer los tributos necesarios para el cumplimiento de sus funciones, y participar en las rentas nacionales","El derecho a legislar dentro de sus territorios y a celebrar tratados con entes extranjeros","Solo el derecho a elegir sus propias autoridades sin otros atributos de autonomía"],"ans":"B"},
    {"n":88,"bloque":1,"q":"El artículo 285 establece las entidades territoriales. ¿Cuáles son?","opts":["Solo los municipios y los departamentos","Los departamentos, los distritos, los municipios y los territorios indígenas; la ley podrá darles el carácter de entidades territoriales a las regiones y provincias que se constituyan en los términos de la Constitución","Solo los departamentos, municipios y el Distrito Capital","Los municipios, departamentos, territorios indígenas y las gobernaciones como entidades independientes"],"ans":"B"},
    {"n":89,"bloque":1,"q":"El artículo 329 establece el régimen de los resguardos indígenas. ¿Cuáles son sus elementos esenciales?","opts":["Los resguardos son propiedad privada de las comunidades sin carácter de entidad territorial","La conformación de las entidades territoriales indígenas se hará con sujeción a la ley orgánica de ordenamiento territorial; los resguardos son de propiedad colectiva y no enajenable; la ley definirá las relaciones y la coordinación de estas entidades con aquellas de las cuales formen parte","Las tierras indígenas pueden enajenarse con autorización del Gobierno Nacional","Los territorios indígenas son entidades territoriales automáticas con plena autonomía legislativa"],"ans":"B"},
    {"n":90,"bloque":1,"q":"El artículo 322 establece el régimen especial del Distrito Capital. ¿En qué consiste?","opts":["Bogotá es un departamento autónomo con su propio gobernador elegido popularmente","Bogotá, Distrito Capital, es la capital de la República y del departamento de Cundinamarca; se organiza como entidad territorial con régimen especial; su dirección, administración y vigilancia local estarán a cargo de las autoridades distritales","Bogotá tiene el mismo régimen que los demás municipios del país sin ninguna especialidad","Bogotá es una entidad territorial independiente que no pertenece a ningún departamento"],"ans":"B"},
    {"n":91,"bloque":1,"q":"El artículo 125 establece el sistema de carrera administrativa. ¿En qué consiste?","opts":["Los empleos en los órganos del Estado son de libre nombramiento y remoción del Presidente","Los empleos en los órganos y entidades del Estado son de carrera; se exceptúan los de elección popular, los de libre nombramiento y remoción, los trabajadores oficiales y los demás que determine la ley; el ingreso y el ascenso se harán previo cumplimiento de los requisitos y condiciones que fije la ley para determinar los méritos y calidades de los aspirantes","Todos los empleos públicos son de elección popular excepto los técnicos y especializados","La carrera administrativa aplica solo a los empleados del nivel operativo de la rama ejecutiva"],"ans":"B"},
    {"n":92,"bloque":1,"q":"El artículo 126 establece prohibiciones para el nepotismo. ¿Cuáles?","opts":["Los servidores públicos no pueden contratar con entidades en las que tengan acciones","Los servidores públicos no podrán nombrar como empleados a personas con las que tengan parentesco hasta el cuarto grado de consanguinidad, segundo de afinidad, primero civil o con quien estén ligados por matrimonio o unión permanente; tampoco podrán nombrar personas vinculadas por el mismo lazo con servidores públicos competentes para intervenir en su designación","Los servidores públicos no pueden tener dos empleos públicos simultáneamente sin importar el vínculo familiar","Solo el Presidente y los ministros están sujetos a prohibiciones de nepotismo"],"ans":"B"},
    {"n":93,"bloque":1,"q":"El artículo 243 consagra la cosa juzgada constitucional. ¿Qué prohibición especial establece?","opts":["Las sentencias de la Corte Constitucional pueden ser revocadas por el Congreso mediante ley","Los fallos que la Corte dicte en ejercicio del control jurisdiccional hacen tránsito a cosa juzgada constitucional; ninguna autoridad podrá reproducir el contenido material del acto jurídico declarado inexequible por razones de fondo mientras subsistan en la Carta las disposiciones que sirvieron para hacer la confrontación","Solo las sentencias de tutela hacen tránsito a cosa juzgada; el control abstracto no genera efectos de cosa juzgada","La cosa juzgada constitucional puede ser levantada por el Congreso mediante mayoría calificada"],"ans":"B"},
    {"n":94,"bloque":1,"q":"El artículo 120 de la Constitución establece la organización electoral. ¿Cuáles son sus órganos?","opts":["Solo el Consejo Nacional Electoral","El Consejo Nacional Electoral y la Registraduría Nacional del Estado Civil, organismos que tienen a su cargo la organización de las elecciones, su dirección y vigilancia, así como lo relativo a la identidad de las personas","La Registraduría y el Ministerio del Interior","El Consejo Nacional Electoral, la Registraduría y la Comisión Nacional del Servicio Civil"],"ans":"B"},
    {"n":95,"bloque":1,"q":"El artículo 356 establece el sistema general de participaciones. ¿Qué recursos transfiere el Gobierno Central?","opts":["Solo los recursos para financiar la nómina de los docentes oficiales","La Nación transferirá a los departamentos, distritos y municipios los ingresos corrientes de la Nación para atender los servicios de educación, salud, agua potable y saneamiento básico y los definidos en la ley como prioritarios","Solo los recursos para el pago de la deuda de las entidades territoriales con la banca multilateral","Los impuestos nacionales en un 30% con distribución según el PIB regional"],"ans":"B"},
    {"n":96,"bloque":1,"q":"El artículo 31 establece la prohibición de la reformatio in pejus. ¿En qué consiste?","opts":["El juez puede imponer cualquier pena que estime justa sin importar la apelación","Toda sentencia puede ser apelada o consultada salvo las excepciones de la ley; el superior no podrá agravar la pena impuesta cuando el condenado sea apelante único","El juez de segunda instancia siempre puede agravar la pena cuando la apelación la interponga la Fiscalía","La reformatio in pejus aplica solo en materia civil y no en asuntos penales"],"ans":"B"},
    {"n":97,"bloque":1,"q":"El artículo 32 consagra las reglas sobre la aprehensión en flagrancia. ¿Cuáles son?","opts":["Solo la Policía puede aprehender a quien sea sorprendido en flagrancia","El delincuente sorprendido en flagrancia puede ser aprehendido y llevado ante el juez por cualquier persona; si los agentes de la autoridad lo persiguieren y se refugiare en su propio domicilio, podrán penetrar en él; si se acogiere a domicilio ajeno, deberá preceder requerimiento al morador","La aprehensión en flagrancia es privativa de los miembros de la Policía Judicial","Solo los agentes de la Fiscalía pueden aprehender al flagrante delincuente"],"ans":"B"},
    {"n":98,"bloque":1,"q":"El artículo 229 consagra el derecho de acceso a la justicia. ¿En qué términos?","opts":["El acceso a la justicia está condicionado al pago de costas y derechos judiciales","Se garantiza el derecho de toda persona para acceder a la administración de justicia; la ley indicará en qué casos podrá hacerlo sin la representación de abogado","Solo los ciudadanos colombianos tienen derecho a acceder a la administración de justicia","El acceso a la justicia está garantizado solo para asuntos penales y no para litigios civiles o administrativos"],"ans":"B"},
    {"n":99,"bloque":1,"q":"El artículo 107 establece las garantías para los partidos y movimientos políticos. ¿Cuáles son?","opts":["Solo tienen garantías los partidos con personería jurídica reconocida antes de 1991","Se garantiza a todos los ciudadanos el derecho a fundar, organizar y desarrollar partidos y movimientos políticos; el Estado contribuirá a su financiación y les garantizará el derecho a la oposición y el acceso a los medios de comunicación","Solo los partidos con representación en el Congreso tienen derecho a financiación estatal","Los partidos políticos son entidades de derecho privado sin ningún apoyo ni reconocimiento estatal"],"ans":"B"},
    {"n":100,"bloque":1,"q":"El artículo 127 establece la prohibición de actividades políticas de los servidores públicos. ¿Cuál es el alcance?","opts":["Todos los servidores públicos tienen prohibición absoluta de participar en política","A los empleados del Estado les está prohibido tomar parte en las actividades de los partidos y movimientos políticos y en las controversias políticas; los miembros de la fuerza pública en servicio activo no pueden intervenir en actividades o debates de carácter político partidista","Los servidores públicos pueden participar en política activa siempre que sea fuera del horario laboral","Solo los altos funcionarios tienen restricciones en actividades políticas"],"ans":"B"},
    {"n":101,"bloque":2,"q":"El artículo 333 consagra la libertad económica. ¿Cuáles son los límites que establece?","opts":["La libertad económica es absoluta sin interferencia del Estado","La actividad económica y la iniciativa privada son libres dentro de los límites del bien común; la libre competencia económica es un derecho que supone responsabilidades; la empresa tiene una función social que implica obligaciones; el Estado impedirá la obstrucción o restricción de la libertad económica y evitará o controlará el abuso de posición dominante","La libertad económica solo se garantiza a los nacionales colombianos","La libertad económica puede ser limitada en cualquier momento por decreto del Presidente sin necesidad de ley"],"ans":"B"},
    {"n":102,"bloque":2,"q":"El artículo 334 establece la dirección de la economía. ¿A quién le corresponde y bajo qué principios?","opts":["Al Banco de la República como entidad autónoma e independiente del Estado","La dirección general de la economía estará a cargo del Estado; este intervendrá en la explotación de los recursos naturales, en el uso del suelo, en la producción, distribución, utilización y consumo de los bienes y en los servicios públicos y privados para racionalizar la economía y mejorar la calidad de vida de los habitantes","Solo al Congreso a través de las leyes económicas ordinarias","Al mercado como mecanismo de asignación de recursos con mínima intervención estatal"],"ans":"B"},
    {"n":103,"bloque":2,"q":"El artículo 338 establece el principio de legalidad tributaria. ¿En qué consiste?","opts":["El Gobierno puede establecer tributos en los estados de excepción sin control legislativo","En tiempo de paz, solamente el Congreso, las asambleas departamentales y los concejos municipales pueden imponer contribuciones fiscales o parafiscales; la ley, las ordenanzas y los acuerdos deben fijar directamente los sujetos activos y pasivos, los hechos y las bases gravables y las tarifas de los impuestos","El Presidente puede crear tributos mediante decreto cuando así lo exija la urgencia económica","Solo el Congreso puede crear tributos; asambleas y concejos solo pueden aprobar tasas"],"ans":"B"},
    {"n":104,"bloque":2,"q":"El artículo 345 establece el principio de legalidad del gasto público. ¿Cómo está formulado?","opts":["El Gobierno puede gastar sin restricciones cuando se trate de inversión social","En tiempo de paz no se podrá percibir contribución o impuesto que no figure en el presupuesto de rentas, ni hacer erogación con cargo al Tesoro que no se halle incluida en el presupuesto de gastos","El Ejecutivo puede realizar gastos no presupuestados cuando exista disponibilidad de caja","El Congreso puede autorizar gastos extraordinarios durante los estados de excepción sin restricción"],"ans":"B"},
