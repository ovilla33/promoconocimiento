<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionarios Colpensiones</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#181c25;--surface2:#1e2333;--surface3:#252b3b;
  --border:#2a3045;--border2:#3a4260;
  --text:#e8eaf0;--text2:#9ba3c0;--text3:#5a6380;
  --blue:#4a90e2;--blue2:#2d6bb5;--blue-bg:#1a2540;
  --green:#2ecc71;--green-bg:#0d2b1a;--green2:#1a6b3a;
  --red:#e74c3c;--red-bg:#2b0d0d;--red2:#8b2020;
  --amber:#f39c12;--amber-bg:#2b1d06;
  --purple:#9b59b6;--purple-bg:#1e0f2b;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* ── HOME ── */
#screen-home{display:flex;flex-direction:column;min-height:100vh}
.home-header{padding:3rem 2rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
.home-header h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-0.5px;color:var(--text);margin-bottom:.5rem}
.home-header p{color:var(--text2);font-size:.95rem}
.logo-ring{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-size:1.5rem}

.quizzes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;padding:2rem;flex:1}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.quiz-card:hover{border-color:var(--blue);background:var(--surface2);transform:translateY(-2px);box-shadow:var(--shadow)}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--purple));opacity:0;transition:.18s}
.quiz-card:hover::before{opacity:1}
.qc-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:1rem}
.qc-title{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:.3rem;line-height:1.3}
.qc-meta{font-size:.82rem;color:var(--text2);display:flex;gap:.6rem;flex-wrap:wrap}
.qc-meta span{background:var(--surface3);padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
.qc-score{position:absolute;top:1rem;right:1rem;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px}
.score-none{background:var(--surface3);color:var(--text3);border:1px solid var(--border)}
.score-low{background:var(--red-bg);color:var(--red);border:1px solid var(--red2)}
.score-mid{background:var(--amber-bg);color:var(--amber);border:1px solid #6b4010}
.score-high{background:var(--green-bg);color:var(--green);border:1px solid var(--green2)}

/* ── QUIZ SCREEN ── */
#screen-quiz{display:none;flex-direction:column;min-height:100vh}
.quiz-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
.btn-back{background:none;border:1px solid var(--border);color:var(--text2);padding:.35rem .8rem;border-radius:var(--radius-xs);cursor:pointer;font-size:.85rem;transition:all .15s;white-space:nowrap}
.btn-back:hover{border-color:var(--border2);color:var(--text)}
.quiz-topbar-title{font-weight:600;font-size:.9rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-wrap{flex:1;max-width:200px;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:3px;transition:width .3s}
.progress-label{font-size:.8rem;color:var(--text2);white-space:nowrap}

.quiz-body{flex:1;max-width:780px;width:100%;margin:0 auto;padding:2rem 1.5rem}

.bloque-label{font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:.5rem}
.question-counter{font-size:.82rem;color:var(--text3);margin-bottom:.4rem}
.question-text{font-size:1.05rem;font-weight:500;color:var(--text);line-height:1.65;margin-bottom:1.5rem}

.options-list{display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}
.option-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1.1rem;cursor:pointer;text-align:left;color:var(--text);font-size:.9rem;line-height:1.5;transition:all .15s;display:flex;gap:.75rem;align-items:flex-start}
.option-btn:hover:not(:disabled){border-color:var(--blue);background:var(--blue-bg)}
.option-letter{width:24px;min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px}
.option-btn:hover:not(:disabled) .option-letter{border-color:var(--blue);color:var(--blue)}
.option-btn.correct{border-color:var(--green);background:var(--green-bg)}
.option-btn.correct .option-letter{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.15)}
.option-btn.wrong{border-color:var(--red);background:var(--red-bg)}
.option-btn.wrong .option-letter{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.15)}
.option-btn.show-correct{border-color:var(--green);background:var(--green-bg);opacity:.7}
.option-btn:disabled{cursor:default}

.feedback-box{padding:1rem 1.2rem;border-radius:var(--radius-sm);margin-bottom:1.5rem;display:none;font-size:.9rem;line-height:1.5}
.feedback-box.correct{background:var(--green-bg);border:1px solid var(--green2);color:#7fffb0}
.feedback-box.wrong{background:var(--red-bg);border:1px solid var(--red2);color:#ffaaaa}
.feedback-icon{font-size:1.1rem;margin-right:.5rem}

.quiz-nav{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;border-top:1px solid var(--border)}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:.6rem 1.4rem;border-radius:var(--radius-xs);cursor:pointer;font-size:.9rem;font-weight:500;transition:all .15s}
.btn-primary:hover{background:var(--blue2)}
.btn-primary:disabled{opacity:.4;cursor:default}

/* ── RESULTS SCREEN ── */
#screen-results{display:none;flex-direction:column;min-height:100vh}
.results-header{padding:3rem 2rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}
.score-circle .pct{font-size:2rem;font-weight:700;line-height:1}
.score-circle .lbl{font-size:.75rem;color:var(--text2);margin-top:.2rem}
.results-title{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.results-sub{color:var(--text2);font-size:.9rem}

.stats-row{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;padding:1.5rem 2rem;border-bottom:1px solid var(--border)}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1.5rem;text-align:center;min-width:100px}
.stat-val{font-size:1.5rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.stat-lbl{font-size:.75rem;color:var(--text2);margin-top:.2rem}

.review-section{max-width:780px;width:100%;margin:0 auto;padding:2rem 1.5rem}
.review-section h3{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.2rem;margin-bottom:.75rem}
.review-item.ok{border-left:3px solid var(--green)}
.review-item.fail{border-left:3px solid var(--red)}
.review-q{font-size:.88rem;color:var(--text);margin-bottom:.5rem;line-height:1.5}
.review-ans{font-size:.82rem;display:flex;gap:1rem;flex-wrap:wrap}
.review-your{color:var(--red)}
.review-correct{color:var(--green)}
.review-ok-lbl{color:var(--green);font-size:.82rem}

.results-actions{display:flex;gap:.75rem;justify-content:center;padding:2rem;flex-wrap:wrap}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.6rem 1.4rem;border-radius:var(--radius-xs);cursor:pointer;font-size:.9rem;font-weight:500;transition:all .15s}
.btn-secondary:hover{border-color:var(--border2);background:var(--surface2)}
.btn-filter{background:none;border:1px solid var(--border);color:var(--text2);padding:.3rem .8rem;border-radius:20px;cursor:pointer;font-size:.8rem;transition:all .15s}
.btn-filter.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.filter-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home">
  <div class="home-header">
    <div class="logo-ring">🎓</div>
    <h1>Centro de Evaluación</h1>
    <p>Colpensiones — Cuestionarios de conocimiento institucional</p>
  </div>
  <div class="quizzes-grid" id="quizzes-grid"></div>
</div>

<!-- QUIZ -->
<div id="screen-quiz">
  <div class="quiz-topbar">
    <button class="btn-back" onclick="goHome()">← Inicio</button>
    <span class="quiz-topbar-title" id="topbar-title"></span>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label"></span>
  </div>
  <div class="quiz-body">
    <div class="bloque-label" id="bloque-label"></div>
    <div class="question-counter" id="q-counter"></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-list" id="options-list"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <div class="quiz-nav">
      <span id="streak-info" style="font-size:.82rem;color:var(--text2)"></span>
      <button class="btn-primary" id="btn-next" onclick="nextQuestion()">Siguiente →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="screen-results">
  <div class="results-header">
    <div class="score-circle" id="score-circle">
      <span class="pct" id="score-pct"></span>
      <span class="lbl">correcto</span>
    </div>
    <div class="results-title" id="results-title"></div>
    <div class="results-sub" id="results-sub"></div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="stat-correct" style="color:var(--green)"></div><div class="stat-lbl">Correctas</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-wrong" style="color:var(--red)"></div><div class="stat-lbl">Incorrectas</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-total"></div><div class="stat-lbl">Total</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-pct" style="color:var(--amber)"></div><div class="stat-lbl">Porcentaje</div></div>
  </div>
  <div class="review-section">
    <div class="filter-row">
      <button class="btn-filter active" onclick="setFilter('all',this)">Todas</button>
      <button class="btn-filter" onclick="setFilter('fail',this)">Solo incorrectas</button>
      <button class="btn-filter" onclick="setFilter('ok',this)">Solo correctas</button>
    </div>
    <h3 id="review-heading">Revisión de respuestas</h3>
    <div id="review-list"></div>
  </div>
  <div class="results-actions">
    <button class="btn-primary" onclick="retryQuiz()">↺ Repetir cuestionario</button>
    <button class="btn-secondary" onclick="goHome()">← Volver al inicio</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// MOTOR DE MÓDULOS — No modificar esta sección
// Para agregar un módulo nuevo: copia el bloque de otro módulo
//   y pégalo antes del cierre de esta sección.
// Para desactivar un módulo: comenta su bloque (/* ... */)
// ════════════════════════════════════════════════════════════
const QUIZZES = {};
const META = {};

function registerModule(key, data) {
  QUIZZES[key] = {
    name: data.name,
    bloques: data.bloques,
    questions: data.questions
  };
  META[key] = {
    icon: data.icon,
    color: data.color,
    desc: data.desc
  };
}
// ════════════════════════════════════════════════════════════
// MÓDULOS REGISTRADOS ↓  (agrega, quita o reordena aquí)
// ════════════════════════════════════════════════════════════

// ============================================================
// MÓDULO: disciplinario
// Nombre: Derecho Disciplinario — Ley 1952 de 2019
// Preguntas: 100
// Para actualizar: pídele a Claude "Reemplaza el bloque
//   MÓDULO: disciplinario con [tus nuevas preguntas o cambios]"
// ============================================================
registerModule("disciplinario", {
  "name": "Derecho Disciplinario — Ley 1952 de 2019",
  "icon": "⚖️",
  "color": "#9b59b6",
  "desc": "Ley 1952 de 2019 · Principios, faltas, sanciones y etapa de juzgamiento",
  "bloques": [
    "SECCIÓN 1 — Principios y Normas Rectoras Arts. 1–22  (1–15)",
    "SECCIÓN 2 — Sujetos Disciplinables, Falta Disciplinaria y Extinción Arts. 23–36  (16–30)",
    "SECCIÓN 3 — Deberes, Derechos y Régimen de Responsabilidad Arts. 37–51  (31–45)",
    "SECCIÓN 4 — Sanciones, Inhabilidades y Disposiciones Generales  (46–60)",
    "SECCIÓN 5 — Etapa de Juzgamiento: Pliego de Cargos, Notificaciones y Audiencias  (61–75)",
    "SECCIÓN 6 — Etapa de Juzgamiento: Fallo, Recursos y Doble Conformidad  (76–88)",
    "SECCIÓN 7 — Etapa de Juzgamiento: Nulidades, Revisión y Garantías  (89–100)"
  ],
  "questions": [
    {
      "n": 1,
      "q": "Según el artículo 2 de la Ley 1952 de 2019 (modificado por la Ley 2094 de 2021), las decisiones sancionatorias producto de las funciones jurisdiccionales de la Procuraduría General de la Nación son susceptibles de revisión ante:",
      "opts": [
        "A) El Consejo Superior de la Judicatura en única instancia",
        "B) La Corte Suprema de Justicia en Sala de Casación Penal",
        "C) La jurisdicción de lo contencioso-administrativo, en los términos de la ley",
        "D) La Corte Constitucional mediante acción de tutela directa"
      ],
      "ans": "C"
    },
    {
      "n": 2,
      "q": "El artículo 4 de la Ley 1952 de 2019 establece el principio de legalidad disciplinaria. Una de sus consecuencias directas es que:",
      "opts": [
        "A) Solo las faltas gravísimas requieren descripción previa en la ley",
        "B) La preexistencia de la norma no se predica de las normas complementarias de la falta",
        "C) El operador disciplinario puede sancionar conductas análogas a las descritas en la ley cuando el caso lo amerite",
        "D) La labor de adecuación típica se somete a los principios de especialidad y subsidiariedad"
      ],
      "ans": "D"
    },
    {
      "n": 3,
      "q": "De acuerdo con el artículo 8 de la Ley 1952 de 2019, el principio de favorabilidad en materia disciplinaria establece que la ley permisiva o favorable se aplica de preferencia a la restrictiva, incluso:",
      "opts": [
        "A) Únicamente si existe solicitud expresa del disciplinado o su defensor",
        "B) Cuando la ley favorable sea anterior y esté derogada formalmente",
        "C) Solo en la etapa de investigación, antes del pliego de cargos",
        "D) Cuando sea posterior, y rige también para quien esté cumpliendo la sanción, salvo lo dispuesto en la Constitución"
      ],
      "ans": "D"
    },
    {
      "n": 4,
      "q": "El artículo 9 de la Ley 1952 de 2019 (modificado por la Ley 2094 de 2021) define la ilicitud sustancial como la conducta que:",
      "opts": [
        "A) Se ejecuta con dolo o culpa gravísima y produce un resultado dañoso concreto",
        "B) Viola directamente una norma positiva de obligatorio cumplimiento para el servidor público",
        "C) Causa un perjuicio patrimonial demostrable al Estado o a un particular",
        "D) Afecta sustancialmente el deber funcional sin justificación alguna"
      ],
      "ans": "D"
    },
    {
      "n": 5,
      "q": "Conforme al artículo 10, el principio de culpabilidad en el CGD prescribe que queda proscrita toda forma de responsabilidad objetiva, y que las conductas solo son sancionables a título de:",
      "opts": [
        "A) Dolo o culpa gravísima únicamente",
        "B) Dolo o culpa",
        "C) Dolo, culpa gravísima o culpa grave",
        "D) Dolo, preterintención o culpa"
      ],
      "ans": "B"
    },
    {
      "n": 6,
      "q": "El artículo 12 del CGD (modificado por la Ley 2094 de 2021) garantiza el debido proceso disciplinario exigiendo que el disciplinable sea investigado y juzgado por funcionario diferente. ¿Cuál garantía adicional introduce este artículo modificado?",
      "opts": [
        "A) El derecho a que el fallo sancionatorio sea revisado por autoridad diferente mediante el trámite de apelación (doble conformidad), incluso cuando el primer fallo lo profiera el Procurador General",
        "B) La prohibición de que el defensor de oficio actúe en la etapa de juzgamiento",
        "C) El derecho a la doble instancia en todos los casos sin excepción",
        "D) La obligación de que el fallo sea motivado y publicado en el Diario Oficial"
      ],
      "ans": "A"
    },
    {
      "n": 7,
      "q": "Según el artículo 13, la investigación integral en materia disciplinaria impone a las autoridades la obligación de investigar con igual rigor:",
      "opts": [
        "A) Solo los hechos agravantes de la conducta del disciplinado",
        "B) Exclusivamente los hechos señalados en la queja o denuncia inicial",
        "C) Los antecedentes disciplinarios del investigado para efectos de graduación de la sanción",
        "D) Los hechos que demuestren tanto la existencia de la falta y la responsabilidad, como los que tiendan a demostrar su inexistencia o eximan de responsabilidad"
      ],
      "ans": "D"
    },
    {
      "n": 8,
      "q": "El artículo 14 del CGD sobre presunción de inocencia establece que toda duda razonable se resolverá a favor del sujeto disciplinable. La Corte Constitucional declaró inexequible el aparte que condicionaba este beneficio. ¿Cuál era ese aparte inexequible?",
      "opts": [
        "A) 'durante la actuación disciplinaria'",
        "B) 'cuando no haya modo de eliminar la responsabilidad'",
        "C) 'el sujeto disciplinable se presume inocente'",
        "D) 'mientras no se declare su responsabilidad en fallo ejecutoriado'"
      ],
      "ans": "B"
    },
    {
      "n": 9,
      "q": "De acuerdo con el artículo 16, la cosa juzgada disciplinaria impide someter a nueva investigación al disciplinable cuya situación haya sido decidida mediante fallo ejecutoriado, aun cuando:",
      "opts": [
        "A) Al mismo hecho se le dé una denominación distinta",
        "B) Aparezcan nuevas pruebas que no fueron valoradas en el proceso anterior",
        "C) El nuevo proceso sea iniciado por la Procuraduría en ejercicio del poder preferente",
        "D) La sanción impuesta haya sido inferior a la prevista en la ley"
      ],
      "ans": "A"
    },
    {
      "n": 10,
      "q": "El artículo 21 del CGD regula la cláusula de exclusión probatoria. Según esta norma, las excepciones a la exclusión de prueba ilícita son:",
      "opts": [
        "A) Solo la fuente independiente cuando es anterior a la violación del derecho fundamental",
        "B) La confesión libre y voluntaria, el reconocimiento en fila de personas y la inspección judicial",
        "C) La prueba de referencia, la prueba anticipada y la prueba de oficio",
        "D) La fuente independiente, el vínculo atenuado, el descubrimiento inevitable y las demás que establezca la ley"
      ],
      "ans": "D"
    },
    {
      "n": 11,
      "q": "El artículo 22 del CGD sobre integración normativa establece que, en lo no previsto en la ley disciplinaria, se aplicará lo dispuesto en varios códigos. ¿Cuál de los siguientes NO está expresamente mencionado como fuente de integración?",
      "opts": [
        "A) Código de Procedimiento Administrativo y de lo Contencioso Administrativo",
        "B) Código Penal y de Procedimiento Penal",
        "C) Código de Comercio",
        "D) Código General del Proceso"
      ],
      "ans": "C"
    },
    {
      "n": 12,
      "q": "El artículo 29 del CGD (modificado por la Ley 2094 de 2021) establece que la culpa gravísima se configura cuando se incurre en falta disciplinaria por:",
      "opts": [
        "A) Ignorancia supina, desatención elemental o violación manifiesta de reglas de obligatorio cumplimiento",
        "B) Infracción al deber objetivo de cuidado funcionalmente exigible en situaciones de urgencia",
        "C) Error invencible de hecho sobre los presupuestos objetivos de la falta",
        "D) Inobservancia del cuidado necesario que cualquier persona del común imprime a sus actuaciones"
      ],
      "ans": "A"
    },
    {
      "n": 13,
      "q": "Según el artículo 30, es autor de una falta disciplinaria quien la realice o determine a otro a realizarla. Una característica especial de esta norma es que la autoría aplica:",
      "opts": [
        "A) Aun cuando los efectos de la conducta se produzcan después de la dejación del cargo o función",
        "B) Solo en las faltas gravísimas dolosas sancionadas con destitución e inhabilidad",
        "C) Solo cuando los efectos se producen durante la vigencia del cargo o función",
        "D) Únicamente para los servidores públicos de carrera administrativa"
      ],
      "ans": "A"
    },
    {
      "n": 14,

let currentQuiz = null;
let currentIndex = 0;
let answers = {};
let answered = false;
let streak = 0;
const results = {};

function getScoreClass(r){
  if(r===undefined||r===null) return 'score-none';
  const pct=typeof r==='object'?r.pct:r;
  if(pct<50) return 'score-low';
  if(pct<80) return 'score-mid';
  return 'score-high';
}
function getScoreLabel(r){
  if(r===undefined||r===null) return 'Sin intentar';
  if(typeof r==='object') return r.pct+'%';
  return r+'%';
}
function getScoreDetail(r){
  if(r===undefined||r===null||typeof r!=='object') return '';
  return '<span style="color:var(--green);font-size:.78rem">✓'+r.correct+'</span>'
       +' <span style="color:var(--red);font-size:.78rem">✗'+r.wrong+'</span>';
}

function renderHome(){
  const grid = document.getElementById('quizzes-grid');
  grid.innerHTML = '';
  Object.entries(QUIZZES).forEach(([key, qdata])=>{
    const m = META[key]||{icon:'📝',color:'var(--blue)',desc:''};
    const pct = results[key]!==undefined ? results[key] : null;
    const sc = getScoreClass(pct);
    const n = qdata.questions.length;
    const nb = qdata.bloques.length;
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.innerHTML = `
      <div style="position:absolute;top:.9rem;right:.9rem;text-align:right">
        <span class="qc-score ${sc}">${getScoreLabel(pct)}</span>
        <div style="margin-top:3px">${getScoreDetail(pct)}</div>
      </div>
      <div class="qc-icon" style="background:${m.color}22;color:${m.color}">${m.icon}</div>
      <div class="qc-title">${qdata.name}</div>
      <p style="font-size:.82rem;color:var(--text2);margin:.4rem 0 .8rem;line-height:1.4">${m.desc}</p>
      <div class="qc-meta">
        <span>${n} preguntas</span>
        <span>${nb} bloques</span>
      </div>`;
    card.onclick = ()=> startQuiz(key);
    grid.appendChild(card);
  });
}

function startQuiz(key){
  currentQuiz = key;
  currentIndex = 0;
  answers = {};
  answered = false;
  streak = 0;
  showScreen('quiz');
  document.getElementById('topbar-title').textContent = QUIZZES[key].name;
  renderQuestion();
}

function getBloqueForQ(key, qNum){
  const qs = QUIZZES[key].questions;
  const bloques = QUIZZES[key].bloques;
  if(!bloques.length) return '';
  // Find which bloque range contains this question
  const idx = qs.findIndex(q=>q.n===qNum);
  const perBloque = Math.ceil(qs.length / bloques.length);
  const bi = Math.min(Math.floor(idx/perBloque), bloques.length-1);
  return bloques[bi] || '';
}

function renderQuestion(){
  const qdata = QUIZZES[currentQuiz];
  const q = qdata.questions[currentIndex];
  const total = qdata.questions.length;
  const pct = Math.round((currentIndex/total)*100);

  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent = `${currentIndex+1}/${total}`;
  document.getElementById('bloque-label').textContent = getBloqueForQ(currentQuiz, q.n).replace(/\s*\(\d+[–-]\d+\)\s*$/, '');
  document.getElementById('q-counter').textContent = `Pregunta ${q.n} de ${total}`;
  document.getElementById('q-text').textContent = q.q;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = ()=> selectOption(letters[i], q.ans);
    list.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none';
  fb.className = 'feedback-box';

  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentIndex < total-1 ? 'Siguiente →' : 'Ver resultados';
  btnNext.disabled = true;

  answered = false;
  document.getElementById('streak-info').textContent = streak>1 ? `🔥 Racha: ${streak} correctas` : '';
}

function selectOption(letter, correct){
  if(answered) return;
  answered = true;
  answers[currentIndex] = letter;

  const isCorrect = letter === correct;
  if(isCorrect) streak++; else streak=0;

  const btns = document.querySelectorAll('.option-btn');
  const letters = ['A','B','C','D'];
  btns.forEach((btn,i)=>{
    btn.disabled = true;
    if(letters[i]===letter && isCorrect) btn.classList.add('correct');
    else if(letters[i]===letter && !isCorrect) btn.classList.add('wrong');
    else if(letters[i]===correct && !isCorrect) btn.classList.add('show-correct');
  });

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'block';
  if(isCorrect){
    fb.className = 'feedback-box correct';
    const msgs = ['¡Correcto!','¡Exacto!','¡Muy bien!','¡Perfecto!'];
    fb.innerHTML = `<span class="feedback-icon">✓</span>${msgs[Math.floor(Math.random()*msgs.length)]}`;
  } else {
    fb.className = 'feedback-box wrong';
    fb.innerHTML = `<span class="feedback-icon">✗</span>Incorrecto. La respuesta correcta es <strong>${correct}</strong>.`;
  }

  document.getElementById('btn-next').disabled = false;
  document.getElementById('streak-info').textContent = streak>1 ? `🔥 Racha: ${streak} correctas` : '';
}

function nextQuestion(){
  const total = QUIZZES[currentQuiz].questions.length;
  if(currentIndex < total-1){
    currentIndex++;
    renderQuestion();
    window.scrollTo(0,0);
  } else {
    showResults();
  }
}

function showResults(){
  const qdata = QUIZZES[currentQuiz];
  const qs = qdata.questions;
  let correct=0, wrong=0;
  qs.forEach((q,i)=>{
    if(answers[i]===q.ans) correct++; else wrong++;
  });
  const pct = Math.round((correct/qs.length)*100);
  results[currentQuiz] = {pct, correct, wrong};

  // Score circle color
  const circle = document.getElementById('score-circle');
  let cc = pct>=80?'#2ecc71':pct>=50?'#f39c12':'#e74c3c';
  circle.style.background = cc+'22';
  circle.style.border = '3px solid '+cc;
  document.getElementById('score-pct').style.color = cc;
  document.getElementById('score-pct').textContent = pct+'%';

  const msg = pct>=90?'¡Excelente dominio!':pct>=75?'¡Buen resultado!':pct>=50?'Resultado aprobatorio':'Necesitas repasar';
  document.getElementById('results-title').textContent = msg;
  document.getElementById('results-sub').textContent = `${qdata.name}`;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-total').textContent = qs.length;
  document.getElementById('stat-pct').textContent = pct+'%';

  renderReview('all');
  showScreen('results');
  window.scrollTo(0,0);
}

let currentFilter = 'all';
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.btn-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderReview(f);
}

function renderReview(filter){
  const qs = QUIZZES[currentQuiz].questions;
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  const letters = ['A','B','C','D'];
  let shown = 0;
  qs.forEach((q,i)=>{
    const userAns = answers[i];
    const ok = userAns === q.ans;
    if(filter==='ok' && !ok) return;
    if(filter==='fail' && ok) return;
    shown++;
    const item = document.createElement('div');
    item.className = 'review-item '+(ok?'ok':'fail');
    const userOptIdx = letters.indexOf(userAns);
    const corrOptIdx = letters.indexOf(q.ans);
    item.innerHTML = `
      <div class="review-q"><strong>P${q.n}.</strong> ${q.q}</div>
      <div class="review-ans">
        ${ok
          ? `<span class="review-ok-lbl">✓ ${userAns}. ${q.opts[corrOptIdx]||''}</span>`
          : `<span class="review-your">✗ Tu respuesta: ${userAns}. ${userOptIdx>=0?q.opts[userOptIdx]:''}</span>
             <span class="review-correct">✓ Correcta: ${q.ans}. ${corrOptIdx>=0?q.opts[corrOptIdx]:''}</span>`
        }
      </div>`;
    list.appendChild(item);
  });
  document.getElementById('review-heading').textContent =
    filter==='all'?`Revisión de todas las respuestas (${shown})`:
    filter==='fail'?`Respuestas incorrectas (${shown})`:
    `Respuestas correctas (${shown})`;
}

function retryQuiz(){ startQuiz(currentQuiz); }

function goHome(){
  showScreen('home');
  renderHome();
}

function showScreen(s){
  ['home','quiz','results'].forEach(id=>{
    const el = document.getElementById('screen-'+id);
    el.style.display = (id===s)?'flex':'none';
  });
}

renderHome();
</script>
</body>
</html>
